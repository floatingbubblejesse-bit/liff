<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>餐食審核 | 營養師後台</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    :root {
      --green: #06C755;
      --green-dark: #04a847;
      --green-light: #e8f9ee;
      --blue: #1a73e8;
      --blue-light: #e8f0fe;
      --red: #e53935;
      --orange: #f57c00;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a202c;
      --muted: #718096;
      --border: #e2e8f0;
      --sidebar: 290px;
      --panel: 400px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: var(--green);
      color: white;
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .badge-count {
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .reviewer-name { font-size: 12px; opacity: .85; }
    .btn-refresh {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-refresh:hover { background: rgba(255,255,255,0.3); }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-head h2 { font-size: 13px; font-weight: 600; color: var(--muted); }
    .btn-select-all {
      font-size: 12px; color: var(--blue);
      background: none; border: none; cursor: pointer; padding: 0;
    }
    .queue { flex: 1; overflow-y: auto; }
    .queue::-webkit-scrollbar { width: 4px; }
    .queue::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .q-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      transition: background .12s;
      user-select: none;
    }
    .q-item:hover { background: #fafafa; }
    .q-item.active { background: var(--green-light); border-left: 3px solid var(--green); }
    .q-item.done { opacity: .5; }
    .q-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }
    .q-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--green-light);
      color: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .q-info { flex: 1; min-width: 0; }
    .q-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .q-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .q-badge {
      font-size: 10px; padding: 2px 6px; border-radius: 10px; flex-shrink: 0;
      font-weight: 600;
    }
    .q-badge.pending { background: #fff3e0; color: var(--orange); }
    .q-badge.approved { background: var(--green-light); color: var(--green-dark); }
    .q-badge.rejected { background: #ffebee; color: var(--red); }
    .sidebar-foot {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .btn-batch {
      width: 100%; padding: 9px;
      background: var(--green); color: white;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .btn-batch:hover { background: var(--green-dark); }
    .btn-batch:disabled { background: #ccc; cursor: not-allowed; }
    .center {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .center::-webkit-scrollbar { width: 5px; }
    .center::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #bbb; gap: 12px;
      min-height: 300px;
    }
    .empty-state .icon { font-size: 52px; }
    .empty-state p { font-size: 14px; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .card-title {
      font-size: 12px; font-weight: 700;
      color: var(--green-dark); text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .photo-wrap {
      width: 100%; border-radius: 10px; overflow: hidden;
      background: #f5f5f5; min-height: 160px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .photo-wrap img { width: 100%; max-height: 320px; object-fit: cover; display: block; }
    .photo-placeholder {
      padding: 32px; text-align: center; color: #bbb; font-size: 13px;
    }
    .photo-placeholder span { font-size: 36px; display: block; margin-bottom: 8px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
    .info-item label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }
    .info-item .val { font-size: 14px; font-weight: 600; }
    .food-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .food-chip {
      background: var(--green-light); color: var(--green-dark);
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .ai-advice-box {
      background: #f9f9f9; border-radius: 8px;
      padding: 10px 12px; font-size: 13px; color: #555; line-height: 1.6;
      margin-top: 10px; border-left: 3px solid var(--green);
    }
    /* ── AI 估算營養素 Grid (center display) ── */
    .ai-nutr-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .ai-nutr-item {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
    }
    .ai-nutr-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .ai-nutr-val {
      font-size: 22px;
      font-weight: 800;
      color: var(--blue);
      line-height: 1.1;
    }
    .ai-nutr-val.missing {
      font-size: 18px;
      color: #c0c0c0;
    }
    .ai-nutr-unit {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
    /* ── RIGHT Panel ── */
    .panel {
      width: var(--panel);
      flex-shrink: 0;
      background: var(--card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .p-section {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .p-section h3 {
      font-size: 12px; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .4px; margin-bottom: 12px;
    }
    .preset-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .preset-chip {
      background: var(--blue-light); color: var(--blue);
      border: 1px solid #c5d8fd;
      padding: 5px 10px; border-radius: 20px;
      font-size: 12px; cursor: pointer;
      transition: all .15s; user-select: none;
    }
    .preset-chip:hover { background: var(--blue); color: white; }
    .preset-chip.flash { background: var(--blue); color: white; }
    .advice-ta {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; resize: vertical; min-height: 80px;
      font-family: inherit; transition: border-color .2s; line-height: 1.5;
    }
    .advice-ta:focus { outline: none; border-color: var(--green); }
    .score-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .score-circle {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: white; flex-shrink: 0;
      transition: background .3s;
    }
    .score-info .grade { font-size: 15px; font-weight: 700; }
    .score-info .hint { font-size: 11px; color: var(--muted); }
    input[type=range] {
      width: 100%; accent-color: var(--green); cursor: pointer;
      height: 4px;
    }
    .nutr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .nutr-item label { font-size: 10px; color: var(--muted); display: block; text-align: center; margin-bottom: 4px; }
    .nutr-input {
      width: 100%; padding: 7px 4px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; font-weight: 700; text-align: center;
      transition: border-color .2s;
    }
    .nutr-input:focus { outline: none; border-color: var(--green); }
    .nutr-unit { font-size: 9px; color: #bbb; text-align: center; margin-top: 2px; }
    .action-row {
      padding: 14px 20px;
      display: flex; gap: 10px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      margin-top: auto;
      position: sticky;
      bottom: 0;
      background: var(--card);
      z-index: 10;
    }
    .btn-reject {
      flex: 1; padding: 11px;
      background: white; color: var(--red);
      border: 2px solid var(--red); border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all .18s;
    }
    .btn-reject:hover { background: var(--red); color: white; }
    .btn-approve {
      flex: 2; padding: 11px;
      background: var(--green); color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background .18s;
    }
    .btn-approve:hover { background: var(--green-dark); }
    .btn-approve:disabled, .btn-reject:disabled { opacity: .45; cursor: not-allowed; }
    .overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,.82);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200; gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #eee; border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-text { font-size: 14px; color: var(--green); font-weight: 600; }
    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: #222; color: white;
      padding: 9px 20px; border-radius: 8px;
      font-size: 13px; z-index: 300;
      opacity: 0; transition: opacity .25s;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .protein-section {
      margin-top: 14px;
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
      border-radius: 12px;
      padding: 14px;
      color: white;
    }
    .protein-card {
      background: rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 14px;
    }
    .protein-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }
    .protein-label { font-size: 13px; opacity: 0.9; }
    .protein-value { font-size: 13px; font-weight: 600; }
    .progress-bar-bg {
      background: rgba(255,255,255,0.3);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: white;
      transition: width 0.8s ease;
    }
    .protein-status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      opacity: 0.95;
    }
    .protein-status-badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .protein-status-badge.progress { background: #e8f0fe; color: var(--blue); }
    .protein-status-badge.achieved { background: var(--green-light); color: var(--green-dark); }
    .protein-status-badge.excess   { background: #fff3e0; color: var(--orange); }
    .protein-panel-box {
      background: #f5f7ff;
      border: 1px solid #dde5ff;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .protein-panel-row {
      display: flex; justify-content: space-between; align-items: center;
    }
    .protein-panel-key { font-size: 11px; color: var(--muted); }
    .protein-panel-val { font-size: 13px; font-weight: 700; }
    @media (max-width: 1100px) {
      :root { --panel: 340px; }
    }
    @media (max-width: 860px) {
      :root { --sidebar: 230px; --panel: 300px; }
      .nutr-grid { grid-template-columns: repeat(3, 1fr); }
      .ai-nutr-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      body { overflow: auto; }
      .main { flex-direction: column; }
      .sidebar { width: 100%; height: 160px; overflow: hidden; }
      .queue { display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; }
      .q-item { min-width: 160px; flex-shrink: 0; }
      .panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
      .ai-nutr-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-text" id="overlayText">連線中…</div>
</div>
<div class="toast" id="toast"></div>
<header class="header">
  <div class="header-left">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="2"/>
      <path d="M9 12l2 2 4-4"/>
    </svg>
    <h1>餐食審核 · 營養師後台</h1>
  </div>
  <div class="header-right">
    <span class="badge-count" id="pendingBadge">待審核 — 筆</span>
    <span class="reviewer-name" id="reviewerName"></span>
    <button class="btn-refresh" onclick="loadRecords()">⟳ 重整</button>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-head">
      <h2>待審核列表</h2>
      <button class="btn-select-all" id="btnSelectAll" onclick="toggleSelectAll()">全選</button>
    </div>
    <div class="queue" id="queue"></div>
    <div class="sidebar-foot">
      <button class="btn-batch" id="btnBatch" disabled onclick="batchApprove()">
        批次核准（<span id="selCount">0</span> 筆）
      </button>
    </div>
  </div>
  <div class="center" id="center">
    <div class="empty-state" id="emptyState">
      <span class="icon">📋</span>
      <p>請從左側選擇一筆記錄</p>
    </div>
    <!-- Photo card -->
    <div class="card" id="photoCard" style="display:none">
      <div class="card-title">📸 餐食照片</div>
      <div class="photo-wrap" id="photoWrap">
        <div class="photo-placeholder"><span>🍽️</span>載入中…</div>
      </div>
    </div>
    <!-- Patient info card -->
    <div class="card" id="patientCard" style="display:none">
      <div class="card-title">👤 病患資訊</div>
      <div class="info-grid">
        <div class="info-item"><label>姓名</label><div class="val" id="dName">—</div></div>
        <div class="info-item"><label>院區病歷號</label><div class="val" id="dPid">—</div></div>
        <div class="info-item"><label>分析時間</label><div class="val" id="dTime">—</div></div>
        <div class="info-item"><label>記錄 ID</label><div class="val" id="dId" style="font-size:12px;word-break:break-all">—</div></div>
      </div>
      <!-- Protein Progress -->
      <div id="proteinSection" style="display:none; margin-top:14px">
        <div class="card-title" style="margin-bottom:6px">🥩 每日蛋白質攝取進度</div>
        <div class="protein-section">
          <div class="protein-card">
            <div class="protein-header">
              <span class="protein-label">今日蛋白質進度</span>
              <span class="protein-value" id="proteinText">—</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="proteinBarFill" style="width:0%"></div>
            </div>
            <div class="protein-status" id="proteinStatus">計算中…</div>
          </div>
        </div>
      </div>
      <!-- 識別食物 -->
      <div style="margin-top:14px">
        <div class="card-title" style="margin-bottom:6px">🍱 識別食物</div>
        <div class="food-chips" id="foodChips"></div>
      </div>
      <!-- ── AI 估算營養素 ── -->
      <div style="margin-top:14px" id="aiNutrSection">
        <div class="card-title" style="margin-bottom:6px">🤖 AI 估算營養素</div>
        <div class="ai-nutr-grid">
          <div class="ai-nutr-item">
            <div class="ai-nutr-label">熱量</div>
            <div class="ai-nutr-val" id="aiCal">—</div>
            <div class="ai-nutr-unit">kcal</div>
          </div>
          <div class="ai-nutr-item">
            <div class="ai-nutr-label">蛋白質</div>
            <div class="ai-nutr-val" id="aiPro">—</div>
            <div class="ai-nutr-unit">g</div>
          </div>
          <div class="ai-nutr-item">
            <div class="ai-nutr-label">脂肪</div>
            <div class="ai-nutr-val" id="aiFat">—</div>
            <div class="ai-nutr-unit">g</div>
          </div>
          <div class="ai-nutr-item">
            <div class="ai-nutr-label">醣類</div>
            <div class="ai-nutr-val" id="aiCarb">—</div>
            <div class="ai-nutr-unit">g</div>
          </div>
          <div class="ai-nutr-item">
            <div class="ai-nutr-label">鈉</div>
            <div class="ai-nutr-val" id="aiSodium">—</div>
            <div class="ai-nutr-unit">mg</div>
          </div>
          <div class="ai-nutr-item">
            <div class="ai-nutr-label">纖維</div>
            <div class="ai-nutr-val" id="aiFib">—</div>
            <div class="ai-nutr-unit">g</div>
          </div>
        </div>
      </div>
      <!-- AI 初始建議 -->
      <div style="margin-top:14px">
        <div class="card-title" style="margin-bottom:4px">💡 AI 初始建議</div>
        <div class="ai-advice-box" id="aiAdvice">—</div>
      </div>
    </div>
  </div>
  <!-- ── RIGHT Panel ── -->
  <div class="panel" id="panel">
    <div class="p-section" id="panelProteinSection" style="display:none">
      <h3>🥩 蛋白質達標狀況</h3>
      <div class="protein-panel-box">
        <div class="protein-panel-row">
          <span class="protein-panel-key">每日建議量</span>
          <span class="protein-panel-val" id="panelProteinTarget" style="color:var(--blue)">—</span>
        </div>
        <div class="protein-panel-row">
          <span class="protein-panel-key">今日已攝取</span>
          <span class="protein-panel-val" id="panelProteinToday">—</span>
        </div>
        <div class="protein-panel-row" style="margin-top:4px">
          <span></span>
          <span class="protein-status-badge progress" id="panelProteinStatus" style="font-size:12px">—</span>
        </div>
      </div>
    </div>
    <div class="p-section">
      <h3>💬 常用建議劇本</h3>
      <div class="preset-grid" id="presetGrid"></div>
    </div>
    <div class="p-section">
      <h3>📝 審核建議（可編輯）</h3>
      <textarea class="advice-ta" id="adviceTA" rows="4" placeholder="點選上方劇本快速填入，或直接輸入…"></textarea>
    </div>
    <div class="p-section">
      <h3>⭐ 調整評分</h3>
      <div class="score-row">
        <div class="score-circle" id="scoreCircle">—</div>
        <div class="score-info">
          <div class="grade" id="scoreGrade">—</div>

async function init() {

function renderPresets() {

async function loadRecords() {
  setOverlay(true, '載入待審核列表…');
  try {
    const res = await fetch(LIST_WH, { method: 'GET' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const raw = Array.isArray(data) ? data : (data.records || []);
    records = raw.map(d => ({
      id:        d.id        || '',
      pid:       d.pid       || '',
      name:      d.name      || d.patientName || '',
      line_uid:  d.line_uid  || d.lineUid     || '',
      time:      d.time      || d.timestamp   || '',
      img_id:    d.img_id    || d['LINE圖片ID'] || '',
      img_url:   d.img_url   || d.photoUrl
                   || (d['LINE圖片ID'] ? 'https://huangcs.app.n8n.cloud/webhook/line-image?id=' + d['LINE圖片ID'] : ''),
      foods:     d.foods     || d.description || '',
      cal:       d.cal  ?? d.calories ?? 0,
      pro:       d.pro  ?? d.protein  ?? 0,
      fib:       d.fib  ?? d.fiber    ?? 0,
      carb:      d.carb ?? d.carbs    ?? 0,
      fat:       d.fat  ?? 0,
      sodium:    d.sodium ?? 0,
      score:     d.score    || '60',
      advice:    d.advice   || d.comment || '',
      nutritionist_advice: d.nutritionist_advice || '',
      status:    ({'待審核':'pending','已核准':'approved','已駁回':'rejected','pending':'pending','approved':'approved','rejected':'rejected'}[String(d.status||'').trim()] || 'pending'),
      weight:         d.weight         ?? null,
      protein_target: d.protein_target ?? null,
      webhook:        d.webhook        || REVIEW_WH,
      row_number:     d.row_number     || null,
    }));
    renderQueue();
    toast(`已載入 ${records.filter(r=>r.status==='pending'||!r.status).length} 筆待審核`);
  } catch(e) {
    console.error(e);
    records = [];
    renderQueue();
    toast('⚠️ 無法連線列表 API，請確認 n8n webhook 已啟用');
  }
  setOverlay(false);
}
function loadFromParams(sp) {
  const r = {
    id:      sp.get('id')     || 'PARAM_' + Date.now(),
    name:    dec(sp.get('name')),
    pid:     sp.get('pid')    || '',
    foods:   dec(sp.get('foods')),
    cal:     sp.get('cal')    || '0',
    pro:     sp.get('pro')    || '0',
    fib:     sp.get('fib')    || '0',
    carb:    sp.get('carb')   || '0',
    fat:     sp.get('fat')    || '0',
    score:   sp.get('score')  || '60',
    advice:  dec(sp.get('advice')),
    time:    sp.get('time')   || '',
    line_uid:sp.get('line_uid')|| '',
    img_url: sp.get('img_url')|| '',
    webhook: sp.get('webhook')|| REVIEW_WH,
    status:  'pending',
  };
  records = [r];
  renderQueue();
  selectRecord(0);
  setOverlay(false);
}
function renderQueue() {
  const pending = records.filter(r => !r.status || r.status === 'pending').length;
  document.getElementById('pendingBadge').textContent = `待審核 ${pending} 筆`;
  const q = document.getElementById('queue');
  if (records.length === 0) {
    q.innerHTML = '<div style="padding:24px;text-align:center;color:#bbb;font-size:13px">目前沒有待審核記錄</div>';
    return;
  }
  q.innerHTML = '';
  records.forEach((r, i) => {
    const item = document.createElement('div');
    const isPending = !r.status || r.status === 'pending';
    item.className = 'q-item' +
      (current && current.id === r.id ? ' active' : '') +
      (!isPending ? ' done' : '');
    const initial = (r.name || '?').charAt(0).toUpperCase();
    const badge = r.status === 'approved' ? 'approved' :
                  r.status === 'rejected' ? 'rejected' : 'pending';
    const badgeText = badge === 'approved' ? '已核准' : badge === 'rejected' ? '已駁回' : '待審核';
    item.onclick = function(e) { if (e.target.classList.contains('q-check')) return; selectRecord(i); };
    item.innerHTML = `
      <input type="checkbox" class="q-check" data-i="${i}"
        ${!isPending ? 'disabled' : ''}
        onclick="e=>e.stopPropagation()" onchange="countSel()">
      <div class="q-avatar">${initial}</div>
      <div class="q-info">
        <div class="q-name">${esc(r.name || '未知')}</div>
        <div class="q-meta">${esc(r.pid || '')} · ${relTime(r.time)}</div>
      </div>
      <span class="q-badge ${badge}">${badgeText}</span>`;
    q.appendChild(item);
  });
}
function selectRecord(i) {
  current = records[i];
  renderQueue();
  document.getElementById('emptyState').style.display  = 'none';
  document.getElementById('photoCard').style.display   = 'block';
  document.getElementById('patientCard').style.display = 'block';
  document.getElementById('dName').textContent = current.name  || '未知';
  document.getElementById('dPid').textContent  = current.pid   || '—';
  document.getElementById('dTime').textContent = relTime(current.time);
  document.getElementById('dId').textContent   = current.id    || '—';
  const fc = document.getElementById('foodChips');
  fc.innerHTML = '';
  (current.foods || '').split(/[,，、\n]/).map(f=>f.trim()).filter(Boolean).forEach(f => {
    const el = document.createElement('span');
    el.className = 'food-chip';
    el.textContent = f;
    fc.appendChild(el);
  });
  if (!fc.children.length) fc.innerHTML = '<span style="color:#bbb;font-size:12px">無資料</span>';
  // ── AI 估算營養素 填值 ──
  function fillNutr(id, val, isInt) {
    const el = document.getElementById(id);
    const num = parseFloat(val);
    if (!isNaN(num) && num > 0) {
      el.textContent = isInt ? Math.round(num) : num;
      el.className = 'ai-nutr-val';
    } else {
      el.textContent = '--';
      el.className = 'ai-nutr-val missing';
    }
  }
  fillNutr('aiCal',    current.cal,    true);
  fillNutr('aiPro',    current.pro,    false);
  fillNutr('aiFat',    current.fat,    false);
  fillNutr('aiCarb',   current.carb,   false);
  fillNutr('aiSodium', current.sodium, true);
  fillNutr('aiFib',    current.fib,    false);
  document.getElementById('aiAdvice').textContent = current.advice || '（無建議）';
  const pw = document.getElementById('photoWrap');
  if (current.img_url) {
    pw.innerHTML = `<img src="${current.img_url}" alt="餐食照片"
      onerror="this.parentElement.innerHTML='<div class=\\'photo-placeholder\\'><span>🍽️</span>照片無法載入</div>'">`;
  } else {
    pw.innerHTML = `<div class="photo-placeholder">
      <span>📷</span>照片尚未整合<br>
      <span style="font-size:11px;display:block;margin-top:4px;color:#ccc">需在 n8n 工作流程中儲存圖片 URL</span></div>`;
  }
  document.getElementById('adviceTA').value = current.advice || '';
  const sc = parseInt(current.score) || 60;
  document.getElementById('scoreSlider').value = sc;
  updateScore(sc);
  document.getElementById('vCal').value  = current.cal  || '';
  document.getElementById('vPro').value  = current.pro  || '';
  document.getElementById('vFib').value  = current.fib  || '';
  document.getElementById('vCarb').value = current.carb || '';
  document.getElementById('vFat').value  = current.fat  || '';
  const ok = !current.status || current.status === 'pending';
  document.getElementById('btnApprove').disabled = !ok;

}
function updateScore(v) {
  v = +v;
  const c = document.getElementById('scoreCircle');
  const g = document.getElementById('scoreGrade');
  c.textContent = v;
  if      (v >= 85) { c.style.background = '#2e7d32'; g.textContent = '優秀 🌟'; }
  else if (v >= 70) { c.style.background = '#388e3c'; g.textContent = '良好 👍'; }
  else if (v >= 60) { c.style.background = '#f57c00'; g.textContent = '尚可 🆗'; }
  else if (v >= 40) { c.style.background = '#e65100'; g.textContent = '待改善 ⚠️'; }
  else              { c.style.background = '#c62828'; g.textContent = '不佳 ❌'; }
}
function updateProteinDisplay(r) {
  const lineUid = r.line_uid || '';
  const section      = document.getElementById('proteinSection');
  const panelSection = document.getElementById('panelProteinSection');
  if (!lineUid) {
    section.style.display      = 'none';
    panelSection.style.display = 'none';
    return;
  }
  section.style.display      = 'block';
  panelSection.style.display = 'block';
  document.getElementById('proteinText').textContent        = '—';
  document.getElementById('proteinBarFill').style.width     = '0%';
  document.getElementById('proteinStatus').textContent      = '計算中…';
  document.getElementById('panelProteinTarget').textContent = '計算中…';
  document.getElementById('panelProteinToday').textContent  = '計算中…';
  document.getElementById('panelProteinStatus').textContent = '計算中…';
  fetchProteinData(lineUid)
    .then(({ target, consumed, weight }) => {
      if (!current || current.line_uid !== lineUid) return;
      renderProteinNumbers(target, consumed, weight || parseFloat(r.weight) || null);
    })
    .catch(err => {
      console.warn('Sheets 抓取失敗，改用 queue 估算:', err);
      const target = parseFloat(r.protein_target) || null;
      const todayStr = new Date().toDateString();
      const consumed = records
        .filter(rec => rec.pid === r.pid &&
          (() => { try { return new Date(rec.time).toDateString() === todayStr; } catch(e) { return false; } })())
        .reduce((sum, rec) => sum + (parseFloat(rec.pro) || 0), 0);
      renderProteinNumbers(target, consumed, parseFloat(r.weight) || null);
    });
}
/* ── 與 patient.html 完全一致：呼叫同一個 API 取得蛋白質資料 ── */
const PATIENT_API = 'https://huangcs.app.n8n.cloud/webhook/patient-history';

function _getTaipeiToday() {
  const now = new Date(Date.now() + 8 * 3600000);
  return now.toISOString().split('T')[0]; // YYYY-MM-DD
}
function _isToday(dateStr) {
  const today = _getTaipeiToday();
  const d = String(dateStr || '');
  const year = today.split('-')[0];
  const month = String(parseInt(today.split('-')[1]));
  const day   = String(parseInt(today.split('-')[2]));
  return d.includes(today) || d.startsWith(year + '/' + month + '/' + day);
}

async function fetchProteinData(lineUid) {
  const resp = await fetch(`${PATIENT_API}?userId=${encodeURIComponent(lineUid)}`);
  if (!resp.ok) throw new Error('API error ' + resp.status);
  const data = await resp.json();
  const recs = data.records || [];
  const target = data.patient?.recommendedProtein || null;
  const weight = data.patient?.weight || null;

  // 與 patient.html renderProteinProgress 完全一致的加總邏輯
  const todayRecs = recs.filter(r => _isToday(r.date));
  const consumed  = todayRecs.reduce((s, r) => s + (r.protein || 0), 0);

  return { target, consumed, weight };
}
async function fetchGSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const text = await fetch(url).then(r => r.text());
  return JSON.parse(text.replace(/^[^{]+/, '').replace(/\);?\s*$/, '')).table;
}
function renderProteinNumbers(target, consumed, weight) {
  const section      = document.getElementById('proteinSection');
  const panelSection = document.getElementById('panelProteinSection');
  if (!target) {
    section.style.display      = 'none';
    panelSection.style.display = 'none';
    return;
  }
  section.style.display      = 'block';
  panelSection.style.display = 'block';

  const total = consumed;
  const excess = weight ? weight * 2 : 0;
  const rec = target || 0;

  // — 與 patient.html 完全一致的顯示格式 —
  document.getElementById('proteinText').textContent =
    Math.round(total) + 'g' + (rec ? ' / ' + Math.round(rec) + 'g' : '');

  // — 進度條：以 excess (體重×2) 為滿格，與 patient.html 一致 —
  if (rec > 0) {
    const pct = excess > 0 ? Math.min((total / excess) * 100, 100) : 0;
    document.getElementById('proteinBarFill').style.width = pct + '%';

    let msg = '';
    if (total >= excess && excess > 0) {
      msg = '🚨 蛋白質過量喔！今日已攝取 ' + Math.round(total) + 'g，超過上限 ' + Math.round(excess) + 'g';
    } else if (total >= rec) {
      msg = '🎉 恭喜達標！今日蛋白質共 ' + Math.round(total) + 'g，目標 ' + Math.round(rec) + 'g）';
    } else {
      msg = '💪 距離目標還有 ' + Math.round(rec - total) + 'g，加油！';
    }
    document.getElementById('proteinStatus').textContent = msg;
  } else {
    document.getElementById('proteinBarFill').style.width = '0%';
    document.getElementById('proteinStatus').textContent = '今日攝取：' + Math.round(total) + 'g';
  }

  // — 右側面板同步更新 —
  document.getElementById('panelProteinTarget').textContent = rec ? Math.round(rec) + ' g' : '—';
  document.getElementById('panelProteinToday').textContent  = Math.round(total) + ' g';
  let panelStatus = '';
  if (total >= excess && excess > 0) panelStatus = '🚨 過量';
  else if (total >= rec && rec > 0) panelStatus = '🎉 已達標';
  else if (rec > 0) panelStatus = '💪 還差 ' + Math.round(rec - total) + 'g';
  const panelBadge = document.getElementById('panelProteinStatus');
  panelBadge.textContent = panelStatus || '—';
  panelBadge.className   = total >= excess && excess > 0 ? 'protein-status-badge excess'
                         : total >= rec && rec > 0       ? 'protein-status-badge achieved'
                         :                                  'protein-status-badge progress';
}
function toggleSelectAll() {
  allSel = !allSel;
  document.querySelectorAll('.q-check:not(:disabled)').forEach(c => c.checked = allSel);
  document.getElementById('btnSelectAll').textContent = allSel ? '取消全選' : '全選';
  countSel();
}
function countSel() {
  const n = document.querySelectorAll('.q-check:checked').length;
  document.getElementById('selCount').textContent = n;
  document.getElementById('btnBatch').disabled = n === 0;
}
async function batchApprove() {
  const checked = [...document.querySelectorAll('.q-check:checked')];
  if (!checked.length) return;
  const score  = document.getElementById('scoreSlider').value;
  const advice = document.getElementById('adviceTA').value;
  if (!confirm(`批次核准 ${checked.length} 筆記錄？\n評分：${score} 分`)) return;
  setOverlay(true, `批次核准中 0 / ${checked.length}…`);
  let ok = 0;
  for (const c of checked) {
    const i = +c.dataset.i;
    try {
      await post(records[i].webhook || REVIEW_WH, buildPayload(records[i], 'approve', score, advice));
      records[i].status = 'approved';
      ok++;
      setOverlay(true, `批次核准中 ${ok} / ${checked.length}…`);
    } catch(e) { console.error(e); }
  }
  setOverlay(false);
  renderQueue();
  countSel();
  toast(`✅ 批次核准完成，成功 ${ok} 筆`);
}
async function submitReview(action) {
  if (!current) return;
  const score  = document.getElementById('scoreSlider').value;
  const advice = document.getElementById('adviceTA').value;
  const label  = action === 'approve' ? '核准' : '駁回';
  if (!confirm(`確定${label}「${current.name}」？`)) return;
  setOverlay(true, `送出${label}中…`);
  try {
    await post(current.webhook || REVIEW_WH, buildPayload(current, action, score, advice));
    const idx = records.findIndex(r => r.id === current.id);
    if (idx >= 0) records[idx].status = action === 'approve' ? 'approved' : 'rejected';
    renderQueue();
    document.getElementById('btnApprove').disabled = true;
    toast(action === 'approve' ? '✅ 已核准並通知病患' : '❌ 已駁回此記錄');
    const next = records.findIndex(r => !r.status || r.status === 'pending');
    if (next >= 0) setTimeout(() => selectRecord(next), 500);
  } catch(e) {
    toast('⚠️ 送出失敗：' + e.message);
  }
  setOverlay(false);
}
function buildPayload(r, action, score, advice) {
  return {
    action,
    id:             r.id,
    line_uid:       r.line_uid,
    reviewerLineUid:reviewerUID,
    score:          parseInt(score),
    advice:         advice || r.advice || '',
    cal:  parseFloat(document.getElementById('vCal').value)  || r.cal  || 0,
    pro:  parseFloat(document.getElementById('vPro').value)  || r.pro  || 0,
    fib:  parseFloat(document.getElementById('vFib').value)  || r.fib  || 0,
    carb: parseFloat(document.getElementById('vCarb').value) || r.carb || 0,
    fat:  parseFloat(document.getElementById('vFat').value)  || r.fat  || 0,
  };
}
async function post(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r;
}
function setOverlay(show, text = '處理中…') {
  const el = document.getElementById('overlay');
  el.style.display = show ? 'flex' : 'none';
  document.getElementById('overlayText').textContent = text;
}
let _toastTimer;
function toast(msg, ms = 3200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}
function relTime(s) {
  if (!s) return '—';
  try {
    let str = String(s);
    if (str.includes('上午') || str.includes('下午')) {
      const isPM = str.includes('下午');
      str = str.replace(/[上下]午/, '').trim();
      if (isPM) {
        str = str.replace(/(\d+):(\d+):(\d+)/, (m, h, mi, sc) => {
          const hr = parseInt(h);
          return (hr < 12 ? hr + 12 : hr) + ':' + mi + ':' + sc;
        });
      }
    }
    const d   = new Date(str);
    if (isNaN(d.getTime())) return s;
    const now = new Date();
    const diff = now - d;
    if (diff < 60000)       return '剛剛';
    if (diff < 3600000)     return Math.floor(diff/60000) + ' 分鐘前';
    if (diff < 86400000)    return Math.floor(diff/3600000) + ' 小時前';
    return d.toLocaleDateString('zh-TW') + ' ' +
           d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return s; }
}
function dec(v) {
  try { return v ? decodeURIComponent(v) : ''; } catch(e) { return v || ''; }
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
init();
