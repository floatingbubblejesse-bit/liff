    // ====== 看診紀錄（收折卡片，類似 Flex Message）======
    var dietHistoryCache = null;
    var _histPrefetchPromise = null;

    // 預取看診紀錄（頁面載入時立即呼叫）
    function _prefetchDietHistory() {
        if (dietHistoryCache || _histPrefetchPromise) return;
        // cache-first：先用快取渲染
        var cached = pvLoadCache('pv_hist', patientSn);
        if (cached && cached.length > 0) {
            dietHistoryCache = cached;
            if (activeTab === 'history') renderHistoryCards(document.getElementById('historyContent'), cached);
        }
        _histPrefetchPromise = fetch(MEALS_GAS + '?dietHistory=' + encodeURIComponent(patientSn))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var records = data.records || [];
                if (records.length > 0) {
                    pvSaveCache('pv_hist', patientSn, records);
                    dietHistoryCache = records;
                    if (activeTab === 'history') renderHistoryCards(document.getElementById('historyContent'), records);
                }
            })
            .catch(function() {});
    }

    function renderHistoryTab() {
        if (dietHistoryCache) { renderHistoryCards(document.getElementById('historyContent'), dietHistoryCache); return; }
        var el = document.getElementById('historyContent');
        // 預取還在跑，等它完成
        if (_histPrefetchPromise) {
            el.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa"><div class="spinner" style="margin:0 auto 12px"></div>載入看診紀錄中…</div>';
            _histPrefetchPromise.then(function() {
                if (dietHistoryCache) { renderHistoryCards(el, dietHistoryCache); }
                else { renderHistoryFallback(el); }
            });
            return;
        }
        el.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa"><div class="spinner" style="margin:0 auto 12px"></div>載入看診紀錄中…</div>';
        // fallback：直接 fetch
        fetch(MEALS_GAS + '?dietHistory=' + encodeURIComponent(patientSn))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var records = data.records || [];
                if (records.length === 0) {
                    renderHistoryFallback(el);
                } else {
                    dietHistoryCache = records;
                    renderHistoryCards(el, records);
                }
            })
            .catch(function() {
                renderHistoryFallback(el);
            });
    }

    function renderHistoryFallback(el) {
        // 從目前頁面上的資料組成一筆「本次」紀錄
        var rec = parseInt(document.getElementById('proteinInput').value) || 0;
        if (rec <= 0) { el.innerHTML = '<div class="no-history">尚無看診紀錄<br><span style="font-size:12px">請先在「醫生建議」頁儲存飲食計劃</span></div>'; return; }
        var today = new Date();
        var record = buildCurrentRecord(today, rec);
        dietHistoryCache = [record];
        renderHistoryCards(el, [record]);
    }

    // 當 DOM 尚未渲染飲食計畫時，用公式算出各碳日代餐 & Q寶包數
    function calcPacksForType(p, protein) {
        var packs = protein <= 110 ? 2 : 3;
        if (p === 'fast') return { mr: 6, qb: 2 };
        if (p === 'low') return { mr: Math.min(packs + 1, 3), qb: 1 };
        // mid, high 代餐包數相同
        return { mr: packs, qb: (p === 'high' ? 0 : 0) };
    }

    function buildCurrentRecord(date, protein) {
        var packs = protein <= 110 ? 2 : 3;
        // 取得排程中用到的碳日類型
        var usedTypes = [];
        cycleSchedule.forEach(function(t) { if (usedTypes.indexOf(t) === -1) usedTypes.push(t); });
        // 收集各碳日餐食
        var dayPlans = {};
        var DAY_ORDER = ['mid','high','low','fast'];
        usedTypes.sort(function(a,b){ return DAY_ORDER.indexOf(a) - DAY_ORDER.indexOf(b); });
        // 檢查 DOM 是否有飲食計畫資料
        var domReady = !!document.getElementById('mid-d-0-0');
        usedTypes.forEach(function(p) {
            var meals = [];
            var mr = 0, qb = 0;
            if (domReady) {
                var plan = getDietPlanData(p);
                for (var m = 0; m < MEAL_COUNT; m++) {
                    var row = plan[m];
                    var allDash = row.every(function(v){ return v === '-' || v === '0' || v === 0 || v === ''; });
                    if (allDash) continue;
                    var parts = [];
                    var seps = [];
                    for (var f = 0; f < DIET_COLS.length; f++) {
                        var val = row[f];
                        if (val === '-' || val === '0' || val === 0 || val === '') continue;
                        var col = DIET_COLS[f];
                        var unit = col.unit.replace(/[()]/g, '');
                        var sep = col.sep || '→';
                        if (parts.length > 0) seps.push(sep);
                        if (col.type === 'number') { parts.push(col.label + val + unit); }
                        else if (val === '1') { parts.push(col.label + (unit ? '1'+unit : '')); }
                        else { parts.push(col.label + val); }
                    }
                    var itemStr = '';
                    for (var pi = 0; pi < parts.length; pi++) {
                        if (pi > 0) itemStr += ' ' + seps[pi-1] + ' ';
                        itemStr += parts[pi];
                    }
                    meals.push({ name: MEAL_NAMES[m], icon: MEAL_ICONS[m], items: itemStr });
                }
                for (var m2 = 0; m2 < MEAL_COUNT; m2++) {
                    if (plan[m2][0] === '1') mr++;
                    if (plan[m2][5] === '1') qb++;
                }
            } else {
                // DOM 尚未渲染，用公式計算包數
                var calc = calcPacksForType(p, protein);
                mr = calc.mr;
                qb = calc.qb;
            }
            var dayProtein = (p === 'fast') ? 120 : (p === 'low') ? (protein + 20) : protein;
            dayPlans[p] = { meals: meals, mr: mr, qb: qb, protein: dayProtein };
        });
        // 計算全週
        var weeklyMr = 0, weeklyQb = 0;
        cycleSchedule.forEach(function(t) {
            if (dayPlans[t]) { weeklyMr += dayPlans[t].mr; weeklyQb += dayPlans[t].qb; }
        });
        var totalMr = weeklyMr * cycleWeeks;
        var totalQb = weeklyQb * cycleWeeks;
        return {
            date: date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0'),
            protein: protein,
            schedule: cycleSchedule.slice(),
            weeks: cycleWeeks,
            dayPlans: dayPlans,
            weeklyMr: weeklyMr,
            weeklyQb: weeklyQb,
            totalMr: totalMr,
            totalQb: totalQb,
            note: '',
            isCurrent: true
        };
    }

    function renderHistoryCards(el, records) {
        var html = '';
        // 按日期倒序
        records.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
        for (var i = 0; i < records.length; i++) {
            html += buildHistoryCard(records[i], i);
        }
        el.innerHTML = html;
    }

    function buildHistoryCard(rec, idx) {
        var d = rec.date || '';
        var parts = d.split('-');
        var month = parts.length > 1 ? parseInt(parts[1]) + '月' : '';
        var day = parts.length > 2 ? parseInt(parts[2]) : '';
        var yearStr = parts.length > 0 ? parts[0] + '年' : '';
        var isOpen = idx === 0 ? ' open' : '';

        var dayLabels = {high:'高碳日', low:'低碳日', mid:'中碳日', fast:'斷食日'};
        var dayColors = {high:'#A0626B', low:'#6B8F71', mid:'#B8926A', fast:'#4A4A4A'};
        var cycleLabels = {high:'高', low:'低', mid:'中', fast:'斷'};
        var cycleCls = {high:'t-high', low:'t-low', mid:'t-mid', fast:'t-fast'};
        var DAYS = ['六','日','一','二','三','四','五'];

        var schedule = rec.schedule || [];
        var subParts = [];
        if (rec.protein) subParts.push('蛋白質 ' + rec.protein + 'g');
        if (rec.weeks) subParts.push('共' + rec.weeks + '週');

        var html = '<div class="hx-card' + isOpen + '" id="hxCard' + idx + '">';
        // ── Header ──
        html += '<div class="hx-header" onclick="toggleHxCard(' + idx + ')">';
        html += '<div class="hx-date-icon"><div class="hx-date-month">' + esc(month) + '</div><div class="hx-date-day">' + esc(String(day)) + '</div></div>';
        html += '<div class="hx-header-info">';
        html += '<div class="hx-header-title">📋 ' + esc(yearStr + month + day + '日') + ' 看診' + (rec.isCurrent ? ' <span style="font-size:10px;color:#8B9D83;background:#E8EDE6;padding:1px 6px;border-radius:8px">本次</span>' : '') + '</div>';
        html += '<div class="hx-header-sub">' + esc(subParts.join('　')) + '</div>';
        html += '</div>';
        html += '<span class="hx-arrow">▼</span>';
        html += '</div>';

        // ── Body ──
        html += '<div class="hx-body">';

        // 排程區
        if (schedule.length === 7) {
            html += '<div class="hx-section">';
            html += '<div class="hx-section-title">📅 碳水循環排程</div>';
            html += '<div class="hx-schedule-row">';
            for (var s = 0; s < 7; s++) {
                var ck = schedule[s] || 'mid';
                html += '<div class="hx-sch-day"><div class="hx-sch-day-label">' + DAYS[s] + '</div>';
                html += '<div class="hx-sch-day-btn ' + (cycleCls[ck]||'t-mid') + '">' + (cycleLabels[ck]||'?') + '</div></div>';
            }
            html += '</div></div>';
        }

        // 週數 & 代餐 & Q寶
        if (rec.weeklyMr > 0 || rec.weeklyQb > 0) {
            var rWeeks = rec.weeks || 1;
            var rTotalMr = rec.totalMr || (rec.weeklyMr * rWeeks);
            var rTotalQb = rec.totalQb || (rec.weeklyQb * rWeeks);
            html += '<div class="hx-section">';
            html += '<div class="hx-section-title">📦 共 ' + rWeeks + ' 週</div>';
            html += '<div class="hx-packs-row">';
            if (rec.weeklyMr > 0) html += '<span class="hx-pack-badge hx-pack-mr">🥤 代餐 ' + rec.weeklyMr + '包/週 × ' + rWeeks + '週 = ' + rTotalMr + '包</span>';
            if (rec.weeklyQb > 0) html += '<span class="hx-pack-badge hx-pack-qb">💊 Q寶 ' + rec.weeklyQb + '包/週 × ' + rWeeks + '週 = ' + rTotalQb + '包</span>';
            html += '</div></div>';
        }

        // 各碳日餐食（排序：中高低斷）— 只顯示排程中實際存在的碳日類型
        var dayPlans = rec.dayPlans || {};
        var dayOrder = ['mid','high','low','fast'];
        var dayEmojis = {high:'🔴', low:'🟢', mid:'🟡', fast:'⚪'};
        var scheduleSet = {};
        if (schedule.length > 0) {
            for (var si = 0; si < schedule.length; si++) { scheduleSet[schedule[si]] = true; }
        }
        var sortedDpKeys = dayOrder.filter(function(k){ return dayPlans[k] && (schedule.length === 0 || scheduleSet[k]); });
        sortedDpKeys.forEach(function(p) {
            var dp = dayPlans[p];
            var dotColor = dayColors[p] || '#888';
            html += '<div class="hx-section">';
            var dpProtein = dp.protein ? ('　' + dp.protein + 'g') : '';
            html += '<div class="hx-day-label" style="margin-bottom:8px">' + (dayEmojis[p]||'●') + ' ' + esc(dayLabels[p] || p) + dpProtein + '</div>';
            if (dp.meals && dp.meals.length > 0) {
                dp.meals.forEach(function(meal) {
                    html += '<div class="hx-meal-row">';
                    html += '<span class="hx-meal-name">' + meal.icon + meal.name + '</span>';
                    html += '<span class="hx-meal-items">' + esc(meal.items) + '</span>';
                    html += '</div>';
                });
            }
            html += '</div>';
        });

        // 醫師建議
        if (rec.note) {
            html += '<div class="hx-section">';
            html += '<div class="hx-section-title">💬 醫師建議</div>';
            html += '<div class="hx-note">' + esc(rec.note) + '</div>';
            html += '</div>';
        }

        html += '</div></div>';
        return html;
    }

    }

    // ====== 居家體重紀錄 tab ======
    var hwWeightData = {};   // { 'YYYY-MM-DD': { weight: 55.1 } }
    var hwLoaded = false;
    var hwLoading = false;
    var hwChartInstance = null;
    var HW_CYCLE_OPTS = [
        {key:'high', label:'高', cls:'t-high'},
        {key:'mid',  label:'中', cls:'t-mid'},
        {key:'low',  label:'低', cls:'t-low'},
        {key:'fast', label:'斷', cls:'t-fast'},

    ];

    (function hwInit() {

    function hwFormatDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    // 預取居家體重（頁面載入時立即呼叫，不等使用者切 tab）
    var _hwPrefetchPromise = null;
    function _hwApplyRecords(records) {
        records.forEach(function(rec) {
            if (rec.date && rec.weight) {
                hwWeightData[rec.date] = { weight: parseFloat(rec.weight), dayType: rec.dayType || '' };
            }
        });
    }
    function _prefetchHomeWeight() {
        if (hwLoaded || hwLoading || _hwPrefetchPromise) return;
        // cache-first：先用快取渲染
        var cached = pvLoadCache('pv_hw', patientSn);
        if (cached && cached.length > 0) {
            _hwApplyRecords(cached);
            hwLoaded = true;
            if (activeTab === 'weight') hwRenderAll();
        }
        _hwPrefetchPromise = fetch(MEALS_GAS + '?homeWeight=' + encodeURIComponent(patientSn))
            .then(function(r){ return r.json(); })
            .then(function(data){
                hwLoaded = true;
                if (data && data.records) {
                    pvSaveCache('pv_hw', patientSn, data.records);
                    hwWeightData = {}; // 清空再填入最新
                    _hwApplyRecords(data.records);
                }
                if (activeTab === 'weight') hwRenderAll();
            })
            .catch(function(e){ hwLoaded = true; console.log('[居家體重] 預取失敗:', e); });
    }

    function loadHomeWeight() {
        if (hwLoaded) {
            hwRenderAll();
            return;
        }
        // 預取還在跑，等它完成後渲染
        if (_hwPrefetchPromise) {
            _hwPrefetchPromise.then(function(){ hwRenderAll(); });
            return;
        }
        // fallback：直接 fetch
        hwLoading = true;
        fetch(MEALS_GAS + '?homeWeight=' + encodeURIComponent(patientSn))
            .then(function(r){ return r.json(); })
            .then(function(data){
                hwLoading = false;
                hwLoaded = true;
                if (data && data.records) {
                    data.records.forEach(function(rec) {
                        if (rec.date && rec.weight) {
                            hwWeightData[rec.date] = { weight: parseFloat(rec.weight), dayType: rec.dayType || '' };
                        }
                    });
                }
                hwRenderAll();
            })
            .catch(function(e){
                hwLoading = false;
                hwLoaded = true;
                console.log('[居家體重] 載入失敗:', e);
                hwRenderAll();
            });
    }

    function hwRenderAll() {

    // 取得當天碳日類型（複用 dietPlan 排程資料）
    function hwGetDayType(dateObj) {
        if (!hwVisitRecords || hwVisitRecords.length === 0) return 'none';
        var dateStr = hwFormatDate(dateObj);
        var applicableVisit = null;
        for (var i = hwVisitRecords.length - 1; i >= 0; i--) {
            var vd = hwVisitRecords[i].date;
            if (vd && vd <= dateStr) { applicableVisit = hwVisitRecords[i]; break; }
        }
        if (!applicableVisit || !applicableVisit.date) return 'none';
        var vParts = applicableVisit.date.split('-');
        var vDate = new Date(parseInt(vParts[0]), parseInt(vParts[1])-1, parseInt(vParts[2]));
        var sch = applicableVisit.schedule;
        var weeks = applicableVisit.weeks || 4;
        // 排程從看診隔天開始
        var startDate = new Date(vDate.getFullYear(), vDate.getMonth(), vDate.getDate() + 1);
        var endDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + (weeks * 7) - 1);
        var d = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
        if (d < startDate || d > endDate) return 'none';
        var jsDay = dateObj.getDay();
        var schIdx;
        if (jsDay === 0) schIdx = 1;
        else if (jsDay === 6) schIdx = 0;
        else schIdx = jsDay + 1;
        return sch[schIdx] || 'mid';
    }

    var hwVisitRecords = [];

    // 載入排程資料（供日曆碳日標示用）
    function hwLoadSchedule() {
        // cache-first
        var cached = pvLoadCache('pv_sch', patientSn);
        if (cached && cached.schedule) {
            hwVisitRecords = [cached];
            if (hwLoaded) { hwRenderCalendar(); hwUpdateStats(); }
        }
        fetch(MEALS_GAS + '?dietPlan=' + encodeURIComponent(patientSn))
            .then(function(r){ return r.json(); })
            .then(function(data){
                if (data.schedule && data.schedule.length === 7) {
                    var planDate = hwParseDateToYMD(data.date);
                    if (!planDate) planDate = hwFormatDate(new Date());
                    var record = {
                        date: planDate,
                        schedule: data.schedule,
                        weeks: data.weeks || 4
                    };
                    pvSaveCache('pv_sch', patientSn, record);
                    hwVisitRecords = [record];
                    if (hwLoaded) { hwRenderCalendar(); hwUpdateStats(); }
                }
            })
            .catch(function(){});
    }

    function hwParseDateToYMD(dateVal) {
        if (!dateVal) return '';
        if (typeof dateVal === 'string' && /^\d{4}-\d{2}-\d{2}/.test(dateVal)) return dateVal.substring(0, 10);
        var d = new Date(dateVal);
        if (isNaN(d.getTime())) return '';
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    // 排程一律在預取階段載入（不等使用者切 tab）
    var hwScheduleLoaded = true;
    hwLoadSchedule();
    var origLoadHomeWeight = loadHomeWeight;
    loadHomeWeight = function() {
        origLoadHomeWeight();
    };

    // ── 萬年曆狀態 ──
    var _hwCalStartMonth = -6;   // 起始偏移（相對於今天月份）
    var _hwCalEndMonth = 3;      // 結束偏移
    var _hwCalCollapsed = true;
    var _hwCalBusy = false;

    function hwToggleCal() {
        _hwCalCollapsed = !_hwCalCollapsed;
        var wrap = document.getElementById('hwCalWrap');
        var arrow = document.getElementById('hwCalArrow');
        var todayBtn = document.getElementById('hwTodayBtn');
        if (wrap) wrap.classList.toggle('collapsed', _hwCalCollapsed);
        if (arrow) arrow.classList.toggle('collapsed', _hwCalCollapsed);
        if (todayBtn) todayBtn.style.display = _hwCalCollapsed ? 'none' : '';
    }

    // 產生日期格 HTML（從 dateA 到 dateB，含首尾）
    function hwBuildCells(dateA, dateB) {
        var todayStr = hwFormatDate(new Date());
        var html = '';
        var cursor = new Date(dateA.getTime());
        while (cursor <= dateB) {
            var dateStr = hwFormatDate(cursor);
            var isToday = dateStr === todayStr;
            var curDow = cursor.getDay();
            var isSat = curDow === 6, isSun = curDow === 0;
            var dayOfMonth = cursor.getDate();
            var curMonth = cursor.getMonth();
            var isFirstOfMonth = dayOfMonth === 1;
            var isFirstOfYear = isFirstOfMonth && curMonth === 0;

            var savedData = hwWeightData[dateStr];
            var savedWeight = savedData ? savedData.weight : '';
            var dayType = (savedData && savedData.dayType) ? savedData.dayType : hwGetDayType(cursor);
            var opt = HW_CYCLE_OPTS.find(function(o){ return o.key === dayType; }) || HW_CYCLE_OPTS[4];

            var cellCls = 'hw-cal-cell' + (isToday ? ' today' : '') + (isSat ? ' sat' : '') + (isSun ? ' sun' : '');
            html += '<div class="' + cellCls + '" id="hwD' + dateStr + '">';
            if (isFirstOfYear) {
                html += '<div class="hw-cal-year-label">' + cursor.getFullYear() + '</div>';
            }
            if (isFirstOfMonth) {
                html += '<div class="hw-cal-month-label">' + (curMonth + 1) + '月</div>';
            }
            html += '<div class="hw-cal-date">' + dayOfMonth + '</div>';
            html += '<div class="hw-cal-type ' + opt.cls + '">' + opt.label + '</div>';
            if (savedWeight) {
                html += '<div class="hw-cal-wt">' + savedWeight + '</div>';
            }
            html += '</div>';
            cursor.setDate(cursor.getDate() + 1);
        }
        return html;
    }

    // 找到某日期當週或之前的星期六
    function hwPrevSat(d) {
        var daysBack = (d.getDay() + 1) % 7;
        return new Date(d.getFullYear(), d.getMonth(), d.getDate() - daysBack);
    }
    // 找到某日期當週或之後的星期五
    function hwNextFri(d) {
        var daysForward = (5 - d.getDay() + 7) % 7;
        return new Date(d.getFullYear(), d.getMonth(), d.getDate() + daysForward);
    }

    function hwRenderCalendar() {
        var wrap = document.getElementById('hwCalWrap');
        if (!wrap) return;
        var prevScroll = wrap.scrollTop;
        var isFirst = !wrap.querySelector('.hw-cal-grid');

        var today = new Date();

        var rangeStart = new Date(today.getFullYear(), today.getMonth() + _hwCalStartMonth, 1);
        var rangeEnd = new Date(today.getFullYear(), today.getMonth() + _hwCalEndMonth + 1, 0);
        var calStart = hwPrevSat(rangeStart);
        var calEnd = hwNextFri(rangeEnd);

        // 星期列（sticky）：六日一二三四五
        var weekdays = ['六','日','一','二','三','四','五'];
        var weekCls = ['sat','sun','','','','',''];
        var headerHtml = '<div class="hw-cal-weekday-bar">';
        for (var w = 0; w < 7; w++) {
            headerHtml += '<div class="hw-cal-weekday ' + weekCls[w] + '">' + weekdays[w] + '</div>';
        }
        headerHtml += '</div>';

        var gridHtml = '<div class="hw-cal-grid" id="hwCalGrid">' + hwBuildCells(calStart, calEnd) + '</div>';
        wrap.innerHTML = headerHtml + gridHtml;

        if (isFirst) {
            hwScrollToToday();
            // 綁定無限滾動
            wrap.addEventListener('scroll', hwOnScroll);
        } else {
            wrap.scrollTop = prevScroll;
        }
    }

    // ── 無限滾動 ──
    function hwOnScroll() {
        if (_hwCalBusy) return;
        var wrap = document.getElementById('hwCalWrap');
        if (!wrap) return;
        var threshold = 200;

        // 滑到頂部 → 往前加載 6 個月
        if (wrap.scrollTop < threshold) {
            _hwCalBusy = true;
            var oldH = wrap.scrollHeight;
            var oldS = wrap.scrollTop;
            var today = new Date();
            var prevStartMonth = _hwCalStartMonth;
            _hwCalStartMonth -= 6;
            var newStart = new Date(today.getFullYear(), today.getMonth() + _hwCalStartMonth, 1);
            var newEnd = new Date(today.getFullYear(), today.getMonth() + prevStartMonth, 0);
            var calStart = hwPrevSat(newStart);
            var calEnd = hwNextFri(newEnd);
            var grid = document.getElementById('hwCalGrid');
            if (grid) {
                var html = hwBuildCells(calStart, calEnd);
                grid.insertAdjacentHTML('afterbegin', html);
                // 維持視覺位置
                wrap.scrollTop = oldS + (wrap.scrollHeight - oldH);
            }
            _hwCalBusy = false;
        }

        // 滑到底部 → 往後加載 6 個月
        if (wrap.scrollTop + wrap.clientHeight > wrap.scrollHeight - threshold) {
            _hwCalBusy = true;
            var today2 = new Date();
            var prevEndMonth = _hwCalEndMonth;
            _hwCalEndMonth += 6;
            var newStart2 = new Date(today2.getFullYear(), today2.getMonth() + prevEndMonth + 1, 1);
            var newEnd2 = new Date(today2.getFullYear(), today2.getMonth() + _hwCalEndMonth + 1, 0);
            var calStart2 = hwPrevSat(newStart2);
            var calEnd2 = hwNextFri(newEnd2);
            var grid2 = document.getElementById('hwCalGrid');
            if (grid2) {
                grid2.insertAdjacentHTML('beforeend', hwBuildCells(calStart2, calEnd2));
            }
            _hwCalBusy = false;
        }
    }

    function hwScrollToToday() {
        var wrap = document.getElementById('hwCalWrap');
        var todayEl = document.getElementById('hwD' + hwFormatDate(new Date()));
        if (wrap && todayEl) {
            if (_hwCalCollapsed) hwToggleCal();
            setTimeout(function() {
                var elRect = todayEl.getBoundingClientRect();
                var wrapRect = wrap.getBoundingClientRect();
                wrap.scrollTop += elRect.top - wrapRect.top - wrap.clientHeight / 2 + todayEl.clientHeight / 2;
            }, 80);
        }
    }

    // ── 統計格（三格點選） ──

    var _hwWeekStats = [];
    var _hwStatMinW = null;
    var _hwStatMaxW = null;
    var _hwPeriodDiff = null;

    function hwUpdateStats() {
        var allKeys = Object.keys(hwWeightData).filter(function(k) {
            return hwWeightData[k].weight;
        }).sort();

        // 計算排程起止日
        var scheduleStart = null;
        var scheduleEnd = null;
        if (hwVisitRecords.length > 0) {
            var vr = hwVisitRecords[hwVisitRecords.length - 1];
            var vParts = vr.date.split('-');
            var vDate = new Date(parseInt(vParts[0]), parseInt(vParts[1]) - 1, parseInt(vParts[2]));
            scheduleStart = new Date(vDate.getFullYear(), vDate.getMonth(), vDate.getDate() + 1);
            var weeks = vr.weeks || 4;
            scheduleEnd = new Date(scheduleStart.getFullYear(), scheduleStart.getMonth(), scheduleStart.getDate() + weeks * 7 - 1);
        }

        // 排程資訊列
        var schBar = document.getElementById('hwScheduleBar');
        if (schBar) {
            if (scheduleStart && scheduleEnd) {
                var sL = (scheduleStart.getMonth()+1) + '/' + scheduleStart.getDate() + '(' + HW_DAY_NAMES[scheduleStart.getDay()] + ')';
                var eL = (scheduleEnd.getMonth()+1) + '/' + scheduleEnd.getDate() + '(' + HW_DAY_NAMES[scheduleEnd.getDay()] + ')';
                var wks = hwVisitRecords.length > 0 ? (hwVisitRecords[hwVisitRecords.length-1].weeks || 4) : 4;
                schBar.innerHTML = '最新排程期間　<span style="color:var(--blue);font-weight:700">' + sL + ' ~ ' + eL + '</span>　' + wks + ' 週';
                schBar.style.display = 'block';
            } else {
                schBar.style.display = 'none';
            }
        }

        var rangeKeys = allKeys;
        if (scheduleStart && scheduleEnd) {
            var sStr = hwFormatDate(scheduleStart);
            var eStr = hwFormatDate(scheduleEnd);
            rangeKeys = allKeys.filter(function(k) { return k >= sStr && k <= eStr; });
        }

        var count = rangeKeys.length;
        var first = count > 0 ? hwWeightData[rangeKeys[0]].weight : null;
        var last = count > 0 ? hwWeightData[rangeKeys[rangeKeys.length - 1]].weight : null;
        var minW = null, maxW = null;
        for (var mi = 0; mi < allKeys.length; mi++) {
            var w = hwWeightData[allKeys[mi]].weight;
            if (w) {
                if (minW === null || w < minW) minW = w;
                if (maxW === null || w > maxW) maxW = w;
            }
        }
        _hwStatMinW = minW;
        _hwStatMaxW = maxW;

        // 歷史變化
        if (allKeys.length >= 2) {
            var hFirst = hwWeightData[allKeys[0]].weight;
            var hLast = hwWeightData[allKeys[allKeys.length - 1]].weight;
            _hwHistoryDiff = (hFirst && hLast) ? hLast - hFirst : null;
        } else {
            _hwHistoryDiff = null;
        }

        // 左格：最低/最高
        var elL = document.getElementById('hwStatLeft');
        if (_hwShowMaxWeight) {
            elL.textContent = maxW !== null ? maxW.toFixed(1) : '-';
        } else {
            elL.textContent = minW !== null ? minW.toFixed(1) : '-';
        }

        // 週變化
        _hwWeekStats = [];
        if (scheduleStart && rangeKeys.length > 0) {
            var ws = new Date(scheduleStart.getTime());
            var weekNum = 1;
            while (true) {
                var we = new Date(ws.getTime());
                we.setDate(we.getDate() + 6);
                var wsStr = hwFormatDate(ws);
                var weStr = hwFormatDate(we);
                var wk = rangeKeys.filter(function(k) { return k >= wsStr && k <= weStr; });
                if (wk.length >= 2) {
                    var wf = hwWeightData[wk[0]].weight;
                    var wl = hwWeightData[wk[wk.length - 1]].weight;
                    _hwWeekStats.push({ label: '第' + weekNum + '週', diff: wl - wf });
                } else if (wk.length === 1) {
                    _hwWeekStats.push({ label: '第' + weekNum + '週', diff: null });
                }
                ws = new Date(ws.getTime());
                ws.setDate(ws.getDate() + 7);
                weekNum++;
                if (hwFormatDate(ws) > hwFormatDate(scheduleEnd)) break;
                if (weekNum > 52) break;
            }
        }
        // 平均一週
        if (first && last && rangeKeys.length >= 2) {
            var d0 = rangeKeys[0].split('-');
            var d1 = rangeKeys[rangeKeys.length - 1].split('-');
            var daySpan = Math.round((new Date(parseInt(d1[0]), parseInt(d1[1]) - 1, parseInt(d1[2])) - new Date(parseInt(d0[0]), parseInt(d0[1]) - 1, parseInt(d0[2]))) / 86400000);
            if (daySpan > 0) {
                _hwWeekStats.push({ label: '平均一週', diff: (last - first) / daySpan * 7 });
            }
        }
        var avgIdx = -1;
        for (var si = 0; si < _hwWeekStats.length; si++) {
            if (_hwWeekStats[si].label === '平均一週') { avgIdx = si; break; }
        }
        if (_hwWeekStatIndex < 0 || _hwWeekStatIndex >= _hwWeekStats.length) _hwWeekStatIndex = avgIdx >= 0 ? avgIdx : 0;
        hwShowWeekStat();

        // 右格：期間/歷史變化
        _hwPeriodDiff = (first && last) ? last - first : null;
        var activeDiff = _hwShowHistoryDiff ? _hwHistoryDiff : _hwPeriodDiff;
        var elR = document.getElementById('hwStatRight');
        if (activeDiff !== null) {
            var sign = activeDiff > 0 ? '+' : '';
            elR.textContent = sign + activeDiff.toFixed(1);
            elR.style.color = activeDiff < 0 ? '#6B8F71' : activeDiff > 0 ? '#A0626B' : '#8B8B8B';
        } else {
            elR.textContent = '-';
            elR.style.color = '';
        }
    }

    // ── 體重趨勢圖表（含縮放、滑動、星期標籤） ──
    var HW_DAY_NAMES = ['日','一','二','三','四','五','六'];
    var HW_CARB_COLORS = { high:'#A0626B', mid:'#F5D98A', low:'#6B8F71', fast:'#9B9B9B', none:'#8B8B8B' };
    var _hwChartKeys = [];
    var _hwChartValues = [];
    var _hwChartColors = [];
    var _hwChartZoom = 1;
    var _hwChartBaseW = 0;
    var _hwChartMaxZoom = 8;
    var _hwChartCollapsed = true;
    var _hwChartPinchInited = false;

    function hwToggleChart() {
        _hwChartCollapsed = !_hwChartCollapsed;
        var body = document.getElementById('hwChartBody');
        var arrow = document.getElementById('hwChartArrow');

    function hwGetChartLabels() {
        var inner = document.getElementById('hwChartInner');
        var w = inner ? inner.offsetWidth : 300;
        var n = _hwChartKeys.length || 1;
        var pxPer = w / n;
        return _hwChartKeys.map(function(k) {
            if (pxPer < 22) return '';
            var p = k.split('-');
            var dateStr = parseInt(p[1]) + '/' + parseInt(p[2]);
            if (pxPer >= 50) {
                var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
                return dateStr + '(' + HW_DAY_NAMES[d.getDay()] + ')';
            }
            return dateStr;
        });

    function hwBuildChart() {
        var canvas = document.getElementById('hwWeightChart');
        if (!canvas || _hwChartKeys.length === 0) return;
        if (hwChartInstance) hwChartInstance.destroy();

        var labels = hwGetChartLabels();
        var inner = document.getElementById('hwChartInner');
        var pxPer = inner ? inner.offsetWidth / _hwChartKeys.length : 30;
        var ptR = pxPer < 10 ? 0 : pxPer < 20 ? 1 : Math.max(2, Math.min(8, _hwChartZoom * 3));
        var bw = Math.max(1.5, Math.min(3, _hwChartZoom * 2));

        hwChartInstance = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '體重 (kg)',
                    data: _hwChartValues,
                    borderColor: '#7B8FA1',
                    backgroundColor: 'rgba(123,143,161,0.1)',
                    borderWidth: bw,
                    pointRadius: ptR,
                    pointBackgroundColor: _hwChartColors,
                    pointBorderColor: _hwChartColors,
                    pointBorderWidth: 1,
                    fill: true,
                    tension: 0.35
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                layout: { padding: { bottom: 18, left: 4, right: 4 } },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            title: function(items) {
                                var idx = items[0].dataIndex;
                                var k = _hwChartKeys[idx];
                                var p = k.split('-');
                                var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
                                return parseInt(p[1]) + '/' + parseInt(p[2]) + '(' + HW_DAY_NAMES[d.getDay()] + ')';
                            },
                            label: function(ctx) { return ctx.parsed.y + ' kg'; }
                        }
                    }
                },
                scales: {
                    x: { ticks: { font: { size: Math.max(9, Math.min(12, pxPer / 5)) }, color: '#8B8B8B', maxRotation: 45, autoSkip: false }, grid: { display: false } },
                    y: { ticks: { font: { size: 10 }, color: '#8B8B8B', callback: function(v){ return v + 'kg'; } }, grid: { color: 'rgba(0,0,0,0.05)' } }
                }
            }
        });
    }

    function hwApplyChartZoom(newZoom) {
        var wrap = document.getElementById('hwChartWrap');
        var inner = document.getElementById('hwChartInner');
        if (!wrap || !inner) return;
        _hwChartZoom = Math.max(1, Math.min(_hwChartMaxZoom, newZoom));
        var w = Math.round(_hwChartBaseW * _hwChartZoom);
        inner.style.width = w + 'px';
        hwBuildChart();
    }

    function hwRenderChart() {
        var allKeys = Object.keys(hwWeightData).sort();
        if (allKeys.length === 0) {
            if (hwChartInstance) hwChartInstance.destroy();
            hwChartInstance = null;
            return;
        }

        _hwChartKeys = allKeys;
        _hwChartValues = allKeys.map(function(k){ return hwWeightData[k].weight; });
        _hwChartColors = allKeys.map(function(k){
            var dt = hwWeightData[k].dayType;
            if (!dt) {
                var p = k.split('-');
                var d = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
                dt = hwGetDayType(d);
            }
            return HW_CARB_COLORS[dt] || HW_CARB_COLORS.none;
        });

        var wrap = document.getElementById('hwChartWrap');
        var inner = document.getElementById('hwChartInner');
        if (!wrap || !inner) return;
        _hwChartBaseW = wrap.offsetWidth;
        _hwChartZoom = 1;
        _hwChartMaxZoom = Math.max(1, Math.ceil(_hwChartKeys.length * 50 / _hwChartBaseW));
        inner.style.width = _hwChartBaseW + 'px';
        hwBuildChart();
        hwInitChartPinch();
    }

    // ── 圖表雙指縮放 ──
    function hwInitChartPinch() {
        if (_hwChartPinchInited) return;
        _hwChartPinchInited = true;
        var wrap = document.getElementById('hwChartWrap');
        if (!wrap) return;
        var startDist = 0;
        var startZoom = 1;
        var startScrollL = 0;
        var startMidX = 0;

        function dist(e) {
            var t = e.touches;
            if (t.length < 2) return 0;
            var dx = t[0].clientX - t[1].clientX;
            var dy = t[0].clientY - t[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        wrap.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                startDist = dist(e);
                startZoom = _hwChartZoom;
                startScrollL = wrap.scrollLeft;
                startMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            }
        }, { passive: false });

        wrap.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2 && startDist > 0) {
                e.preventDefault();
                var d = dist(e);
                var rawRatio = d / startDist;
                var damped = 1 + (rawRatio - 1) * 0.3;
                var newZoom = Math.max(1, Math.min(_hwChartMaxZoom, startZoom * damped));
                hwApplyChartZoom(newZoom);
                var scale = newZoom / startZoom;
                var wrapRect = wrap.getBoundingClientRect();
                var relMidX = startMidX - wrapRect.left + startScrollL;
                wrap.scrollLeft = relMidX * scale - (startMidX - wrapRect.left);
            }
        }, { passive: false });

        wrap.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) {
                startDist = 0;
                if (_hwChartZoom < 1.05) {
                    _hwChartZoom = 1;
                    var inner = document.getElementById('hwChartInner');
                    if (inner) inner.style.width = _hwChartBaseW + 'px';
                    hwBuildChart();
                }
            }
        }, { passive: true });

        // ── 滑鼠滾輪縮放 ──
        wrap.addEventListener('wheel', function(e) {
            e.preventDefault();
            var delta = e.deltaY > 0 ? -0.15 : 0.15;
            var newZoom = _hwChartZoom * (1 + delta);
            var oldZoom = _hwChartZoom;
            hwApplyChartZoom(newZoom);
            // 以滑鼠位置為中心縮放
            var wrapRect = wrap.getBoundingClientRect();
            var mouseX = e.clientX - wrapRect.left;
            var relX = mouseX + wrap.scrollLeft;
            var scale = _hwChartZoom / oldZoom;
            wrap.scrollLeft = relX * scale - mouseX;
        }, { passive: false });

        // ── 滑鼠拖拉平移 ──
        var dragging = false;
        var dragStartX = 0;
        var dragStartScroll = 0;
        wrap.style.cursor = 'grab';

        wrap.addEventListener('mousedown', function(e) {
            if (_hwChartZoom <= 1) return;
            dragging = true;
            dragStartX = e.clientX;
            dragStartScroll = wrap.scrollLeft;
            wrap.style.cursor = 'grabbing';
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            wrap.scrollLeft = dragStartScroll - (e.clientX - dragStartX);
        });
        document.addEventListener('mouseup', function() {
            if (dragging) {
                dragging = false;
                wrap.style.cursor = _hwChartZoom > 1 ? 'grab' : 'default';
            }
        });
    }

    // ── 體重紀錄表（萬年曆式，由舊到新，無限滾動） ──
    var _hwTblStartMonth = -6;
    var _hwTblEndMonth = 2;
    var _hwTblFirstRender = true;
    var _hwTblBusy = false;
    var _hwTblScrollInited = false;

    // 產生一段日期的 <tr> HTML（dateA→dateB，由舊到新）
    function hwBuildTableRows(dateA, dateB) {
        var todayStr = hwFormatDate(new Date());
        var cursor = new Date(dateA.getTime());
        // 第一段：收集所有列資料
        var rows = [];
        while (cursor <= dateB) {
            var dateStr = hwFormatDate(cursor);
            var savedData = hwWeightData[dateStr];
            var wt = savedData ? savedData.weight : null;
            var savedDayType = savedData ? savedData.dayType : '';
            var dayType = savedDayType ? savedDayType : hwGetDayType(cursor);
            var opt = HW_CYCLE_OPTS.find(function(o){ return o.key === dayType; }) || HW_CYCLE_OPTS[4];
            rows.push({
                dateStr: dateStr,
                year: cursor.getFullYear(),
                isToday: dateStr === todayStr,
                dayName: HW_DAY_NAMES[cursor.getDay()],
                month: cursor.getMonth() + 1,
                day: cursor.getDate(),
                wt: wt,
                opt: opt
            });
            cursor.setDate(cursor.getDate() + 1);
        }
        // 第二段：計算變化（diff 放在前一天：當天體重 vs 下一個有體重的日期）
        var ri, ni;
        for (ri = 0; ri < rows.length; ri++) {
            rows[ri].diff = '';
            if (!rows[ri].wt) continue;
            // 往後找下一個有體重的列
            for (ni = ri + 1; ni < rows.length; ni++) {
                if (rows[ni].wt) {
                    var d = rows[ni].wt - rows[ri].wt;
                    var sign = d > 0 ? '+' : '';
                    var cls = d < 0 ? 'diff-good' : d > 0 ? 'diff-warn' : 'diff-same';
                    rows[ri].diff = '<span class="' + cls + '">' + sign + d.toFixed(1) + '</span>';
                    break;
                }
            }
        }
        // 也嘗試算 dateA 之前的最後一筆體重，讓第一筆有體重的列之前那列也能顯示 diff
        // （不需要，因為 diff 放在有體重的列上，第一筆之前沒有體重就沒有 diff）
        // 第三段：組合 HTML
        var html = '';
        var _lastYear = null;
        for (ri = 0; ri < rows.length; ri++) {
            var r = rows[ri];
            if (_lastYear !== null && r.year !== _lastYear) {
                html += '<tr><td colspan="4" style="text-align:center;font-weight:800;font-size:15px;color:var(--red);background:var(--blue-light);padding:8px 0;letter-spacing:2px">' + r.year + ' 年</td></tr>';
            }
            _lastYear = r.year;
            var dateLabel = r.month + '/' + r.day + '(' + r.dayName + ')';
            var trStyle = r.isToday ? ' style="background:rgba(123,143,161,0.08)"' : '';
            var dateStyle = r.isToday ? 'font-weight:800;color:var(--blue)' : '';
            html += '<tr' + trStyle + ' id="hwTR' + r.dateStr + '">';
            html += '<td class="date-col" style="' + dateStyle + '">' + esc(dateLabel) + '</td>';
            html += '<td style="font-weight:700">' + (r.wt ? r.wt.toFixed(1) : '<span style="color:#ccc">-</span>') + '</td>';
            html += '<td><span class="hw-cal-type ' + r.opt.cls + '" style="display:inline-flex;width:auto;padding:2px 8px">' + r.opt.label + '</span></td>';
            html += '<td>' + r.diff + '</td></tr>';
        }
        return html;
    }

    function hwRenderTable() {
        var wrap = document.getElementById('hwTableWrap');
        var scroll = document.getElementById('hwTableScroll');
        if (!wrap) return;
        var prevScrollTop = scroll ? scroll.scrollTop : 0;
        var isFirst = _hwTblFirstRender;

        var today = new Date();
        var todayStr = hwFormatDate(today);
        var rangeStart = new Date(today.getFullYear(), today.getMonth() + _hwTblStartMonth, 1);
        var rangeEnd = new Date(today.getFullYear(), today.getMonth() + _hwTblEndMonth + 1, 0);

        var html = '<table id="hwTblTable"><thead><tr><th>日期</th><th>體重</th><th>碳日</th><th>變化</th></tr></thead>';
        html += '<tbody id="hwTblBody">' + hwBuildTableRows(rangeStart, rangeEnd) + '</tbody></table>';
        wrap.innerHTML = html;

        if (isFirst) {
            _hwTblFirstRender = false;
            var todayRow = document.getElementById('hwTR' + todayStr);
            if (todayRow && scroll) {
                setTimeout(function() {
                    var elRect = todayRow.getBoundingClientRect();
                    var scRect = scroll.getBoundingClientRect();
                    scroll.scrollTop += elRect.top - scRect.top - scroll.clientHeight / 2 + todayRow.clientHeight / 2;
                }, 80);
            }
            // 綁定無限滾動
            if (scroll && !_hwTblScrollInited) {
                _hwTblScrollInited = true;
                scroll.addEventListener('scroll', hwOnTableScroll);
            }
        } else if (scroll) {
            scroll.scrollTop = prevScrollTop;
        }
    }

    // ── 體重紀錄表無限滾動 ──
    function hwOnTableScroll() {
        if (_hwTblBusy) return;
        var scroll = document.getElementById('hwTableScroll');
        var tbody = document.getElementById('hwTblBody');
        if (!scroll || !tbody) return;
        var threshold = 150;

        // 滑到頂部 → 往前加載 6 個月
        if (scroll.scrollTop < threshold) {
            _hwTblBusy = true;
            var oldH = scroll.scrollHeight;
            var oldS = scroll.scrollTop;
            var today = new Date();
            var prevStart = _hwTblStartMonth;
            _hwTblStartMonth -= 6;
            var newStart = new Date(today.getFullYear(), today.getMonth() + _hwTblStartMonth, 1);
            var newEnd = new Date(today.getFullYear(), today.getMonth() + prevStart, 0);
            var rows = hwBuildTableRows(newStart, newEnd);
            tbody.insertAdjacentHTML('afterbegin', rows);
            scroll.scrollTop = oldS + (scroll.scrollHeight - oldH);
            _hwTblBusy = false;
        }

        // 滑到底部 → 往後加載 6 個月
        if (scroll.scrollTop + scroll.clientHeight > scroll.scrollHeight - threshold) {
            _hwTblBusy = true;
            var today2 = new Date();
            var prevEnd = _hwTblEndMonth;
            _hwTblEndMonth += 6;
            var newStart2 = new Date(today2.getFullYear(), today2.getMonth() + prevEnd + 1, 1);
            var newEnd2 = new Date(today2.getFullYear(), today2.getMonth() + _hwTblEndMonth + 1, 0);
            tbody.insertAdjacentHTML('beforeend', hwBuildTableRows(newStart2, newEnd2));
            _hwTblBusy = false;
        }
    }

    function hwTableScrollToToday() {
        var scroll = document.getElementById('hwTableScroll');
        var todayRow = document.getElementById('hwTR' + hwFormatDate(new Date()));
        if (scroll && todayRow) {
            if (_hwTableCollapsed) hwToggleTable();
            setTimeout(function() {
                var elRect = todayRow.getBoundingClientRect();
                var scRect = scroll.getBoundingClientRect();
                scroll.scrollTop += elRect.top - scRect.top - scroll.clientHeight / 2 + todayRow.clientHeight / 2;
            }, 80);
        }
    }

    function showError(msg){
        document.getElementById('loadingDiv').style.display='none';
        var el=document.getElementById('errorDiv');
        el.innerHTML='<div class="error-box">⚠️ '+esc(msg)+'</div>';
        el.style.display='block';
    }

    function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    // ====== 點外面收起編輯卡片 ======
    document.addEventListener('click', function(e) {
        var cards = document.querySelectorAll('.card.editing');
        for (var i = 0; i < cards.length; i++) {
            if (!cards[i].contains(e.target)) cards[i].classList.remove('editing');
        }
    }, true);

    // ====== 初始化（放在 script 最底部，確保所有 var 賦值已完成）======
    if (!patientSn) { showError('缺少病患 ID，請從醫生總覽頁面進入。'); }
    else {
        buildPresets();
        loadBodyData();
        if (patientLineUid) {
            prefetchMealData(patientLineUid);
        } else {
            prefetchLineUid();
        }
        _prefetchHomeWeight();
        _prefetchDietHistory();
    }
    </script>
</body>
</html>
