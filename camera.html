<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>拍攝餐食</title>
<script>
(function(){
  var _r=history.replaceState.bind(history),_p=history.pushState.bind(history);
  history.replaceState=function(s,t,u){try{_r(s,t,u)}catch(e){}};
  history.pushState=function(s,t,u){try{_p(s,t,u)}catch(e){}};
})();
</script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root {
  --primary: #3DAE8F;
  --primary-dark: #2E8B6E;
  --primary-light: #E8F7F3;
  --gold: #D4AF37;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;
  background: linear-gradient(160deg, #0D0D0D 0%, #1a1a2e 100%);
  color: #fff;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}

/* ── Main Card ── */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 24px;
  padding: 36px 28px;
  width: 100%;
  max-width: 380px;
  text-align: center;
  backdrop-filter: blur(10px);
}

.card-icon {
  font-size: 64px;
  margin-bottom: 16px;
}

.card-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #F0D060;
}

.card-desc {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  line-height: 1.6;
  margin-bottom: 28px;
}

/* ── Shutter Button ── */
.shutter-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 24px;
}
.shutter-btn {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border: 4px solid rgba(255,255,255,0.3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  box-shadow: 0 4px 20px rgba(61,174,143,0.4);
  transition: transform .15s;
}
.shutter-btn:active { transform: scale(0.9); }
.shutter-btn::after {
  content: ''; position: absolute; inset: 5px;
  border-radius: 50%; border: 2px solid rgba(255,255,255,0.5);
}
.shutter-icon {
  font-size: 32px;
  color: #fff;
  z-index: 1;
}

/* Hidden file input */
#fileInput { display: none; }

/* ── Tips ── */
.tips {
  text-align: left;
  width: 100%;
}
.tip {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  line-height: 1.5;
}
.tip:first-child { border-top: none; }
.tip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.tip strong { color: #F0D060; }

/* ── Preview ── */
.preview-screen {
  display: none; position: fixed; inset: 0;
  background: #000; z-index: 9998;
  flex-direction: column;
}
.preview-screen.active { display: flex; }
.preview-screen img {
  flex: 1; object-fit: contain; min-height: 0;
}
.preview-actions {
  display: flex; gap: 12px; padding: 16px 20px 36px;
  justify-content: center; background: rgba(0,0,0,0.85);
}
.prev-btn {
  padding: 12px 28px; border-radius: 99px;
  border: none; font-size: 15px; font-weight: 600; cursor: pointer;
}
.prev-btn.retry { background: rgba(255,255,255,0.2); color: #fff; }
.prev-btn.send  { background: var(--primary); color: #fff; }

/* ── Uploading overlay ── */
.uploading {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 9999;
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
.uploading.active { display: flex; }
.uploading .spinner {
  width: 48px; height: 48px;
  border: 3px solid #333; border-top-color: var(--primary);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.uploading p { color: #ccc; font-size: 15px; }
</style>
</head>
<body>

<!-- Main Interface -->
<div class="card">
  <div class="card-icon">📸</div>
  <div class="card-title">拍攝餐食照片</div>
  <div class="card-desc">拍攝您的餐點，AI 將自動分析營養成分</div>

  <div class="shutter-wrap">
    <label class="shutter-btn" for="fileInput">
      <span class="shutter-icon">📷</span>
    </label>
    <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="onPhotoSelected(event)">
  </div>

  <div class="tips">
    <div class="tip">
      <span class="tip-icon">📐</span>
      <span>請將手機<strong>平行於餐盤正上方俯拍</strong>，避免斜拍造成體積失真</span>
    </div>
    <div class="tip">
      <span class="tip-icon">💳</span>
      <span>建議將<strong>健保卡、信用卡或悠遊卡</strong>放在食物旁邊，AI 可更精準估算份量</span>
    </div>
    <div class="tip">
      <span class="tip-icon">💡</span>
      <span>確保光線充足，避免陰影遮擋食物</span>
    </div>
  </div>
</div>

<!-- Preview -->
<div class="preview-screen" id="previewScreen">
  <img id="previewImg" src="" alt="preview">
  <div class="preview-actions">
    <button class="prev-btn retry" onclick="retake()">重拍</button>
    <button class="prev-btn send" id="sendBtn" onclick="send()">✓ 上傳分析</button>
  </div>
</div>

<!-- Uploading overlay -->
<div class="uploading" id="uploading">
  <div class="spinner"></div>
  <p>AI 正在分析您的餐食…</p>
</div>

<script>
// ── Config ──
const LIFF_ID   = '2009326025-eVoyT2Ku';
const UPLOAD_URL = 'https://huangcs.app.n8n.cloud/webhook/meal-upload';

let _userId = null;
let _selectedFile = null;

// ── Close ──
function closeCamera() {
  if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
    liff.closeWindow();
  } else {
    window.close();
    history.back();
  }
}

// ── Photo Selected (from native camera) ──
function onPhotoSelected(e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  _selectedFile = file;

  var reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('previewScreen').classList.add('active');
  };
  reader.readAsDataURL(file);
}

// ── Retake ──
function retake() {
  document.getElementById('previewScreen').classList.remove('active');
  _selectedFile = null;
  // Reset file input so same file can be re-selected
  document.getElementById('fileInput').value = '';
}

// ── Send ──
async function send() {
  if (!_selectedFile) return;

  document.getElementById('previewScreen').classList.remove('active');
  document.getElementById('uploading').classList.add('active');

  var fd = new FormData();
  fd.append('image', _selectedFile, 'meal_' + Date.now() + '.jpg');
  fd.append('userId', _userId || '');

  try {
    var resp = await fetch(UPLOAD_URL, { method: 'POST', body: fd });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    document.getElementById('uploading').classList.remove('active');
    alert('✅ 照片已上傳，AI 正在分析中！');
    closeCamera();
  } catch (err) {
    document.getElementById('uploading').classList.remove('active');
    console.error('Upload error:', err);
    alert('上傳失敗: ' + (err.message || err));
    // Show preview again for retry
    document.getElementById('previewScreen').classList.add('active');
  }
}

// ── Init ──
async function init() {
  try {
    if (LIFF_ID && LIFF_ID !== 'YOUR_LIFF_ID_HERE') {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      var profile = await liff.getProfile();
      _userId = profile.userId;
    }
    if (!_userId) {
      var p = new URLSearchParams(location.search);
      _userId = p.get('userId') || '';
    }
  } catch (err) {
    console.warn('LIFF init error:', err);
  }
}

init();
</script>
</body>
</html>
