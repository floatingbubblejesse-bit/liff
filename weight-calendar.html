<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>居家體重紀錄｜金鶯減重</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root { --blue:#7B8FA1; --blue-light:#EDE8E0; --green:#8B9D83; --green-light:#E8EDE6; --red:#A0626B; --orange:#C4A882; --brown:#B8926A; --bg:#F5F3EF; --card:#FDFBF7; --text:#4A4A4A; --muted:#8B8B8B; --border:#E8E4DC; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-y:auto;-webkit-overflow-scrolling:touch}

        /* ====== Header ====== */
        .page-header{background:linear-gradient(135deg,#6B7F91,#7B8FA1);color:white;padding:20px 16px 24px}
        .page-header h1{font-size:17px;font-weight:700;letter-spacing:1px;text-align:center}
        .page-header p{font-size:11px;opacity:0.85;margin-top:3px}
        .header-top{display:flex;align-items:center;gap:12px}
        .avatar{width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,0.6);object-fit:cover;background:rgba(255,255,255,0.3)}
        .avatar-placeholder{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:22px}
        .header-info h2{font-size:18px;font-weight:600}

        /* ====== Schedule info bar ====== */
        .schedule-bar{padding:10px 16px;background:white;border-bottom:1px solid var(--border);text-align:center;font-size:13px;font-weight:600;color:var(--text)}
        .schedule-bar .sch-range{color:var(--blue);font-weight:700}

        /* ====== Stats row ====== */
        .stats-row{display:flex;gap:6px;padding:10px 14px;background:white;border-bottom:1px solid var(--border)}
        .stat-item{flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px}
        .stat-value{font-size:15px;font-weight:700;color:var(--red)}
        .stat-label{font-size:10px;color:var(--muted);margin-top:2px}

        /* ====== Scroll container ====== */
        .table-scroll{}

        /* ====== Table ====== */
        .wt-table{width:100%;border-collapse:collapse;background:white;table-layout:fixed}
        .wt-table thead th{position:sticky;top:0;background:#F8F6F2;font-size:12px;font-weight:700;color:var(--muted);padding:10px 8px;border-bottom:2px solid var(--border);z-index:2}
        .wt-table thead th:nth-child(1){width:33.3%;text-align:left;padding-left:24px}
        .wt-table thead th:nth-child(2){width:33.3%;text-align:center}
        .wt-table thead th:nth-child(3){width:33.4%;text-align:right;padding-right:24px}
        .wt-table thead th:nth-child(4){display:none}
        .wt-table tbody td{padding:10px 4px;border-bottom:1px solid #F0EDE6;font-size:13px;vertical-align:middle}
        .wt-table tbody td:nth-child(1){text-align:left;padding-left:24px}
        .wt-table tbody td:nth-child(2){text-align:center}
        .wt-table tbody td:nth-child(3){text-align:right;padding-right:24px}
        .wt-table tbody td:nth-child(4){display:none}
        .wt-table.editing-active thead th:nth-child(1),.wt-table.editing-active tbody td:nth-child(1){width:25%}
        .wt-table.editing-active thead th:nth-child(2),.wt-table.editing-active tbody td:nth-child(2){width:25%}
        .wt-table.editing-active thead th:nth-child(3),.wt-table.editing-active tbody td:nth-child(3){width:25%;padding-right:4px}
        .wt-table.editing-active thead th:nth-child(4),.wt-table.editing-active tbody td:nth-child(4){display:table-cell;width:25%;padding:0 4px;text-align:center}
        .wt-table tbody tr:active{background:#FDFBF7}
        .wt-table tbody tr.today-row{background:#EDF2F7}
        .wt-table tbody tr.today-row td{border-bottom-color:#D0DBE6}
        .scroll-today-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#C0CDD9;color:#fff;font-size:12px;cursor:pointer;margin-left:14px;-webkit-tap-highlight-color:transparent;vertical-align:middle;line-height:1}
        .scroll-today-btn:active{opacity:0.5}
        .wt-date{font-weight:600;color:var(--text);white-space:nowrap}
        .wt-date .wt-day{font-size:11px;color:var(--muted);font-weight:400}
        .wt-table tbody tr.today-row .wt-date{color:var(--blue);font-weight:800}
        .wt-weight-cell{position:relative}
        .wt-weight-val{font-size:15px;font-weight:700;color:var(--red);cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:22px;display:flex;align-items:center;justify-content:center}
        .wt-weight-val.empty{color:var(--muted);font-weight:400;font-size:12px}

        /* ====== Inline edit input ====== */
        .wt-edit-input{width:56px;padding:2px 0;border:none;border-bottom:2px solid var(--blue);font-size:16px;font-weight:700;text-align:center;color:var(--red);outline:none;background:transparent;-moz-appearance:textfield}
        .wt-edit-input::-webkit-outer-spin-button,.wt-edit-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
        .wt-edit-input::placeholder{color:#ccc;font-weight:400;font-size:12px}

        /* ====== Carb day badge ====== */
        .wt-type{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.15s;user-select:none}
        .wt-type:active{transform:scale(0.85)}
        .wt-type.t-high{background:#F8D7DA;color:#A0626B}
        .wt-type.t-mid{background:#FFF3CD;color:#B8926A}
        .wt-type.t-low{background:#D4EDDA;color:#6B8F71}
        .wt-type.t-fast{background:#E2E3E5;color:#4A4A4A}
        .wt-type.t-none{background:var(--bg);color:var(--muted)}

        /* ====== Year separator ====== */
        .year-separator td{background:var(--bg);padding:4px 0;border-bottom:1px solid var(--border)}
        .year-label{font-size:12px;font-weight:700;color:var(--blue);letter-spacing:2px}

        /* ====== Row save button ====== */
        .wt-row-save{display:none;padding:2px 8px;border:1px solid var(--green);border-radius:6px;background:white;color:var(--green);font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap}
        .wt-row-save:active{background:var(--green-light)}
        .wt-row-save.visible{display:inline-block}

        /* ====== Chart section ====== */
        .section{flex-shrink:0;margin:10px;background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);overflow:hidden}
        .section-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;gap:8px}
        .section-header:active{background:#FDFBF7}
        .section-icon{font-size:18px}
        .section-title{flex:1;font-size:14px;font-weight:700;color:var(--text)}
        .section-arrow{font-size:11px;color:var(--muted);transition:transform 0.25s ease}
        .section.open .section-arrow{transform:rotate(180deg)}
        .section-body{display:none;border-top:1px solid var(--border);padding:10px}
        .section.open .section-body{display:block}
        .chart-scroll{overflow:visible;height:50vh}
        .chart-scroll.zoomed{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;width:100vw;height:50vh;z-index:500;background:rgba(255,255,255,0.97);touch-action:pan-x}
        .chart-scroll.zoomed .chart-inner{margin:0}
        .chart-inner{position:relative;min-width:100%;min-height:100%}
        .chart-zoom-hint{display:none;position:fixed;top:12px;right:12px;z-index:501;background:var(--blue);color:#fff;border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
        .chart-scroll.zoomed~.chart-zoom-hint,.chart-scroll.zoomed+.chart-zoom-hint{display:none}
        .chart-zoom-close{display:none;position:fixed;top:12px;right:12px;z-index:501;background:rgba(0,0,0,0.5);color:#fff;border-radius:50%;width:32px;height:32px;text-align:center;line-height:32px;font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent}

        /* ====== Loading ====== */
        .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:40vh;gap:14px}
        .spinner{width:40px;height:40px;border:4px solid #E8E4DC;border-top-color:var(--blue);border-radius:50%;animation:spin .9s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="page-header">
    <div class="header-top">
        <div id="avatarWrap"><div class="avatar-placeholder">🧑</div></div>
        <div class="header-info"><h2 id="headerSub">載入中...</h2></div>
    </div>
</div>

<div class="schedule-bar" id="scheduleBar" style="display:none"></div>

<div class="stats-row">
    <div class="stat-item"><div class="stat-value" id="statLatest">-</div><div class="stat-label">最低體重</div></div>
    <div class="stat-item" onclick="cycleWeekStat()" style="cursor:pointer;-webkit-tap-highlight-color:transparent"><div class="stat-value" id="statWeekDiff">-</div><div class="stat-label" id="statWeekLabel">一週變化</div></div>
    <div class="stat-item"><div class="stat-value" id="statDiff">-</div><div class="stat-label">期間變化</div></div>
</div>

<!-- ====== 體重趨勢圖（收折） ====== -->
<div class="section open" id="chartSection">
    <div class="section-header" onclick="toggleSection('chartSection')">
        <span class="section-icon">📈</span>
        <span class="section-title">體重趨勢</span>
        <span class="section-arrow">▼</span>
    </div>
    <div class="section-body">
        <div class="chart-scroll" id="chartScroll"><div class="chart-inner" id="chartInner"><canvas id="weightChart"></canvas></div></div>
        <div class="chart-zoom-close" id="chartZoomClose" onclick="resetChartZoom()">✕</div>
    </div>
</div>

<div class="table-scroll" id="tableScroll">
<table class="wt-table">
    <thead><tr><th>日期 <span class="scroll-today-btn" onclick="scrollToToday()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></span></th><th>體重</th><th>碳日</th><th></th></tr></thead>
    <tbody id="wtBody"></tbody>
</table>
</div>

<div id="loadingOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
    <div class="spinner"></div>
    <span style="color:#8B8B8B;font-size:13px">載入中...</span>
</div>

<script>
    var LIFF_ID = '2009326025-0pbHTZa7';
    var MEALS_GAS = 'https://script.google.com/macros/s/AKfycbxV3Cc44ohL4i7-xk29hAxFSPaWktOFgWxmCRGsg0uvxaJHbRqiMXrJjBAyva3XwDNY/exec';
    var N8N = 'https://huangcs.app.n8n.cloud/webhook';

    var CYCLE_OPTS = [
        {key:'high', label:'高', short:'高', cls:'t-high'},
        {key:'mid',  label:'中', short:'中', cls:'t-mid'},
        {key:'low',  label:'低', short:'低', cls:'t-low'},
        {key:'fast', label:'斷', short:'斷', cls:'t-fast'},
        {key:'none', label:'-',  short:'-',  cls:'t-none'}
    ];
    var DAY_NAMES = ['日','一','二','三','四','五','六'];

    var GAS_URL = 'https://script.google.com/macros/s/AKfycbwLo76QFAO1EYpCY8PvQIWj0U4eUWuRYDRRNBN_uppxvd0T-HtFRl71t4RIQyFx5j_I/exec';
    var patientSn = '', patientUid = '', patientName = '';
    var cycleSchedule = ['high','high','mid','mid','high','mid','mid'];
    var visitDate = null;
    var scheduleStart = null; // 排程開始日（看診日+1）
    var scheduleEnd = null;   // 排程結束日
    var scheduleWeeks = 0;
    var weightData = {};
    var dayTypeOverrides = {};
    var visitRecords = [];
    var chartInstance = null;
    var editingDate = null;
    var dirtyRows = {};

    // ====== Init ======
    (function init() {
        var params = new URLSearchParams(location.search);
        patientSn = params.get('id') || '';
        patientUid = params.get('uid') || '';

        if (patientSn) {
            loadData();
        } else {
            liff.init({ liffId: LIFF_ID }).then(function() {
                if (!liff.isLoggedIn()) { liff.login(); return; }
                return liff.getProfile();
            }).then(function(profile) {
                if (!profile) return;
                patientUid = profile.userId;
                patientName = profile.displayName;
                document.getElementById('headerSub').textContent = profile.displayName;
                if (profile.pictureUrl) { document.getElementById('avatarWrap').innerHTML = '<img class="avatar" src="' + profile.pictureUrl + '" alt="">'; }
                return fetch(MEALS_GAS + '?lookupUid=' + encodeURIComponent(patientUid))
                    .then(function(r){ return r.json(); });
            }).then(function(result) {
                if (!result) return;
                if (result.patientSn) {
                    patientSn = result.patientSn;
                }
                loadData();
            }).catch(function(err) {
                loadData();
            });
        }
    })();

    function parseDateToYMD(dateVal) {
        if (!dateVal) return '';
        if (typeof dateVal === 'string' && /^\d{4}-\d{2}-\d{2}/.test(dateVal)) return dateVal.substring(0, 10);
        var d = new Date(dateVal);
        if (isNaN(d.getTime())) return '';
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function loadData() {
        loadLocalWeights();
        if (!patientSn) { onDataReady(); return; }
        var pending = 2;
        function checkDone() { pending--; if (pending <= 0) onDataReady(); }

        fetch(MEALS_GAS + '?dietPlan=' + encodeURIComponent(patientSn))
            .then(function(r){ return r.json(); })
            .then(function(data){
                if (data.schedule && data.schedule.length === 7) {
                    cycleSchedule = data.schedule;
                    var planDate = parseDateToYMD(data.date);
                    if (!planDate) planDate = formatDate(new Date());
                    var weeks = data.weeks || 4;
                    visitRecords = [{
                        date: planDate,
                        schedule: data.schedule,
                        weeks: weeks
                    }];
                    var p = planDate.split('-');
                    visitDate = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
                    // 排程從看診日的隔天開始
                    scheduleStart = new Date(visitDate.getFullYear(), visitDate.getMonth(), visitDate.getDate() + 1);
                    scheduleEnd = new Date(scheduleStart.getFullYear(), scheduleStart.getMonth(), scheduleStart.getDate() + (weeks * 7) - 1);
                    scheduleWeeks = weeks;
                }
                checkDone();
            }).catch(function(e){ checkDone(); });

        fetch(MEALS_GAS + '?homeWeight=' + encodeURIComponent(patientSn))
            .then(function(r){ return r.json(); })
            .then(function(data){
                if (data.records && data.records.length > 0) {
                    for (var i = 0; i < data.records.length; i++) {
                        var rec = data.records[i];
                        if (rec.date && rec.weight) {
                            if (!weightData[rec.date]) weightData[rec.date] = {};
                            weightData[rec.date].weight = parseFloat(rec.weight);
                            if (rec.dayType) weightData[rec.date].dayType = rec.dayType;
                        }
                    }
                    saveLocalWeights();
                }
                checkDone();
            }).catch(function(e){ checkDone(); });
    }

    function storageKey() { return 'weight_' + (patientSn || patientUid || 'default'); }

    function loadLocalWeights() {
        try {
            var raw = localStorage.getItem(storageKey());
            if (raw) {
                var data = JSON.parse(raw);
                if (data.weights) weightData = data.weights;
                if (data.overrides) dayTypeOverrides = data.overrides;
            }
        } catch(e) {}
    }

    function saveLocalWeights() {
        try {
            localStorage.setItem(storageKey(), JSON.stringify({ weights: weightData, overrides: dayTypeOverrides }));
        } catch(e) {}
    }

    function onDataReady() {
        document.getElementById('loadingOverlay').style.display = 'none';
        if (patientName) {
            document.getElementById('headerSub').textContent = patientName;
        } else if (patientSn) {
            document.getElementById('headerSub').textContent = patientSn;
            // 嘗試從 GAS 取得姓名
            fetch(GAS_URL + '?id=' + encodeURIComponent(patientSn))
                .then(function(r){ return r.json(); })
                .then(function(data){
                    if (data && data.name) {
                        patientName = data.name;
                        document.getElementById('headerSub').textContent = data.name;
                    }
                }).catch(function(){});
        }
        renderScheduleBar();
        renderTable();
        renderChart();
        initInfiniteScroll();
        // 等 infinite scroll 的 expandTop 穩定後再滾到今天
        setTimeout(function() {
            var target = document.querySelector('.today-row') || document.getElementById('scheduleStartRow');
            if (target) {
                var rowH = target.offsetHeight || 44;
                var rect = target.getBoundingClientRect();
                window.scrollBy(0, rect.top - rowH * 3);
            }
        }, 500);
    }

    // ====== Infinite scroll ======
    function initInfiniteScroll() {
        window.addEventListener('scroll', function() {
            if (_expanding) return;
            var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            var scrollHeight = document.documentElement.scrollHeight;
            var clientHeight = window.innerHeight;
            // 接近頂部：往上擴展
            if (scrollTop < 300) {
                expandTop();
            }
            // 接近底部：往下擴展
            if (scrollHeight - scrollTop - clientHeight < 300) {
                expandBottom();
            }
        }, {passive: true});
    }

    // ====== Schedule info bar ======
    function renderScheduleBar() {
        var bar = document.getElementById('scheduleBar');
        if (!scheduleStart || !scheduleEnd) { bar.style.display = 'none'; return; }
        var s = scheduleStart;
        var e = scheduleEnd;
        var sLabel = (s.getMonth()+1) + '/' + s.getDate() + '(' + DAY_NAMES[s.getDay()] + ')';
        var eLabel = (e.getMonth()+1) + '/' + e.getDate() + '(' + DAY_NAMES[e.getDay()] + ')';
        bar.innerHTML = '最新排程期間　<span class="sch-range">' + sLabel + ' ~ ' + eLabel + '</span>　' + scheduleWeeks + ' 週';
        bar.style.display = 'block';
    }

    // ====== Day Type Calculation ======
    function getDayType(dateObj) {
        var dateStr = formatDate(dateObj);
        if (dayTypeOverrides[dateStr]) return dayTypeOverrides[dateStr];
        var applicableVisit = null;
        for (var i = visitRecords.length - 1; i >= 0; i--) {
            var vd = visitRecords[i].date;
            if (vd && vd <= dateStr) { applicableVisit = visitRecords[i]; break; }
        }
        if (!applicableVisit || !applicableVisit.date) return 'none';
        var vParts = applicableVisit.date.split('-');
        var vDate = new Date(parseInt(vParts[0]), parseInt(vParts[1])-1, parseInt(vParts[2]));
        var sch = (applicableVisit.schedule && applicableVisit.schedule.length === 7) ? applicableVisit.schedule : cycleSchedule;
        var weeks = applicableVisit.weeks || 4;
        return getTypeFromSchedule(dateObj, vDate, sch, weeks);
    }

    function getTypeFromSchedule(dateObj, visitDateObj, schedule, weeks) {
        var startDate = new Date(visitDateObj.getFullYear(), visitDateObj.getMonth(), visitDateObj.getDate() + 1);
        var endDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + (weeks * 7) - 1);
        var d = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
        if (d < startDate || d > endDate) return 'none';
        var jsDay = dateObj.getDay();
        var schIdx;
        if (jsDay === 0) schIdx = 1;
        else if (jsDay === 6) schIdx = 0;
        else schIdx = jsDay + 1;
        return schedule[schIdx] || 'mid';
    }

    // ====== Calculate display range (infinite scroll) ======
    var rangeStartDate = null;
    var rangeEndDate = null;
    var EXPAND_MONTHS = 3;
    var _expanding = false;

    function getDisplayRange() {
        if (rangeStartDate && rangeEndDate) return { start: rangeStartDate, end: rangeEndDate };

        var today = new Date();
        var anchor = scheduleStart || today;
        var endAnchor = scheduleEnd || today;

        // 初始範圍：錨點前 3 個月 ~ 結束錨點後 3 個月
        rangeStartDate = new Date(anchor.getFullYear(), anchor.getMonth() - EXPAND_MONTHS, 1);
        rangeEndDate = new Date(endAnchor.getFullYear(), endAnchor.getMonth() + EXPAND_MONTHS + 1, 0);

        return { start: rangeStartDate, end: rangeEndDate };
    }

    function expandTop() {
        if (_expanding) return;
        _expanding = true;
        rangeStartDate = new Date(rangeStartDate.getFullYear(), rangeStartDate.getMonth() - EXPAND_MONTHS, 1);
        var oldHeight = document.documentElement.scrollHeight;
        var oldScroll = window.pageYOffset || document.documentElement.scrollTop;
        renderTable(true);
        var newHeight = document.documentElement.scrollHeight;
        window.scrollTo(0, oldScroll + (newHeight - oldHeight));
        _expanding = false;
    }

    function expandBottom() {
        if (_expanding) return;
        _expanding = true;
        rangeEndDate = new Date(rangeEndDate.getFullYear(), rangeEndDate.getMonth() + EXPAND_MONTHS + 1, 0);
        renderTable(true);
        _expanding = false;
    }

    // ====== Render Table ======
    function renderTable(skipScroll) {
        var range = getDisplayRange();
        var todayStr = formatDate(new Date());
        var schStartStr = scheduleStart ? formatDate(scheduleStart) : '';

        // 收集所有日期
        var rows = [];
        var cursor = new Date(range.start.getFullYear(), range.start.getMonth(), range.start.getDate());
        while (cursor <= range.end) {
            var dateObj = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate());
            var dateStr = formatDate(dateObj);
            var dayType = getDayType(dateObj);
            var opt = CYCLE_OPTS.find(function(o){ return o.key === dayType; }) || CYCLE_OPTS[4];
            var wt = (weightData[dateStr] && weightData[dateStr].weight) ? weightData[dateStr].weight : null;
            rows.push({ d: dateObj.getDate(), m: dateObj.getMonth(), y: dateObj.getFullYear(), dateObj: dateObj, dateStr: dateStr, dayType: dayType, opt: opt, wt: wt, isToday: dateStr === todayStr });
            cursor.setDate(cursor.getDate() + 1);
        }

        var html = '';
        var lastYear = null;
        for (var i = 0; i < rows.length; i++) {
            var r = rows[i];

            // 年分隔條：每年第一天（1/1）前插入
            if (r.m === 0 && r.d === 1 && lastYear !== null) {
                html += '<tr class="year-separator"><td colspan="4"><span class="year-label">' + r.y + ' 年</span></td></tr>';
            }
            lastYear = r.y;

            var dayName = DAY_NAMES[r.dateObj.getDay()];
            var dateLabel = (r.m + 1) + '/' + r.d + '<span class="wt-day">(' + dayName + ')</span>';
            var isEditing = editingDate === r.dateStr;
            var isDirty = !!dirtyRows[r.dateStr];

            var trCls = r.isToday ? 'today-row' : '';
            var trId = '';
            if (schStartStr && r.dateStr === schStartStr) trId = ' id="scheduleStartRow"';

            html += '<tr' + (trCls ? ' class="' + trCls + '"' : '') + trId + '>';
            html += '<td><div class="wt-date">' + dateLabel + '</div></td>';

            // 體重欄
            html += '<td class="wt-weight-cell">';
            if (isEditing) {
                html += '<input class="wt-edit-input" id="editInput_' + r.dateStr + '" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="--.-" value="' + (r.wt !== null ? r.wt.toFixed(1) : '') + '">';
            } else {
                if (r.wt !== null) {
                    html += '<div class="wt-weight-val" onclick="startEdit(\'' + r.dateStr + '\')">' + r.wt.toFixed(1) + '</div>';
                } else {
                    html += '<div class="wt-weight-val empty" onclick="startEdit(\'' + r.dateStr + '\')">-</div>';
                }
            }
            html += '</td>';

            // 碳日
            html += '<td><span class="wt-type ' + r.opt.cls + '" onclick="cycleDayType(\'' + r.dateStr + '\')">' + r.opt.short + '</span></td>';

            // 儲存鈕（碳日右邊，編輯/dirty 才顯示）
            var saveCls = (isEditing || isDirty) ? 'wt-row-save visible' : 'wt-row-save';
            html += '<td><button class="' + saveCls + '" id="saveBtn_' + r.dateStr + '" onclick="saveRow(\'' + r.dateStr + '\')">儲存</button></td>';
            html += '</tr>';
        }

        document.getElementById('wtBody').innerHTML = html;

        // focus 到正在編輯的 input + 綁定 idle reset
        if (editingDate) {
            var inp = document.getElementById('editInput_' + editingDate);
            if (inp) {
                inp.focus();
                inp.setSelectionRange(inp.value.length, inp.value.length);
                inp.addEventListener('input', resetIdleTimer);
                inp.addEventListener('focus', resetIdleTimer);
            }
        }

        updateStats();
    }

    // ====== Edit / Dismiss 系統 ======
    var _actionTime = 0;       // 最近一次操作時間戳（防止開啟瞬間被外部點擊關掉）
    var _idleTimer = null;
    var IDLE_TIMEOUT = 8000;
    var GUARD_MS = 400;

    function clearIdleTimer() {
        if (_idleTimer) { clearTimeout(_idleTimer); _idleTimer = null; }
    }

    function startIdleTimer() {
        clearIdleTimer();
        _idleTimer = setTimeout(dismissAll, IDLE_TIMEOUT);
    }

    function resetIdleTimer() {
        if (editingDate || hasDirtyRows()) startIdleTimer();
    }

    function hasDirtyRows() {
        for (var k in dirtyRows) { if (dirtyRows.hasOwnProperty(k)) return true; }
        return false;
    }

    function setEditingClass(on) {
        var tbl = document.querySelector('.wt-table');
        if (tbl) { if (on) tbl.classList.add('editing-active'); else tbl.classList.remove('editing-active'); }
    }

    function preserveScrollRender() {
        var savedTop = window.pageYOffset || document.documentElement.scrollTop;
        renderTable(true);
        window.scrollTo(0, savedTop);
    }

    // 全部收起：清 editingDate + 所有非已改碳日的 dirtyRows
    function dismissAll() {
        clearIdleTimer();
        // 先 blur 收起鍵盤，防止 iOS 殘留放大
        if (editingDate) {
            var inp = document.getElementById('editInput_' + editingDate);
            if (inp) inp.blur();
        }
        if (document.activeElement && document.activeElement.tagName === 'INPUT') {
            document.activeElement.blur();
        }
        var prevDate = editingDate;
        editingDate = null;
        if (prevDate && !dayTypeOverrides[prevDate]) {
            delete dirtyRows[prevDate];
        }
        var keys = Object.keys(dirtyRows);
        for (var i = 0; i < keys.length; i++) {
            delete dirtyRows[keys[i]];
        }
        setEditingClass(false);
        preserveScrollRender();
    }

    function startEdit(dateStr) {
        _actionTime = Date.now();
        editingDate = dateStr;
        dirtyRows[dateStr] = true;
        setEditingClass(true);
        preserveScrollRender();
        startIdleTimer();
    }

    function isEditSafeTarget(el) {
        if (!el) return false;
        var node = el;
        while (node && node !== document.body) {
            if (node.classList) {
                if (node.classList.contains('wt-edit-input')) return true;
                if (node.classList.contains('wt-row-save')) return true;
                if (node.classList.contains('wt-type')) return true;
            }
            if (node.tagName === 'INPUT') return true;
            node = node.parentElement;
        }
        return false;
    }

    function onOutsideTap(e) {
        if (!editingDate && !hasDirtyRows()) return;
        if (Date.now() - _actionTime < GUARD_MS) return;
        if (!isEditSafeTarget(e.target)) dismissAll();
    }
    document.addEventListener('touchstart', onOutsideTap, {passive: true});
    document.addEventListener('click', onOutsideTap);

    function adjWeightRow(dateStr, delta) {
        var inp = document.getElementById('editInput_' + dateStr);
        if (!inp) return;
        var val = parseFloat(inp.value);
        if (isNaN(val) || val <= 0) {
            var keys = Object.keys(weightData).sort();
            val = (keys.length > 0 && weightData[keys[keys.length - 1]].weight) ? weightData[keys[keys.length - 1]].weight : 50.0;
        }
        val = Math.round((val + delta) * 10) / 10;
        if (val < 20) val = 20;
        if (val > 200) val = 200;
        inp.value = val.toFixed(1);
        inp.focus();
    }

    function saveRow(dateStr) {
        var btn = document.getElementById('saveBtn_' + dateStr);
        if (!btn) return;

        var inp = document.getElementById('editInput_' + dateStr);
        if (inp) {
            var rawVal = inp.value.trim();
            if (rawVal === '') {
                if (weightData[dateStr]) {
                    delete weightData[dateStr].weight;
                    if (!weightData[dateStr].dayType) delete weightData[dateStr];
                }
            } else {
                var val = parseFloat(rawVal);
                if (isNaN(val) || val <= 0) { alert('請輸入有效的體重'); return; }
                if (!weightData[dateStr]) weightData[dateStr] = {};
                weightData[dateStr].weight = val;
            }
        }

        saveLocalWeights();
        btn.textContent = '儲存中…';
        btn.disabled = true;

        var p = dateStr.split('-');
        var dateObj = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
        var dayType = getDayType(dateObj);
        var wt = (weightData[dateStr] && weightData[dateStr].weight) ? weightData[dateStr].weight : 0;

        var saveUrl = MEALS_GAS
          + '?saveHomeWeight=true'
          + '&patientSn=' + encodeURIComponent(patientSn)
          + '&date=' + encodeURIComponent(dateStr)
          + '&weight=' + encodeURIComponent(wt)
          + '&dayType=' + encodeURIComponent(dayType);

        clearIdleTimer();
        fetch(saveUrl, { mode: 'no-cors', redirect: 'follow' })
        .then(function(){
            btn.disabled = false;
            btn.textContent = '✓';
            btn.style.color = '#6B8F71';
            btn.style.borderColor = '#6B8F71';
            delete dirtyRows[dateStr];
            setTimeout(function(){
                dismissAll();
                renderChart();
            }, 800);
        })
        .catch(function(){
            btn.disabled = false;
            btn.textContent = '✓';
            btn.style.color = '#6B8F71';
            delete dirtyRows[dateStr];
            setTimeout(function(){
                dismissAll();
                renderChart();
            }, 800);
        });
    }

    // ====== Cycle carb day type ======
    function cycleDayType(dateStr) {
        var p = dateStr.split('-');
        var dateObj = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
        var current = getDayType(dateObj);
        var idx = CYCLE_OPTS.findIndex(function(o){ return o.key === current; });
        idx = (idx + 1) % CYCLE_OPTS.length;
        dayTypeOverrides[dateStr] = CYCLE_OPTS[idx].key;
        dirtyRows[dateStr] = true;
        _actionTime = Date.now();
        setEditingClass(true);
        saveLocalWeights();
        preserveScrollRender();
        startIdleTimer();
    }

    // ====== Stats ======
    var _weekStats = [];
    var _weekStatIndex = 0;

    function showWeekStat() {
        var el = document.getElementById('statWeekDiff');
        var lbl = document.getElementById('statWeekLabel');
        if (_weekStats.length === 0) {
            el.textContent = '-';
            el.style.color = '';
            lbl.textContent = '一週變化';
            return;
        }
        var item = _weekStats[_weekStatIndex];
        lbl.textContent = item.label;
        if (item.diff !== null) {
            var sign = item.diff > 0 ? '+' : '';
            el.textContent = sign + item.diff.toFixed(1);
            el.style.color = item.diff < 0 ? '#6B8F71' : item.diff > 0 ? '#A0626B' : '#8B8B8B';
        } else {
            el.textContent = '-';
            el.style.color = '';
        }
    }

    function cycleWeekStat() {
        if (_weekStats.length === 0) return;
        _weekStatIndex = (_weekStatIndex + 1) % _weekStats.length;
        showWeekStat();
    }

    function updateStats() {
        // 統計排程期間（或全部）的體重
        var allKeys = Object.keys(weightData).filter(function(k) {
            return weightData[k].weight;
        }).sort();

        // 如果有排程，只算排程期間
        var rangeKeys = allKeys;
        if (scheduleStart && scheduleEnd) {
            var sStr = formatDate(scheduleStart);
            var eStr = formatDate(scheduleEnd);
            rangeKeys = allKeys.filter(function(k) { return k >= sStr && k <= eStr; });
        }

        var count = rangeKeys.length;
        var first = count > 0 ? weightData[rangeKeys[0]].weight : null;
        var last = count > 0 ? weightData[rangeKeys[rangeKeys.length - 1]].weight : null;
        var minW = null;
        for (var mi = 0; mi < rangeKeys.length; mi++) {
            var w = weightData[rangeKeys[mi]].weight;
            if (w && (minW === null || w < minW)) minW = w;
        }

        document.getElementById('statLatest').textContent = minW !== null ? minW.toFixed(1) : '-';

        // 週變化資料：依排程起始日切每 7 天一週
        _weekStats = [];
        if (scheduleStart && rangeKeys.length > 0) {
            var ws = new Date(scheduleStart.getTime());
            var weekNum = 1;
            while (true) {
                var we = new Date(ws.getTime());
                we.setDate(we.getDate() + 6);
                var wsStr = formatDate(ws);
                var weStr = formatDate(we);
                var wk = rangeKeys.filter(function(k) { return k >= wsStr && k <= weStr; });
                if (wk.length >= 2) {
                    var wf = weightData[wk[0]].weight;
                    var wl = weightData[wk[wk.length - 1]].weight;
                    _weekStats.push({ label: '第' + weekNum + '週', diff: wl - wf });
                } else if (wk.length === 1) {
                    _weekStats.push({ label: '第' + weekNum + '週', diff: null });
                }
                ws = new Date(ws.getTime());
                ws.setDate(ws.getDate() + 7);
                weekNum++;
                if (formatDate(ws) > formatDate(scheduleEnd)) break;
                if (weekNum > 52) break;
            }
        }
        // 平均一週 = 期間變化 / 紀錄天數 * 7
        if (first && last && rangeKeys.length >= 2) {
            var d0 = rangeKeys[0].split('-');
            var d1 = rangeKeys[rangeKeys.length - 1].split('-');
            var daySpan = Math.round((new Date(parseInt(d1[0]), parseInt(d1[1])-1, parseInt(d1[2])) - new Date(parseInt(d0[0]), parseInt(d0[1])-1, parseInt(d0[2]))) / 86400000);
            if (daySpan > 0) {
                _weekStats.push({ label: '平均一週', diff: (last - first) / daySpan * 7 });
            }
        }
        if (_weekStatIndex >= _weekStats.length) _weekStatIndex = 0;
        showWeekStat();

        // 期間變化：排程期間首筆 vs 末筆
        if (first && last) {
            var diff = last - first;
            var sign = diff > 0 ? '+' : '';
            document.getElementById('statDiff').textContent = sign + diff.toFixed(1);
            document.getElementById('statDiff').style.color = diff < 0 ? '#6B8F71' : diff > 0 ? '#A0626B' : '#8B8B8B';
        } else {
            document.getElementById('statDiff').textContent = '-';
            document.getElementById('statDiff').style.color = '';
        }
    }

    // ====== Section Toggle ======
    function toggleSection(id) {
        var el = document.getElementById(id);
        if (el) el.classList.toggle('open');
    }

    // ====== Weight Chart ======
    var CARB_COLORS = { high: '#A0626B', mid: '#F5D98A', low: '#6B8F71', fast: '#9B9B9B', none: '#8B8B8B' };

    var _chartKeys = [];
    var _chartValues = [];
    var _chartColors = [];
    var _chartZoom = 1;
    var _chartBaseW = 0;
    var _chartBaseH = Math.round(window.innerHeight * 0.5);

    function getChartLabels() {
        var inner = document.getElementById('chartInner');
        var w = inner ? inner.offsetWidth : 300;
        var n = _chartKeys.length || 1;
        var pxPer = w / n;
        return _chartKeys.map(function(k) {
            var p = k.split('-');
            var dateStr = parseInt(p[1]) + '/' + parseInt(p[2]);
            if (pxPer >= 55) {
                var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
                return dateStr + '(' + DAY_NAMES[d.getDay()] + ')';
            } else if (pxPer >= 28) {
                return dateStr;
            }
            return '';
        });
    }

    function buildChart() {
        var canvas = document.getElementById('weightChart');
        if (!canvas || _chartKeys.length === 0) return;
        if (chartInstance) chartInstance.destroy();

        var labels = getChartLabels();
        var n = _chartKeys.length;
        var inner = document.getElementById('chartInner');
        var pxPer = inner ? inner.offsetWidth / n : 30;
        var fontSize = Math.max(9, Math.min(13, Math.round(pxPer / 5)));

        chartInstance = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '體重 (kg)',
                    data: _chartValues,
                    borderColor: '#7B8FA1',
                    backgroundColor: 'rgba(123,143,161,0.1)',
                    borderWidth: Math.max(2, Math.min(4, _chartZoom * 2.5)),
                    pointRadius: Math.max(4, Math.min(10, _chartZoom * 5)),
                    pointBackgroundColor: _chartColors,
                    pointBorderColor: _chartColors,
                    pointBorderWidth: 1,
                    fill: true,
                    tension: 0.35,
                    cubicInterpolationMode: 'monotone'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                layout: { padding: { bottom: 10, left: 4, right: 4 } },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        titleFont: { size: Math.max(11, fontSize) },
                        bodyFont: { size: Math.max(11, fontSize) },
                        callbacks: {
                            title: function(items) {
                                var idx = items[0].dataIndex;
                                var k = _chartKeys[idx];
                                var p = k.split('-');
                                var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
                                return parseInt(p[1]) + '/' + parseInt(p[2]) + '(' + DAY_NAMES[d.getDay()] + ')';
                            },
                            label: function(ctx) { return ctx.parsed.y + ' kg'; }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            font: { size: fontSize },
                            color: '#8B8B8B',
                            maxRotation: 45,
                            autoSkip: false
                        },
                        grid: { display: false }
                    },
                    y: {
                        ticks: { font: { size: fontSize }, color: '#8B8B8B' },
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    }
                }
            }
        });
    }

    var _pinchInited = false;

    function applyChartZoom(newZoom) {
        var scroll = document.getElementById('chartScroll');
        var inner = document.getElementById('chartInner');
        var closeBtn = document.getElementById('chartZoomClose');
        if (!inner || !scroll) return;

        var oldZoom = _chartZoom;
        _chartZoom = Math.max(1, Math.min(8, newZoom));

        // 只放大橫向（日期多），縱向完全不放大（體重變化小）
        var zoomX = _chartZoom;
        var w = Math.round(_chartBaseW * zoomX);
        var h = _chartBaseH;
        inner.style.width = w + 'px';
        inner.style.height = h + 'px';

        if (_chartZoom > 1.05 && !scroll.classList.contains('zoomed')) {
            scroll.classList.add('zoomed');
            if (closeBtn) closeBtn.style.display = 'block';
        } else if (_chartZoom <= 1.05 && scroll.classList.contains('zoomed')) {
            scroll.classList.remove('zoomed');
            if (closeBtn) closeBtn.style.display = 'none';
        }

        buildChart();
    }

    function resetChartZoom() {
        _chartZoom = 1;
        var scroll = document.getElementById('chartScroll');
        var inner = document.getElementById('chartInner');
        var closeBtn = document.getElementById('chartZoomClose');
        if (scroll) { scroll.classList.remove('zoomed'); scroll.scrollLeft = 0; scroll.scrollTop = 0; }
        if (inner) { inner.style.width = _chartBaseW + 'px'; inner.style.height = _chartBaseH + 'px'; }
        if (closeBtn) closeBtn.style.display = 'none';
        document.body.style.overflow = '';
        buildChart();
    }

    function initChartPinch() {
        if (_pinchInited) return;
        _pinchInited = true;
        var scroll = document.getElementById('chartScroll');
        if (!scroll) return;
        var startDist = 0;
        var startZoom = 1;
        var startScrollL = 0;
        var startScrollT = 0;
        var startMidX = 0;
        var startMidY = 0;

        function getTouchDist(e) {
            var t = e.touches;
            if (t.length < 2) return 0;
            var dx = t[0].clientX - t[1].clientX;
            var dy = t[0].clientY - t[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        scroll.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                startDist = getTouchDist(e);
                startZoom = _chartZoom;
                startScrollL = scroll.scrollLeft;
                startScrollT = scroll.scrollTop;
                startMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                startMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
        }, { passive: false });

        scroll.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2 && startDist > 0) {
                e.preventDefault();
                var dist = getTouchDist(e);
                var rawRatio = dist / startDist;
                var damped = 1 + (rawRatio - 1) * 0.2;
                var newZoom = Math.max(1, Math.min(8, startZoom * damped));
                applyChartZoom(newZoom);
                var scale = newZoom / startZoom;
                scroll.scrollLeft = (startScrollL + startMidX) * scale - startMidX;
                scroll.scrollTop = (startScrollT + startMidY) * scale - startMidY;
            }
        }, { passive: false });

        scroll.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) {
                startDist = 0;
                if (_chartZoom < 1.05) resetChartZoom();
            }
        }, { passive: true });
    }

    function renderChart() {
        var allKeys = Object.keys(weightData).filter(function(k){ return weightData[k].weight; }).sort();
        if (allKeys.length === 0) return;
        var keys = allKeys;
        if (scheduleStart && scheduleEnd) {
            var sStr = formatDate(scheduleStart);
            var eStr = formatDate(scheduleEnd);
            keys = allKeys.filter(function(k){ return k >= sStr && k <= eStr; });
        }
        if (keys.length === 0) return;

        _chartKeys = keys;
        _chartValues = keys.map(function(k){ return weightData[k].weight; });
        _chartColors = keys.map(function(k) {
            var p = k.split('-');
            var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
            var t = getDayType(d);
            return CARB_COLORS[t] || CARB_COLORS.none;
        });

        var scroll = document.getElementById('chartScroll');
        var inner = document.getElementById('chartInner');
        if (!scroll || !inner) return;

        _chartBaseW = window.innerWidth;
        _chartBaseH = 200;
        _chartZoom = 1;
        inner.style.width = _chartBaseW + 'px';
        inner.style.height = _chartBaseH + 'px';
        scroll.scrollLeft = 0;
        scroll.scrollTop = 0;
        scroll.classList.remove('zoomed');
        document.getElementById('chartZoomClose').style.display = 'none';
        document.body.style.overflow = '';

        buildChart();
        initChartPinch();
    }

    // ====== Scroll to today ======
    function scrollToToday() {
        var target = document.querySelector('.today-row');
        if (target) {
            var rowH = target.offsetHeight || 44;
            var rect = target.getBoundingClientRect();
            window.scrollBy(0, rect.top - rowH * 3);
        }
    }

    // ====== Helpers ======
    function formatDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
</script>
