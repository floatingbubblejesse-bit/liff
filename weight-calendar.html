<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居家體重紀錄｜金鶯減重</title>
    <style>
        :root { --blue: #7B8FA1; --blue-light: #EDE8E0; --green: #8B9D83; --green-light: #E8EDE6; --red: #A0626B; --orange: #C4A882; --brown: #B8926A; --bg: #F5F3EF; --card: #FDFBF7; --text: #4A4A4A; --muted: #8B8B8B; --border: #E8E4DC; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
        .header{background:linear-gradient(135deg, #7B8FA1, #6B7F91);color:white;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
        .header h1{font-size:16px;font-weight:700;flex:1}
        .header-sub{font-size:11px;opacity:0.8}
        .back-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
        .back-btn:hover{background:rgba(255,255,255,0.3)}

        /* Month Nav */
        .month-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px;background:white;border-bottom:1px solid var(--border)}
        .month-nav button{width:36px;height:36px;border:1px solid var(--border);border-radius:50%;background:white;font-size:16px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center}
        .month-nav button:active{background:var(--bg)}
        .month-title{font-size:17px;font-weight:700;min-width:120px;text-align:center}

        /* Calendar Grid */
        .cal-wrap{flex:1;overflow-y:auto;padding:8px}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
        .cal-weekday{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0}
        .cal-weekday.sat{color:var(--blue)}
        .cal-weekday.sun{color:var(--red)}

        .cal-cell{background:white;border-radius:8px;padding:4px 2px;min-height:72px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;border:1px solid transparent;transition:all 0.15s}
        .cal-cell.today{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
        .cal-cell.empty{background:transparent;border:none;min-height:0}
        .cal-cell.other-month{opacity:0.3}

        .cal-date{font-size:12px;font-weight:600;color:var(--text);line-height:1}
        .cal-cell.today .cal-date{background:var(--blue);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
        .cal-cell.sat .cal-date{color:var(--blue)}
        .cal-cell.sun .cal-date{color:var(--red)}

        /* Day type badge */
        .cal-type{width:26px;height:18px;border-radius:4px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s;user-select:none;-webkit-tap-highlight-color:transparent}
        .cal-type:active{transform:scale(0.85)}
        .cal-type.t-high{background:#F8D7DA;color:#A0626B}
        .cal-type.t-low{background:#D4EDDA;color:#6B8F71}
        .cal-type.t-mid{background:#FFF3CD;color:#B8926A}
        .cal-type.t-fast{background:#E2E3E5;color:#4A4A4A}
        .cal-type.t-none{background:transparent;color:transparent;cursor:default}

        /* Weight input */
        .cal-weight{width:90%;max-width:48px;border:none;border-bottom:1px dashed var(--border);background:transparent;text-align:center;font-size:11px;font-weight:700;color:var(--red);padding:1px 0;outline:none;font-family:inherit}
        .cal-weight::placeholder{color:#ccc;font-weight:400;font-size:10px}
        .cal-weight:focus{border-bottom-color:var(--blue);border-bottom-style:solid}

        /* Weight unit hint */
        .cal-unit{font-size:8px;color:var(--muted);line-height:1;margin-top:-1px}

        /* Stats bar */
        .stats-bar{background:white;border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;flex-shrink:0}
        .stat-item{flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px}
        .stat-value{font-size:16px;font-weight:700;color:var(--red)}
        .stat-label{font-size:10px;color:var(--muted);margin-top:2px}

        /* Save button */
        .save-bar{background:white;border-top:1px solid var(--border);padding:10px 16px;flex-shrink:0}
        .save-btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;gap:6px}
        .save-btn:active{background:#7A8E74}
        .save-btn:disabled{background:#aaa;cursor:not-allowed}

        /* Loading */
        .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:14px}
        .spinner{width:40px;height:40px;border:4px solid #E8E4DC;border-top-color:var(--blue);border-radius:50%;animation:spin .9s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Legend */
        .legend{display:flex;justify-content:center;gap:12px;padding:8px;flex-wrap:wrap}
        .legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
        .legend-dot{width:14px;height:14px;border-radius:3px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
    </style>
</head>
<body>

<div class="header">
    <a class="back-btn" onclick="history.back()">← 返回</a>
    <div>
        <h1>居家體重紀錄</h1>
        <div class="header-sub" id="patientInfo"></div>
    </div>
</div>

<div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <div class="month-title" id="monthTitle"></div>
    <button onclick="changeMonth(1)">▶</button>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-dot t-high">高</div>高碳日</div>
    <div class="legend-item"><div class="legend-dot t-mid">中</div>中碳日</div>
    <div class="legend-item"><div class="legend-dot t-low">低</div>低碳日</div>
    <div class="legend-item"><div class="legend-dot t-fast">斷</div>斷食日</div>
</div>

<div class="cal-wrap" id="calWrap">
    <div class="loading"><div class="spinner"></div><span style="color:#8B8B8B;font-size:13px">載入中...</span></div>
</div>

<div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-item"><div class="stat-value" id="statStart">-</div><div class="stat-label">月初體重</div></div>
    <div class="stat-item"><div class="stat-value" id="statLatest">-</div><div class="stat-label">最新體重</div></div>
    <div class="stat-item"><div class="stat-value" id="statDiff">-</div><div class="stat-label">本月變化</div></div>
    <div class="stat-item"><div class="stat-value" id="statCount">0</div><div class="stat-label">紀錄天數</div></div>
</div>

<div class="save-bar">
    <button class="save-btn" id="saveBtn" onclick="saveWeights()">💾 儲存體重紀錄</button>
</div>

<script>
    var MEALS_GAS = 'https://script.google.com/macros/s/AKfycbxV3Cc44ohL4i7-xk29hAxFSPaWktOFgWxmCRGsg0uvxaJHbRqiMXrJjBAyva3XwDNY/exec';
    var N8N = 'https://huangcs.app.n8n.cloud/webhook';

    // 碳水類型
    var CYCLE_OPTS = [
        {key:'high', label:'高', cls:'t-high'},
        {key:'mid',  label:'中', cls:'t-mid'},
        {key:'low',  label:'低', cls:'t-low'},
        {key:'fast', label:'斷', cls:'t-fast'}
    ];
    var CYCLE_LABELS = {}; CYCLE_OPTS.forEach(function(o){ CYCLE_LABELS[o.key] = o.label; });
    var CYCLE_CLS = {}; CYCLE_OPTS.forEach(function(o){ CYCLE_CLS[o.key] = o.cls; });

    // State
    var currentYear, currentMonth; // 0-indexed month
    var patientSn = '', patientUid = '';
    var cycleSchedule = ['high','high','mid','mid','high','mid','mid']; // 六日一二三四五
    var visitDate = null; // Date object of last consultation
    var weightData = {}; // { 'YYYY-MM-DD': { weight: number, type: string } }
    var dayTypeOverrides = {}; // { 'YYYY-MM-DD': 'high'|'mid'|'low'|'fast' }
    var visitRecords = []; // all visit records with dates and schedules

    // Init
    (function init() {
        var params = new URLSearchParams(location.search);
        patientSn = params.get('id') || '';
        patientUid = params.get('uid') || '';

        var now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();

        loadData();
    })();

    function loadData() {
        // Load diet plan (schedule) + visit history
        var loaded = 0, total = 2;
        function check() { loaded++; if (loaded >= total) onDataReady(); }

        // 1. Load current diet plan (for schedule)
        if (patientSn) {
            fetch(MEALS_GAS + '?dietPlan=' + encodeURIComponent(patientSn))
                .then(function(r){ return r.json(); })
                .then(function(data){
                    if (data.schedule && data.schedule.length === 7) cycleSchedule = data.schedule;
                    check();
                })
                .catch(check);
        } else { check(); }

        // 2. Load visit history (for dates + past schedules)
        if (patientSn) {
            fetch(MEALS_GAS + '?dietHistory=' + encodeURIComponent(patientSn))
                .then(function(r){ return r.json(); })
                .then(function(data){
                    if (Array.isArray(data) && data.length > 0) {
                        visitRecords = data.sort(function(a,b){ return (a.date||'').localeCompare(b.date||''); });
                        // 最近一次看診日期
                        var latest = visitRecords[visitRecords.length - 1];
                        if (latest && latest.date) {
                            var p = latest.date.split('-');
                            visitDate = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
                            // 用最近一次的 schedule
                            if (latest.schedule && latest.schedule.length === 7) {
                                cycleSchedule = latest.schedule;
                            }
                        }
                        // 載入患者資訊
                        if (latest) {
                            var info = document.getElementById('patientInfo');
                            if (info) info.textContent = patientSn;
                        }
                    }
                    check();
                })
                .catch(check);
        } else { check(); }

        // 3. Load saved weight data
        if (patientSn) {
            fetch(N8N + '/get-weight?sn=' + encodeURIComponent(patientSn))
                .then(function(r){ return r.json(); })
                .then(function(data){
                    if (data && typeof data === 'object') {
                        // { '2026-03-15': { weight: 75.6, type: 'high' }, ... }
                        if (data.weights) weightData = data.weights;
                        if (data.overrides) dayTypeOverrides = data.overrides;
                    }
                })
                .catch(function(){});
        }
    }

    function onDataReady() {
        renderCalendar();
        document.getElementById('statsBar').style.display = 'flex';
    }

    // ====== 計算某日期的碳日類型 ======
    function getDayType(dateObj) {
        var dateStr = formatDate(dateObj);

        // 手動覆蓋
        if (dayTypeOverrides[dateStr]) return dayTypeOverrides[dateStr];

        // 找到該日期對應的看診紀錄（最近一次在此日期之前或當天的看診）
        var applicableVisit = null;
        for (var i = visitRecords.length - 1; i >= 0; i--) {
            var vd = visitRecords[i].date;
            if (vd && vd <= dateStr) { applicableVisit = visitRecords[i]; break; }
        }

        if (!applicableVisit || !applicableVisit.date) {
            // 沒有看診紀錄，用預設 cycleSchedule
            return getTypeFromSchedule(dateObj, visitDate || new Date(), cycleSchedule);
        }

        var vParts = applicableVisit.date.split('-');
        var vDate = new Date(parseInt(vParts[0]), parseInt(vParts[1])-1, parseInt(vParts[2]));
        var sch = (applicableVisit.schedule && applicableVisit.schedule.length === 7) ? applicableVisit.schedule : cycleSchedule;

        return getTypeFromSchedule(dateObj, vDate, sch);
    }

    function getTypeFromSchedule(dateObj, startDate, schedule) {
        // schedule 索引: 0=六, 1=日, 2=一, 3=二, 4=三, 5=四, 6=五
        // JS getDay(): 0=日, 1=一, 2=二, 3=三, 4=四, 5=五, 6=六
        // 從看診隔天開始排程
        var jsDay = dateObj.getDay(); // 0=Sun...6=Sat
        // 轉換為 schedule 索引: 六=0 → jsDay 6, 日=1 → jsDay 0, 一=2 → jsDay 1 ...
        var schIdx;
        if (jsDay === 0) schIdx = 1;      // 日
        else if (jsDay === 6) schIdx = 0;  // 六
        else schIdx = jsDay + 1;           // 一=2, 二=3, ...

        return schedule[schIdx] || 'mid';
    }

    // ====== Render Calendar ======
    function renderCalendar() {
        var wrap = document.getElementById('calWrap');
        var titleEl = document.getElementById('monthTitle');
        titleEl.textContent = currentYear + '年 ' + (currentMonth + 1) + '月';

        var firstDay = new Date(currentYear, currentMonth, 1);
        var lastDay = new Date(currentYear, currentMonth + 1, 0);
        var totalDays = lastDay.getDate();

        // JS getDay: 0=Sun, we want to start from Mon
        // 一二三四五六日
        var startDow = firstDay.getDay(); // 0=Sun
        // Convert to Mon-start: Mon=0, Tue=1, ..., Sun=6
        var startOffset = (startDow === 0) ? 6 : startDow - 1;

        var today = new Date();
        var todayStr = formatDate(today);

        var html = '<div class="cal-grid">';

        // Weekday headers: 一二三四五六日
        var weekdays = ['一','二','三','四','五','六','日'];
        var weekCls = ['','','','','','sat','sun'];
        for (var w = 0; w < 7; w++) {
            html += '<div class="cal-weekday ' + weekCls[w] + '">' + weekdays[w] + '</div>';
        }

        // Empty cells before 1st
        for (var e = 0; e < startOffset; e++) {
            html += '<div class="cal-cell empty"></div>';
        }

        // Day cells
        for (var d = 1; d <= totalDays; d++) {
            var dateObj = new Date(currentYear, currentMonth, d);
            var dateStr = formatDate(dateObj);
            var isToday = dateStr === todayStr;
            var dow = dateObj.getDay();
            var isSat = dow === 6, isSun = dow === 0;

            var dayType = getDayType(dateObj);
            var opt = CYCLE_OPTS.find(function(o){ return o.key === dayType; }) || CYCLE_OPTS[1];

            var savedWeight = weightData[dateStr] ? weightData[dateStr].weight : '';

            var cellCls = 'cal-cell' + (isToday ? ' today' : '') + (isSat ? ' sat' : '') + (isSun ? ' sun' : '');
            html += '<div class="' + cellCls + '">';
            html += '<div class="cal-date">' + d + '</div>';
            html += '<div class="cal-type ' + opt.cls + '" onclick="toggleDayType(\'' + dateStr + '\')" title="點擊切換碳日類型">' + opt.label + '</div>';
            html += '<input class="cal-weight" type="text" inputmode="decimal" placeholder="kg" data-date="' + dateStr + '" value="' + (savedWeight || '') + '" onchange="onWeightChange(this)" onfocus="this.select()">';
            html += '</div>';
        }

        // Trailing empty cells
        var totalCells = startOffset + totalDays;
        var trailing = (7 - (totalCells % 7)) % 7;
        for (var t = 0; t < trailing; t++) {
            html += '<div class="cal-cell empty"></div>';
        }

        html += '</div>';
        wrap.innerHTML = html;

        updateStats();
    }

    // ====== Toggle Day Type ======
    function toggleDayType(dateStr) {
        var current = dayTypeOverrides[dateStr] || getDayTypeRaw(dateStr);
        var idx = CYCLE_OPTS.findIndex(function(o){ return o.key === current; });
        idx = (idx + 1) % CYCLE_OPTS.length;
        dayTypeOverrides[dateStr] = CYCLE_OPTS[idx].key;
        renderCalendar();
    }

    function getDayTypeRaw(dateStr) {
        var p = dateStr.split('-');
        var dateObj = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
        // Temporarily remove override to get calculated type
        var saved = dayTypeOverrides[dateStr];
        delete dayTypeOverrides[dateStr];
        var type = getDayType(dateObj);
        if (saved) dayTypeOverrides[dateStr] = saved;
        return type;
    }

    // ====== Weight Input ======
    function onWeightChange(el) {
        var dateStr = el.dataset.date;
        var val = parseFloat(el.value);
        if (!dateStr) return;
        if (isNaN(val) || val <= 0) {
            delete weightData[dateStr];
            el.value = '';
        } else {
            if (!weightData[dateStr]) weightData[dateStr] = {};
            weightData[dateStr].weight = val;
        }
        updateStats();
    }

    // ====== Stats ======
    function updateStats() {
        var monthKeys = Object.keys(weightData).filter(function(k) {
            return k.startsWith(currentYear + '-' + String(currentMonth + 1).padStart(2, '0'));
        }).sort();

        var count = monthKeys.length;
        var first = count > 0 ? weightData[monthKeys[0]].weight : null;
        var last = count > 0 ? weightData[monthKeys[monthKeys.length - 1]].weight : null;

        document.getElementById('statCount').textContent = count;
        document.getElementById('statStart').textContent = first ? first.toFixed(1) : '-';
        document.getElementById('statLatest').textContent = last ? last.toFixed(1) : '-';

        if (first && last) {
            var diff = last - first;
            var sign = diff > 0 ? '+' : '';
            document.getElementById('statDiff').textContent = sign + diff.toFixed(1);
            document.getElementById('statDiff').style.color = diff < 0 ? '#6B8F71' : diff > 0 ? '#A0626B' : '#8B8B8B';
        } else {
            document.getElementById('statDiff').textContent = '-';
            document.getElementById('statDiff').style.color = '';
        }
    }

    // ====== Save ======
    function saveWeights() {
        var btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.textContent = '儲存中...';

        var payload = {
            patientSn: patientSn,
            uid: patientUid,
            weights: weightData,
            overrides: dayTypeOverrides
        };

        fetch(N8N + '/save-weight', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(r){ return r.json(); })
        .then(function(res){
            btn.disabled = false;
            if (res.ok || res.success) {
                btn.textContent = '已儲存 ✓';
                btn.style.background = '#6B8F71';
                setTimeout(function(){ btn.textContent = '💾 儲存體重紀錄'; btn.style.background = ''; }, 2000);
            } else {
                btn.textContent = '💾 儲存體重紀錄';
                alert('儲存失敗: ' + (res.error || ''));
            }
        })
        .catch(function(err){
            btn.disabled = false;
            btn.textContent = '💾 儲存體重紀錄';
            alert('儲存失敗: ' + err.message);
        });
    }

    // ====== Month Navigation ======
    function changeMonth(delta) {
        currentMonth += delta;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        renderCalendar();
    }

    // ====== Helpers ======
    function formatDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function esc(s) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }
</script>
</body>
</html>
