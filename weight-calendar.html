<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居家體重紀錄｜金鶯減重</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root { --blue:#7B8FA1; --blue-light:#EDE8E0; --green:#8B9D83; --green-light:#E8EDE6; --red:#A0626B; --orange:#C4A882; --brown:#B8926A; --bg:#F5F3EF; --card:#FDFBF7; --text:#4A4A4A; --muted:#8B8B8B; --border:#E8E4DC; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:20px}

        /* ====== Header ====== */
        .page-header{background:linear-gradient(135deg,#7B8FA1,#6B7F91);color:white;padding:18px 20px;text-align:center}
        .page-header h1{font-size:17px;font-weight:700;letter-spacing:1px}
        .page-header p{font-size:11px;opacity:0.85;margin-top:3px}

        /* ====== Month nav ====== */
        .month-bar{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px 16px;background:white;border-bottom:1px solid var(--border)}
        .month-bar button{width:32px;height:32px;border:1px solid var(--border);border-radius:50%;background:white;font-size:14px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
        .month-bar button:active{background:var(--bg)}
        .month-title{font-size:15px;font-weight:700;min-width:110px;text-align:center}

        /* ====== Stats row ====== */
        .stats-row{display:flex;gap:6px;padding:10px 14px;background:white;border-bottom:1px solid var(--border)}
        .stat-item{flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px}
        .stat-value{font-size:15px;font-weight:700;color:var(--red)}
        .stat-label{font-size:10px;color:var(--muted);margin-top:2px}

        /* ====== Table ====== */
        .wt-table{width:100%;border-collapse:collapse;background:white}
        .wt-table thead th{position:sticky;top:0;background:#F8F6F2;font-size:12px;font-weight:700;color:var(--muted);padding:10px 8px;text-align:center;border-bottom:2px solid var(--border);z-index:2}
        .wt-table tbody td{padding:10px 6px;text-align:center;border-bottom:1px solid #F0EDE6;font-size:13px;vertical-align:middle}
        .wt-table tbody tr:active{background:#FDFBF7}
        .wt-table tbody tr.today-row{background:#EDF2F7}
        .wt-table tbody tr.today-row td{border-bottom-color:#D0DBE6}
        .wt-date{font-weight:600;color:var(--text);white-space:nowrap}
        .wt-date .wt-day{font-size:11px;color:var(--muted);font-weight:400}
        .wt-table tbody tr.today-row .wt-date{color:var(--blue);font-weight:800}
        .wt-weight-cell{position:relative;min-width:110px}
        .wt-weight-val{font-size:15px;font-weight:700;color:var(--red);cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:24px;display:flex;align-items:center;justify-content:center;gap:2px}
        .wt-weight-val.empty{color:var(--muted);font-weight:400;font-size:12px}

        /* ====== Inline edit row ====== */
        .wt-edit-row{display:none;align-items:center;justify-content:center;gap:4px}
        .wt-edit-row.active{display:flex}
        .wt-edit-input{width:60px;padding:4px 0;border:none;border-bottom:2px solid var(--blue);font-size:15px;font-weight:700;text-align:center;color:var(--red);outline:none;background:transparent;-moz-appearance:textfield}
        .wt-edit-input::-webkit-outer-spin-button,.wt-edit-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
        .wt-edit-input::placeholder{color:#ccc;font-weight:400;font-size:12px}
        .wt-adj-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:white;color:var(--text);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
        .wt-adj-btn:active{background:var(--bg)}
        .wt-save-btn{padding:3px 10px;border:1px solid var(--green);border-radius:6px;background:white;color:var(--green);font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
        .wt-save-btn:active{background:var(--green-light)}
        .wt-unit{font-size:11px;color:var(--muted)}

        /* ====== Carb day badge ====== */
        .wt-type{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.15s;user-select:none}
        .wt-type:active{transform:scale(0.85)}
        .wt-type.t-high{background:#F8D7DA;color:#A0626B}
        .wt-type.t-mid{background:#FFF3CD;color:#B8926A}
        .wt-type.t-low{background:#D4EDDA;color:#6B8F71}
        .wt-type.t-fast{background:#E2E3E5;color:#4A4A4A}
        .wt-type.t-none{background:var(--bg);color:var(--muted)}

        /* ====== Diff ====== */
        .diff-good{color:#6B8F71;font-weight:600;font-size:12px}
        .diff-warn{color:#A0626B;font-weight:600;font-size:12px}
        .diff-same{color:var(--muted);font-size:12px}

        /* ====== Chart section ====== */
        .section{margin:10px;background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);overflow:hidden}
        .section-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;gap:8px}
        .section-header:active{background:#FDFBF7}
        .section-icon{font-size:18px}
        .section-title{flex:1;font-size:14px;font-weight:700;color:var(--text)}
        .section-arrow{font-size:11px;color:var(--muted);transition:transform 0.25s ease}
        .section.open .section-arrow{transform:rotate(180deg)}
        .section-body{display:none;border-top:1px solid var(--border);padding:10px}
        .section.open .section-body{display:block}
        .chart-wrap{position:relative;height:200px;padding:8px 0}

        /* ====== Loading ====== */
        .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:40vh;gap:14px}
        .spinner{width:40px;height:40px;border:4px solid #E8E4DC;border-top-color:var(--blue);border-radius:50%;animation:spin .9s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="page-header">
    <h1>📋 居家體重紀錄</h1>
    <p id="headerSub">載入中...</p>
</div>

<div class="month-bar">
    <button onclick="changeMonth(-1)">◀</button>
    <div class="month-title" id="monthTitle"></div>
    <button onclick="changeMonth(1)">▶</button>
</div>

<div class="stats-row">
    <div class="stat-item"><div class="stat-value" id="statStart">-</div><div class="stat-label">月初體重</div></div>
    <div class="stat-item"><div class="stat-value" id="statLatest">-</div><div class="stat-label">最新體重</div></div>
    <div class="stat-item"><div class="stat-value" id="statDiff">-</div><div class="stat-label">本月變化</div></div>
    <div class="stat-item"><div class="stat-value" id="statCount">0</div><div class="stat-label">紀錄天數</div></div>
</div>

<table class="wt-table">
    <thead><tr><th>日期</th><th>體重</th><th>碳日</th><th>變化</th></tr></thead>
    <tbody id="wtBody"></tbody>
</table>

<!-- ====== 體重趨勢圖（收折） ====== -->
<div class="section open" id="chartSection">
    <div class="section-header" onclick="toggleSection('chartSection')">
        <span class="section-icon">📈</span>
        <span class="section-title">體重趨勢</span>
        <span class="section-arrow">▼</span>
    </div>
    <div class="section-body">
        <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
    </div>
</div>

<div id="loadingOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
    <div class="spinner"></div>
    <span style="color:#8B8B8B;font-size:13px">載入中...</span>
</div>

<script>
    var LIFF_ID = '2009326025-0pbHTZa7';
    var MEALS_GAS = 'https://script.google.com/macros/s/AKfycbxV3Cc44ohL4i7-xk29hAxFSPaWktOFgWxmCRGsg0uvxaJHbRqiMXrJjBAyva3XwDNY/exec';
    var N8N = 'https://huangcs.app.n8n.cloud/webhook';

    var CYCLE_OPTS = [
        {key:'high', label:'高', short:'高', cls:'t-high'},
        {key:'mid',  label:'中', short:'中', cls:'t-mid'},
        {key:'low',  label:'低', short:'低', cls:'t-low'},
        {key:'fast', label:'斷', short:'斷', cls:'t-fast'},
        {key:'none', label:'-',  short:'-',  cls:'t-none'}
    ];
    var DAY_NAMES = ['日','一','二','三','四','五','六'];

    var currentYear, currentMonth;
    var patientSn = '', patientUid = '';
    var cycleSchedule = ['high','high','mid','mid','high','mid','mid'];
    var visitDate = null;
    var weightData = {};
    var dayTypeOverrides = {};
    var visitRecords = [];
    var chartInstance = null;
    var editingDate = null; // 目前正在編輯的日期

    // ====== Init ======
    (function init() {
        var params = new URLSearchParams(location.search);
        patientSn = params.get('id') || '';
        patientUid = params.get('uid') || '';
        var now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();

        if (patientSn) {
            loadData();
        } else {
            liff.init({ liffId: LIFF_ID }).then(function() {
                if (!liff.isLoggedIn()) { liff.login(); return; }
                return liff.getProfile();
            }).then(function(profile) {
                if (!profile) return;
                patientUid = profile.userId;
                document.getElementById('headerSub').textContent = profile.displayName + ' 的體重紀錄';
                return fetch(MEALS_GAS + '?lookupUid=' + encodeURIComponent(patientUid))
                    .then(function(r){ return r.json(); });
            }).then(function(result) {
                if (!result) return;
                if (result.patientSn) {
                    patientSn = result.patientSn;
                }
                loadData();
            }).catch(function(err) {
                loadData();
            });
        }
    })();

    function parseDateToYMD(dateVal) {
        if (!dateVal) return '';
        if (typeof dateVal === 'string' && /^\d{4}-\d{2}-\d{2}/.test(dateVal)) return dateVal.substring(0, 10);
        var d = new Date(dateVal);
        if (isNaN(d.getTime())) return '';
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function loadData() {
        loadLocalWeights();
        if (!patientSn) { onDataReady(); return; }
        var pending = 2;
        function checkDone() { pending--; if (pending <= 0) onDataReady(); }

        fetch(MEALS_GAS + '?dietPlan=' + encodeURIComponent(patientSn))
            .then(function(r){ return r.json(); })
            .then(function(data){
                if (data.schedule && data.schedule.length === 7) {
                    cycleSchedule = data.schedule;
                    var planDate = parseDateToYMD(data.date);
                    if (!planDate) planDate = formatDate(new Date());
                    visitRecords = [{
                        date: planDate,
                        schedule: data.schedule,
                        weeks: data.weeks || 4
                    }];
                    var p = planDate.split('-');
                    visitDate = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
                }
                checkDone();
            }).catch(function(e){ checkDone(); });

        fetch(MEALS_GAS + '?homeWeight=' + encodeURIComponent(patientSn))
            .then(function(r){ return r.json(); })
            .then(function(data){
                if (data.records && data.records.length > 0) {
                    for (var i = 0; i < data.records.length; i++) {
                        var rec = data.records[i];
                        if (rec.date && rec.weight) {
                            if (!weightData[rec.date]) weightData[rec.date] = {};
                            weightData[rec.date].weight = parseFloat(rec.weight);
                            if (rec.dayType) weightData[rec.date].dayType = rec.dayType;
                        }
                    }
                    saveLocalWeights();
                }
                checkDone();
            }).catch(function(e){ checkDone(); });
    }

    function storageKey() { return 'weight_' + (patientSn || patientUid || 'default'); }

    function loadLocalWeights() {
        try {
            var raw = localStorage.getItem(storageKey());
            if (raw) {
                var data = JSON.parse(raw);
                if (data.weights) weightData = data.weights;
                if (data.overrides) dayTypeOverrides = data.overrides;
            }
        } catch(e) {}
    }

    function saveLocalWeights() {
        try {
            localStorage.setItem(storageKey(), JSON.stringify({ weights: weightData, overrides: dayTypeOverrides }));
        } catch(e) {}
    }

    function onDataReady() {
        document.getElementById('loadingOverlay').style.display = 'none';
        if (patientSn) {
            document.getElementById('headerSub').textContent = patientSn;
        }
        renderTable();
        renderChart();
    }

    // ====== Day Type Calculation ======
    function getDayType(dateObj) {
        var dateStr = formatDate(dateObj);
        if (dayTypeOverrides[dateStr]) return dayTypeOverrides[dateStr];
        var applicableVisit = null;
        for (var i = visitRecords.length - 1; i >= 0; i--) {
            var vd = visitRecords[i].date;
            if (vd && vd <= dateStr) { applicableVisit = visitRecords[i]; break; }
        }
        if (!applicableVisit || !applicableVisit.date) return 'none';
        var vParts = applicableVisit.date.split('-');
        var vDate = new Date(parseInt(vParts[0]), parseInt(vParts[1])-1, parseInt(vParts[2]));
        var sch = (applicableVisit.schedule && applicableVisit.schedule.length === 7) ? applicableVisit.schedule : cycleSchedule;
        var weeks = applicableVisit.weeks || 4;
        return getTypeFromSchedule(dateObj, vDate, sch, weeks);
    }

    function getTypeFromSchedule(dateObj, visitDateObj, schedule, weeks) {
        var startDate = new Date(visitDateObj.getFullYear(), visitDateObj.getMonth(), visitDateObj.getDate() + 1);
        var endDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + (weeks * 7) - 1);
        var d = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
        if (d < startDate || d > endDate) return 'none';
        var jsDay = dateObj.getDay();
        var schIdx;
        if (jsDay === 0) schIdx = 1;
        else if (jsDay === 6) schIdx = 0;
        else schIdx = jsDay + 1;
        return schedule[schIdx] || 'mid';
    }

    // ====== Render Table ======
    function renderTable() {
        var titleEl = document.getElementById('monthTitle');
        titleEl.textContent = currentYear + '年 ' + (currentMonth + 1) + '月';

        var lastDay = new Date(currentYear, currentMonth + 1, 0);
        var totalDays = lastDay.getDate();
        var todayStr = formatDate(new Date());

        // 收集本月所有日期（舊→新，1號在上）
        var rows = [];
        for (var d = 1; d <= totalDays; d++) {
            var dateObj = new Date(currentYear, currentMonth, d);
            var dateStr = formatDate(dateObj);
            var dayType = getDayType(dateObj);
            var opt = CYCLE_OPTS.find(function(o){ return o.key === dayType; }) || CYCLE_OPTS[4];
            var wt = (weightData[dateStr] && weightData[dateStr].weight) ? weightData[dateStr].weight : null;
            rows.push({ d: d, dateObj: dateObj, dateStr: dateStr, dayType: dayType, opt: opt, wt: wt, isToday: dateStr === todayStr });
        }

        // 算變化：和前一天（日期更早的）有體重紀錄的比較
        // rows 是從小到大排的，所以 "前一天" = rows 裡 index 更小且有 wt 的
        var html = '';
        for (var i = 0; i < rows.length; i++) {
            var r = rows[i];
            var dayName = DAY_NAMES[r.dateObj.getDay()];
            var dateLabel = (r.dateObj.getMonth() + 1) + '/' + r.d + '<span class="wt-day">(' + dayName + ')</span>';
            var isEditing = editingDate === r.dateStr;

            // 計算變化 — 往前找最近有體重的 row（日期更早 = index 更小）
            var diff = '';
            if (r.wt !== null) {
                for (var j = i - 1; j >= 0; j--) {
                    if (rows[j].wt !== null) {
                        var delta = r.wt - rows[j].wt;
                        var sign = delta > 0 ? '+' : '';
                        var cls = delta < 0 ? 'diff-good' : delta > 0 ? 'diff-warn' : 'diff-same';
                        diff = '<span class="' + cls + '">' + sign + delta.toFixed(1) + '</span>';
                        break;
                    }
                }
            }

            var trCls = r.isToday ? ' class="today-row"' : '';
            html += '<tr' + trCls + '>';
            html += '<td><div class="wt-date">' + dateLabel + '</div></td>';

            // 體重欄
            html += '<td class="wt-weight-cell">';
            if (isEditing) {
                html += '<div class="wt-edit-row active">';
                html += '<button class="wt-adj-btn" onclick="adjWeightRow(\'' + r.dateStr + '\',-0.1)">−</button>';
                html += '<input class="wt-edit-input" id="editInput_' + r.dateStr + '" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="--.-" value="' + (r.wt !== null ? r.wt.toFixed(1) : '') + '">';
                html += '<button class="wt-adj-btn" onclick="adjWeightRow(\'' + r.dateStr + '\',0.1)">+</button>';
                html += '<span class="wt-unit">kg</span>';
                html += '<button class="wt-save-btn" id="saveBtn_' + r.dateStr + '" onclick="saveWeight(\'' + r.dateStr + '\')">儲存</button>';
                html += '</div>';
            } else {
                if (r.wt !== null) {
                    html += '<div class="wt-weight-val" onclick="startEdit(\'' + r.dateStr + '\')">' + r.wt.toFixed(1) + '</div>';
                } else {
                    html += '<div class="wt-weight-val empty" onclick="startEdit(\'' + r.dateStr + '\')">點擊輸入</div>';
                }
            }
            html += '</td>';

            // 碳日
            html += '<td><span class="wt-type ' + r.opt.cls + '" onclick="cycleDayType(\'' + r.dateStr + '\')">' + r.opt.short + '</span></td>';

            // 變化
            html += '<td>' + diff + '</td>';
            html += '</tr>';
        }

        document.getElementById('wtBody').innerHTML = html;

        // 如果正在編輯，focus 到 input
        if (editingDate) {
            var inp = document.getElementById('editInput_' + editingDate);
            if (inp) {
                inp.focus();
                inp.setSelectionRange(inp.value.length, inp.value.length);
            }
        }

        updateStats();

        // 頁面剛載入時滾動到今天的行
        if (!window._scrolledToToday) {
            window._scrolledToToday = true;
            setTimeout(function() {
                var todayRow = document.querySelector('.today-row');
                if (todayRow) todayRow.scrollIntoView({behavior:'smooth', block:'center'});
            }, 100);
        }
    }

    // ====== Edit weight in row ======
    var _editJustOpened = false; // 防止 startEdit 和 document click 在同一事件中衝突

    function startEdit(dateStr) {
        _editJustOpened = true;
        editingDate = dateStr;
        renderTable();
        setTimeout(function() { _editJustOpened = false; }, 300);
    }

    function cancelEdit() {
        if (_editJustOpened) return;
        editingDate = null;
        renderTable();
    }

    // 點擊編輯區外面才取消編輯
    document.addEventListener('touchstart', function(e) {
        if (!editingDate || _editJustOpened) return;
        var editRow = document.querySelector('.wt-edit-row.active');
        if (editRow && !editRow.contains(e.target)) {
            // 不取消如果點的是碳日 badge 或另一個體重欄
            if (e.target.closest && (e.target.closest('.wt-type') || e.target.closest('.wt-weight-val'))) return;
            cancelEdit();
        }
    }, {passive: true});
    document.addEventListener('click', function(e) {
        if (!editingDate || _editJustOpened) return;
        var editRow = document.querySelector('.wt-edit-row.active');
        if (editRow && !editRow.contains(e.target)) {
            if (e.target.closest && (e.target.closest('.wt-type') || e.target.closest('.wt-weight-val'))) return;
            cancelEdit();
        }
    });

    function adjWeightRow(dateStr, delta) {
        var inp = document.getElementById('editInput_' + dateStr);
        if (!inp) return;
        var val = parseFloat(inp.value);
        if (isNaN(val) || val <= 0) {
            // 找最近有紀錄的體重當起始值
            var keys = Object.keys(weightData).sort();
            val = (keys.length > 0 && weightData[keys[keys.length - 1]].weight) ? weightData[keys[keys.length - 1]].weight : 50.0;
        }
        val = Math.round((val + delta) * 10) / 10;
        if (val < 20) val = 20;
        if (val > 200) val = 200;
        inp.value = val.toFixed(1);
        inp.focus();
    }

    function saveWeight(dateStr) {
        var inp = document.getElementById('editInput_' + dateStr);
        if (!inp) return;
        var rawVal = inp.value.trim();
        var btn = document.getElementById('saveBtn_' + dateStr);

        // 允許清空：刪除體重
        if (rawVal === '') {
            if (weightData[dateStr]) {
                delete weightData[dateStr].weight;
                if (!weightData[dateStr].dayType) delete weightData[dateStr];
            }
            saveLocalWeights();
            editingDate = null;
            renderTable();
            renderChart();

            // 同步刪除到 Sheet（送 weight=0 代表清除）
            if (patientSn) {
                var delUrl = MEALS_GAS
                  + '?saveHomeWeight=true'
                  + '&patientSn=' + encodeURIComponent(patientSn)
                  + '&date=' + encodeURIComponent(dateStr)
                  + '&weight=0';
                fetch(delUrl, { mode: 'no-cors', redirect: 'follow' }).catch(function(){});
            }
            return;
        }

        var val = parseFloat(rawVal);
        if (isNaN(val) || val <= 0) { alert('請輸入有效的體重'); return; }

        if (!weightData[dateStr]) weightData[dateStr] = {};
        weightData[dateStr].weight = val;
        saveLocalWeights();

        btn.textContent = '儲存中…';
        btn.disabled = true;

        var p = dateStr.split('-');
        var dateObj = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
        var dayType = getDayType(dateObj);

        var saveUrl = MEALS_GAS
          + '?saveHomeWeight=true'
          + '&patientSn=' + encodeURIComponent(patientSn)
          + '&date=' + encodeURIComponent(dateStr)
          + '&weight=' + encodeURIComponent(val)
          + '&dayType=' + encodeURIComponent(dayType);

        fetch(saveUrl, { mode: 'no-cors', redirect: 'follow' })
        .then(function(){
            btn.disabled = false;
            btn.textContent = '✓';
            btn.style.color = '#6B8F71';
            btn.style.borderColor = '#6B8F71';
            setTimeout(function(){
                editingDate = null;
                renderTable();
                renderChart();
            }, 800);
        })
        .catch(function(){
            btn.disabled = false;
            btn.textContent = '✓';
            btn.style.color = '#6B8F71';
            setTimeout(function(){
                editingDate = null;
                renderTable();
                renderChart();
            }, 800);
        });
    }

    // ====== Cycle carb day type ======
    function cycleDayType(dateStr) {
        var p = dateStr.split('-');
        var dateObj = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
        var current = getDayType(dateObj);
        var idx = CYCLE_OPTS.findIndex(function(o){ return o.key === current; });
        idx = (idx + 1) % CYCLE_OPTS.length;
        dayTypeOverrides[dateStr] = CYCLE_OPTS[idx].key;
        saveLocalWeights();
        renderTable();
    }

    // ====== Stats ======
    function updateStats() {
        var monthPrefix = currentYear + '-' + String(currentMonth + 1).padStart(2, '0');
        var monthKeys = Object.keys(weightData).filter(function(k) {
            return k.startsWith(monthPrefix) && weightData[k].weight;
        }).sort();
        var count = monthKeys.length;
        var first = count > 0 ? weightData[monthKeys[0]].weight : null;
        var last = count > 0 ? weightData[monthKeys[monthKeys.length - 1]].weight : null;

        document.getElementById('statCount').textContent = count;
        document.getElementById('statStart').textContent = first ? first.toFixed(1) : '-';
        document.getElementById('statLatest').textContent = last ? last.toFixed(1) : '-';
        if (first && last) {
            var diff = last - first;
            var sign = diff > 0 ? '+' : '';
            document.getElementById('statDiff').textContent = sign + diff.toFixed(1);
            document.getElementById('statDiff').style.color = diff < 0 ? '#6B8F71' : diff > 0 ? '#A0626B' : '#8B8B8B';
        } else {
            document.getElementById('statDiff').textContent = '-';
            document.getElementById('statDiff').style.color = '';
        }
    }

    function changeMonth(delta) {
        currentMonth += delta;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        editingDate = null;
        renderTable();
    }

    // ====== Section Toggle ======
    function toggleSection(id) {
        var el = document.getElementById(id);
        if (el) el.classList.toggle('open');
    }

    // ====== Weight Chart ======
    function renderChart() {
        var allKeys = Object.keys(weightData).filter(function(k){ return weightData[k].weight; }).sort();
        if (allKeys.length === 0) return;
        var keys = allKeys.slice(-30);
        var labels = keys.map(function(k) {
            var p = k.split('-');
            return parseInt(p[1]) + '/' + parseInt(p[2]);
        });
        var values = keys.map(function(k){ return weightData[k].weight; });
        var canvas = document.getElementById('weightChart');
        if (!canvas) return;
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '體重 (kg)',
                    data: values,
                    borderColor: '#7B8FA1',
                    backgroundColor: 'rgba(123,143,161,0.1)',
                    borderWidth: 2.5,
                    pointRadius: 4,
                    pointBackgroundColor: '#7B8FA1',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: function(ctx) { return ctx.parsed.y + ' kg'; } } }
                },
                scales: {
                    x: { ticks: { font: { size: 10 }, color: '#8B8B8B', maxRotation: 45 }, grid: { display: false } },
                    y: { ticks: { font: { size: 10 }, color: '#8B8B8B', callback: function(v){ return v + 'kg'; } }, grid: { color: 'rgba(0,0,0,0.05)' } }
                }
            }
        });
    }

    // ====== Helpers ======
    function formatDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
</script>
</body>
</html>
