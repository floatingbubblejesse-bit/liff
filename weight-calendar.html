<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居家體重紀錄｜金鶯減重</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root { --blue: #7B8FA1; --blue-light: #EDE8E0; --green: #8B9D83; --green-light: #E8EDE6; --red: #A0626B; --orange: #C4A882; --brown: #B8926A; --bg: #F5F3EF; --card: #FDFBF7; --text: #4A4A4A; --muted: #8B8B8B; --border: #E8E4DC; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

        /* ====== Top: Day card with swipe ====== */
        .today-card{background:linear-gradient(135deg, #7B8FA1, #8B9D83);color:white;padding:34px 20px 28px;text-align:center;user-select:none;position:relative;overflow:hidden;touch-action:none}
        .today-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;position:relative}
        .today-nav-btn{width:36px;height:36px;border:none;border-radius:50%;background:rgba(255,255,255,0.2);color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;pointer-events:none;transition:opacity 0.3s ease;position:absolute;top:50%;transform:translateY(-50%)}
        .today-nav-btn.nav-prev{left:0}
        .today-nav-btn.nav-next{right:0}
        .today-card.show-arrows .today-nav-btn{opacity:1;pointer-events:auto}
        .today-nav-btn:active{background:rgba(255,255,255,0.35)}
        .today-date{font-size:18px;font-weight:700}
        .today-slide-wrap{position:relative;overflow:hidden}
        .today-content{will-change:transform,opacity}
        .today-content.animating{transition:transform 0.35s cubic-bezier(.4,.0,.2,1),opacity 0.35s cubic-bezier(.4,.0,.2,1)}
        .today-type-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;margin-top:6px}
        .today-type-badge{display:inline-flex;align-items:center;justify-content:center;padding:6px 24px;border-radius:20px;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.15s}
        .today-type-badge:active{transform:scale(0.9)}
        .today-type-badge.t-high{background:rgba(248,215,218,0.9);color:#A0626B}
        .today-type-badge.t-mid{background:rgba(255,243,205,0.9);color:#B8926A}
        .today-type-badge.t-low{background:rgba(212,237,218,0.9);color:#6B8F71}
        .today-type-badge.t-fast{background:rgba(226,227,229,0.9);color:#4A4A4A}
        .today-type-badge.t-none{background:rgba(255,255,255,0.25);color:rgba(255,255,255,0.7)}
        .today-type-hint{font-size:10px;opacity:0;margin-top:4px;transition:opacity 0.3s}
        .today-card.show-arrows .today-type-hint{opacity:0.6}
        .today-input-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
        .today-label{font-size:13px;opacity:0.9}
        .today-input{width:80px;padding:8px 6px;border:none;border-radius:8px;font-size:16px;font-weight:700;text-align:center;color:var(--red);outline:none;background:rgba(255,255,255,0.95);-moz-appearance:textfield}
        .today-input::-webkit-outer-spin-button,.today-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
        .today-input::placeholder{color:#ccc;font-weight:400;font-size:13px}
        .today-unit{font-size:14px;font-weight:600;opacity:0.9}
        .today-adj-btn{width:36px;height:36px;border:none;border-radius:50%;background:rgba(255,255,255,0.25);color:white;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
        .today-adj-btn:active{background:rgba(255,255,255,0.4)}
        .today-save{padding:8px 24px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;background:white;color:var(--green)}
        .today-save:active{background:#f0f0f0}
        .today-save:disabled{opacity:0.5;cursor:not-allowed}

        /* ====== Collapsible sections ====== */
        .section{margin:10px;background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);overflow:hidden}
        .section-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;gap:8px}
        .section-header:active{background:#FDFBF7}
        .section-icon{font-size:18px}
        .section-title{flex:1;font-size:14px;font-weight:700;color:var(--text)}
        .section-arrow{font-size:11px;color:var(--muted);transition:transform 0.25s ease}
        .section.open .section-arrow{transform:rotate(180deg)}
        .section-body{display:none;border-top:1px solid var(--border);padding:10px}
        .section.open .section-body{display:block}

        /* ====== Calendar ====== */
        .month-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 0 6px}
        .month-nav button{width:32px;height:32px;border:1px solid var(--border);border-radius:50%;background:white;font-size:14px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center}
        .month-nav button:active{background:var(--bg)}
        .month-title{font-size:15px;font-weight:700;min-width:100px;text-align:center}
        .legend{display:flex;justify-content:center;gap:10px;padding:4px 0 8px;flex-wrap:wrap}
        .legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted)}
        .legend-dot{width:14px;height:14px;border-radius:3px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
        .cal-weekday{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0}
        .cal-weekday.sat{color:var(--blue)}
        .cal-weekday.sun{color:var(--red)}
        .cal-cell{background:var(--bg);border-radius:8px;padding:6px 2px;min-height:62px;display:flex;flex-direction:column;align-items:center;gap:3px;border:1px solid transparent;transition:all 0.15s;cursor:pointer;-webkit-tap-highlight-color:transparent}
        .cal-cell:active:not(.empty){transform:scale(0.95)}
        .cal-cell.today{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
        .cal-cell.selected{background:#E8EDE6;border-color:var(--green);box-shadow:0 0 0 2px rgba(139,157,131,0.4)}
        .cal-cell.empty{background:transparent;border:none;min-height:0}
        .cal-date{font-size:12px;font-weight:600;color:var(--text);line-height:1}
        .cal-cell.today .cal-date{color:var(--blue);font-weight:800}
        .cal-cell.sat .cal-date{color:var(--blue)}
        .cal-cell.sun .cal-date{color:var(--red)}
        .cal-type{width:32px;height:24px;border-radius:5px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s;user-select:none;-webkit-tap-highlight-color:transparent}
        .cal-type:active{transform:scale(0.85)}
        .cal-type.t-high{background:#F8D7DA;color:#A0626B}
        .cal-type.t-low{background:#D4EDDA;color:#6B8F71}
        .cal-type.t-mid{background:#FFF3CD;color:#B8926A}
        .cal-type.t-fast{background:#E2E3E5;color:#4A4A4A}
        .cal-type.t-none{background:var(--bg);color:var(--muted)}
        .cal-weight-display{font-size:11px;font-weight:700;color:var(--red)}

        /* ====== Stats row ====== */
        .stats-row{display:flex;gap:6px;padding:8px 0 4px}
        .stat-item{flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px}
        .stat-value{font-size:15px;font-weight:700;color:var(--red)}
        .stat-label{font-size:10px;color:var(--muted);margin-top:2px}

        /* ====== Chart ====== */
        .chart-wrap{position:relative;height:200px;padding:8px 0}

        /* Loading */
        .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:40vh;gap:14px}
        .spinner{width:40px;height:40px;border:4px solid #E8E4DC;border-top-color:var(--blue);border-radius:50%;animation:spin .9s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<!-- ====== 日期輸入區（可滑動切換日期） ====== -->
<div class="today-card" id="todayCard">
    <div class="today-nav">
        <button class="today-nav-btn nav-prev" onclick="event.stopPropagation();onArrowTap(-1)">◀</button>
        <div class="today-date" id="todayDate"></div>
        <button class="today-nav-btn nav-next" onclick="event.stopPropagation();onArrowTap(1)">▶</button>
    </div>
    <div class="today-slide-wrap">
        <div class="today-content" id="todayContent">
            <div class="today-type-row">
                <div class="today-type-badge" id="todayTypeBadge" onclick="cycleSelectedDayType()"></div>
            </div>
            <div class="today-type-hint" id="todayTypeHint">← 左右滑動切換日期 →</div>
            <div class="today-input-row">
                <span class="today-label">請輸入今早體重：</span>
                <button class="today-adj-btn" onclick="adjWeight(-0.1)">−</button>
                <input class="today-input" id="todayWeightInput" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="--.-">
                <button class="today-adj-btn" onclick="adjWeight(0.1)">+</button>
                <span class="today-unit">kg</span>
                <button class="today-save" id="todaySaveBtn" onclick="saveTodayWeight()">儲存</button>
            </div>
        </div>
    </div>
</div>

<!-- ====== 日曆（收折） ====== -->
<div class="section open" id="calSection">
    <div class="section-header" onclick="toggleSection('calSection')">
        <span class="section-icon">📅</span>
        <span class="section-title">月曆紀錄</span>
        <span class="section-arrow">▼</span>
    </div>
    <div class="section-body">
        <div class="month-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <div class="month-title" id="monthTitle"></div>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div id="calWrap"></div>
        <div class="stats-row" id="statsRow" style="display:none">
            <div class="stat-item"><div class="stat-value" id="statStart">-</div><div class="stat-label">月初體重</div></div>
            <div class="stat-item"><div class="stat-value" id="statLatest">-</div><div class="stat-label">最新體重</div></div>
            <div class="stat-item"><div class="stat-value" id="statDiff">-</div><div class="stat-label">本月變化</div></div>
            <div class="stat-item"><div class="stat-value" id="statCount">0</div><div class="stat-label">紀錄天數</div></div>
        </div>
    </div>
</div>

<!-- ====== 體重趨勢圖（收折） ====== -->
<div class="section open" id="chartSection">
    <div class="section-header" onclick="toggleSection('chartSection')">
        <span class="section-icon">📈</span>
        <span class="section-title">體重趨勢</span>
        <span class="section-arrow">▼</span>
    </div>
    <div class="section-body">
        <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
    </div>
</div>

<div id="loadingOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
    <div class="spinner"></div>
    <span style="color:#8B8B8B;font-size:13px">載入中...</span>
</div>

<script>
    var MEALS_GAS = 'https://script.google.com/macros/s/AKfycbxV3Cc44ohL4i7-xk29hAxFSPaWktOFgWxmCRGsg0uvxaJHbRqiMXrJjBAyva3XwDNY/exec';
    var N8N = 'https://huangcs.app.n8n.cloud/webhook';

    var CYCLE_OPTS = [
        {key:'high', label:'高碳日', short:'高', cls:'t-high'},
        {key:'mid',  label:'中碳日', short:'中', cls:'t-mid'},
        {key:'low',  label:'低碳日', short:'低', cls:'t-low'},
        {key:'fast', label:'斷食日', short:'斷', cls:'t-fast'},
        {key:'none', label:'-',      short:'-',  cls:'t-none'}
    ];

    var currentYear, currentMonth;
    var patientSn = '', patientUid = '';
    var cycleSchedule = ['high','high','mid','mid','high','mid','mid'];
    var visitDate = null;
    var weightData = {};
    var dayTypeOverrides = {};
    var visitRecords = [];
    var chartInstance = null;
    var selectedDate = new Date(); // 頂部卡片當前選擇的日期
    var swipeState = { startX:0, currentX:0, dragging:false, swiped:false, animating:false };

    // ====== Init ======
    (function init() {
        var params = new URLSearchParams(location.search);
        patientSn = params.get('id') || '';
        patientUid = params.get('uid') || '';
        var now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();
        selectedDate = new Date(now);
        loadData();

        // ====== Drag-follow swipe on top card ======
        var card = document.getElementById('todayCard');
        var content = document.getElementById('todayContent');
        var dateEl = document.getElementById('todayDate');
        var SWIPE_THRESHOLD = 60; // px to trigger day change

        // Tap to show/hide arrows (only if not swiping)
        card.addEventListener('click', function(e) {
            if (swipeState.swiped) return;
            if (card.classList.contains('show-arrows')) {
                card.classList.remove('show-arrows');
                clearTimeout(window._arrowTimer);
            } else {
                card.classList.add('show-arrows');
                clearTimeout(window._arrowTimer);
                window._arrowTimer = setTimeout(function(){ card.classList.remove('show-arrows'); }, 3000);
            }
        });

        card.addEventListener('touchstart', function(e) {
            if (swipeState.animating) return;
            swipeState.startX = e.touches[0].clientX;
            swipeState.currentX = swipeState.startX;
            swipeState.dragging = true;
            swipeState.swiped = false;
            content.classList.remove('animating');
            dateEl.style.transition = 'none';
        }, {passive:true});

        card.addEventListener('touchmove', function(e) {
            if (!swipeState.dragging) return;
            swipeState.currentX = e.touches[0].clientX;
            var dx = swipeState.currentX - swipeState.startX;
            // Dampen the drag slightly for feel
            var dampened = dx * 0.7;
            var opacity = Math.max(0.3, 1 - Math.abs(dx) / 250);
            content.style.transform = 'translateX(' + dampened + 'px)';
            content.style.opacity = opacity;
            dateEl.style.transform = 'translateX(' + (dampened * 0.5) + 'px)';
            dateEl.style.opacity = opacity;
            if (Math.abs(dx) > 10) swipeState.swiped = true;
        }, {passive:true});

        card.addEventListener('touchend', function(e) {
            if (!swipeState.dragging) return;
            swipeState.dragging = false;
            var dx = swipeState.currentX - swipeState.startX;

            if (Math.abs(dx) >= SWIPE_THRESHOLD) {
                // Commit: slide out, change day, slide in
                var direction = dx < 0 ? 1 : -1;
                swipeState.animating = true;
                content.classList.add('animating');
                dateEl.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                var outX = direction > 0 ? -120 : 120;
                content.style.transform = 'translateX(' + outX + 'px)';
                content.style.opacity = '0';
                dateEl.style.transform = 'translateX(' + (outX * 0.5) + 'px)';
                dateEl.style.opacity = '0';

                setTimeout(function() {
                    selectedDate.setDate(selectedDate.getDate() + direction);
                    renderTodayCard();
                    // Position from opposite side
                    content.classList.remove('animating');
                    dateEl.style.transition = 'none';
                    content.style.transform = 'translateX(' + (-outX) + 'px)';
                    content.style.opacity = '0';
                    dateEl.style.transform = 'translateX(' + (-outX * 0.5) + 'px)';
                    dateEl.style.opacity = '0';
                    // Force reflow
                    content.offsetHeight;
                    // Animate in
                    content.classList.add('animating');
                    dateEl.style.transition = 'transform 0.35s cubic-bezier(.4,.0,.2,1), opacity 0.35s cubic-bezier(.4,.0,.2,1)';
                    content.style.transform = 'translateX(0)';
                    content.style.opacity = '1';
                    dateEl.style.transform = 'translateX(0)';
                    dateEl.style.opacity = '1';
                    setTimeout(function() {
                        content.classList.remove('animating');
                        swipeState.animating = false;
                    }, 360);
                }, 200);
            } else {
                // Snap back
                content.classList.add('animating');
                dateEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                content.style.transform = 'translateX(0)';
                content.style.opacity = '1';
                dateEl.style.transform = 'translateX(0)';
                dateEl.style.opacity = '1';
                setTimeout(function() { content.classList.remove('animating'); }, 310);
            }
        }, {passive:true});
    })();

    // 把各種日期格式轉成 YYYY-MM-DD
    function parseDateToYMD(dateVal) {
        if (!dateVal) return '';
        // 已經是 YYYY-MM-DD
        if (typeof dateVal === 'string' && /^\d{4}-\d{2}-\d{2}/.test(dateVal)) return dateVal.substring(0, 10);
        // JS Date string 或其他格式 → 用 new Date() 解析
        var d = new Date(dateVal);
        if (isNaN(d.getTime())) return '';
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function loadData() {
        // 只需要 dietPlan（排程、日期、週數都在這裡）
        if (patientSn) {
            fetch(MEALS_GAS + '?dietPlan=' + encodeURIComponent(patientSn))
                .then(function(r){ return r.json(); })
                .then(function(data){
                    console.log('[日曆] dietPlan 回傳:', JSON.stringify(data).substring(0, 500));
                    if (data.schedule && data.schedule.length === 7) {
                        cycleSchedule = data.schedule;
                        var planDate = parseDateToYMD(data.date);
                        if (!planDate) planDate = formatDate(new Date());
                        visitRecords = [{
                            date: planDate,
                            schedule: data.schedule,
                            weeks: data.weeks || 4
                        }];
                        var p = planDate.split('-');
                        visitDate = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
                        console.log('[日曆] 看診紀錄:', visitRecords[0]);
                    }
                    onDataReady();
                }).catch(function(e){
                    console.log('[日曆] dietPlan 錯誤:', e);
                    onDataReady();
                });
        } else {
            onDataReady();
        }

        // 從 localStorage 載入體重資料
        loadLocalWeights();
    }

    function storageKey() { return 'weight_' + (patientSn || patientUid || 'default'); }

    function loadLocalWeights() {
        try {
            var raw = localStorage.getItem(storageKey());
            if (raw) {
                var data = JSON.parse(raw);
                if (data.weights) weightData = data.weights;
                if (data.overrides) dayTypeOverrides = data.overrides;
            }
        } catch(e) {}
    }

    function saveLocalWeights() {
        try {
            localStorage.setItem(storageKey(), JSON.stringify({ weights: weightData, overrides: dayTypeOverrides }));
        } catch(e) {}
    }

    function onDataReady() {
        document.getElementById('loadingOverlay').style.display = 'none';
        renderTodayCard();
        renderCalendar();
        renderChart();
        document.getElementById('statsRow').style.display = 'flex';
    }

    // ====== Top Day Card ======
    function renderTodayCard() {
        var dateStr = formatDate(selectedDate);
        var dayNames = ['日','一','二','三','四','五','六'];
        var dateText = selectedDate.getFullYear() + '年' + (selectedDate.getMonth()+1) + '月' + selectedDate.getDate() + '日（' + dayNames[selectedDate.getDay()] + '）';

        // 判斷是否為今天
        var todayStr = formatDate(new Date());
        if (dateStr === todayStr) dateText += ' 今天';

        document.getElementById('todayDate').textContent = dateText;

        var dayType = getDayType(selectedDate);
        var opt = CYCLE_OPTS.find(function(o){ return o.key === dayType; }) || CYCLE_OPTS[1];
        var badge = document.getElementById('todayTypeBadge');
        badge.textContent = opt.label;
        badge.className = 'today-type-badge ' + opt.cls;

        // Pre-fill weight if exists
        var input = document.getElementById('todayWeightInput');
        if (weightData[dateStr] && weightData[dateStr].weight) {
            input.value = weightData[dateStr].weight;
        } else {
            input.value = '';
        }

        // Highlight selected cell in calendar
        highlightSelectedCell(dateStr);
    }

    function highlightSelectedCell(dateStr) {
        // Remove previous highlight
        var prev = document.querySelector('.cal-cell.selected');
        if (prev) prev.classList.remove('selected');
        // Add to matching cell
        var cell = document.querySelector('.cal-cell[data-date="' + dateStr + '"]');
        if (cell) {
            cell.classList.add('selected');
            // Scroll into view if needed
            cell.scrollIntoView({behavior:'smooth', block:'nearest'});
        }
    }

    function onArrowTap(delta) {
        shiftSelectedDay(delta);
        // Reset arrow auto-hide timer
        var card = document.getElementById('todayCard');
        clearTimeout(window._arrowTimer);
        card.classList.add('show-arrows');
        window._arrowTimer = setTimeout(function(){ card.classList.remove('show-arrows'); }, 3000);
    }

    function shiftSelectedDay(delta) {
        if (swipeState.animating) return;
        var cnt = document.getElementById('todayContent');
        var dte = document.getElementById('todayDate');
        swipeState.animating = true;
        var outX = delta > 0 ? -120 : 120;
        cnt.classList.add('animating');
        dte.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
        cnt.style.transform = 'translateX(' + outX + 'px)';
        cnt.style.opacity = '0';
        dte.style.transform = 'translateX(' + (outX * 0.5) + 'px)';
        dte.style.opacity = '0';
        setTimeout(function() {
            selectedDate.setDate(selectedDate.getDate() + delta);
            renderTodayCard();
            cnt.classList.remove('animating');
            dte.style.transition = 'none';
            cnt.style.transform = 'translateX(' + (-outX) + 'px)';
            cnt.style.opacity = '0';
            dte.style.transform = 'translateX(' + (-outX * 0.5) + 'px)';
            dte.style.opacity = '0';
            cnt.offsetHeight;
            cnt.classList.add('animating');
            dte.style.transition = 'transform 0.35s cubic-bezier(.4,.0,.2,1), opacity 0.35s cubic-bezier(.4,.0,.2,1)';
            cnt.style.transform = 'translateX(0)';
            cnt.style.opacity = '1';
            dte.style.transform = 'translateX(0)';
            dte.style.opacity = '1';
            setTimeout(function() { cnt.classList.remove('animating'); swipeState.animating = false; }, 360);
        }, 200);
    }

    function cycleSelectedDayType() {
        var dateStr = formatDate(selectedDate);
        var current = getDayType(selectedDate);
        var idx = CYCLE_OPTS.findIndex(function(o){ return o.key === current; });
        idx = (idx + 1) % CYCLE_OPTS.length;
        dayTypeOverrides[dateStr] = CYCLE_OPTS[idx].key;
        saveLocalWeights();
        renderTodayCard();
        renderCalendar();
    }

    function adjWeight(delta) {
        var input = document.getElementById('todayWeightInput');
        var val = parseFloat(input.value);
        if (isNaN(val) || val <= 0) val = 50.0;
        val = Math.round((val + delta) * 10) / 10;
        if (val < 20) val = 20;
        if (val > 200) val = 200;
        input.value = val.toFixed(1);
    }

    function saveTodayWeight() {
        var input = document.getElementById('todayWeightInput');
        var val = parseFloat(input.value);
        if (isNaN(val) || val <= 0) { alert('請輸入有效的體重'); return; }

        var dateStr = formatDate(selectedDate);
        if (!weightData[dateStr]) weightData[dateStr] = {};
        weightData[dateStr].weight = val;

        saveLocalWeights();

        var btn = document.getElementById('todaySaveBtn');
        btn.textContent = '已儲存 ✓';
        btn.style.color = '#6B8F71';
        setTimeout(function(){ btn.textContent = '儲存'; btn.style.color = ''; }, 2000);

        renderCalendar();
        renderChart();
    }

    // ====== Section Toggle ======
    function toggleSection(id) {
        var el = document.getElementById(id);
        if (el) el.classList.toggle('open');
    }

    // ====== Day Type Calculation ======
    function getDayType(dateObj) {
        var dateStr = formatDate(dateObj);
        // 1. 手動覆蓋優先
        if (dayTypeOverrides[dateStr]) return dayTypeOverrides[dateStr];
        // 2. 找到適用的看診紀錄（最近一筆 date <= 當前日期）
        var applicableVisit = null;
        for (var i = visitRecords.length - 1; i >= 0; i--) {
            var vd = visitRecords[i].date;
            if (vd && vd <= dateStr) { applicableVisit = visitRecords[i]; break; }
        }
        // 3. 沒有看診紀錄 → 預設 '-'
        if (!applicableVisit || !applicableVisit.date) {
            return 'none';
        }
        // 4. 有看診紀錄 → 檢查是否在排程範圍內（看診隔天起算，共 weeks×7 天）
        var vParts = applicableVisit.date.split('-');
        var vDate = new Date(parseInt(vParts[0]), parseInt(vParts[1])-1, parseInt(vParts[2]));
        var sch = (applicableVisit.schedule && applicableVisit.schedule.length === 7) ? applicableVisit.schedule : cycleSchedule;
        var weeks = applicableVisit.weeks || 4;
        return getTypeFromSchedule(dateObj, vDate, sch, weeks);
    }

    function getTypeFromSchedule(dateObj, visitDateObj, schedule, weeks) {
        // 排程從看診隔天開始
        var startDate = new Date(visitDateObj.getFullYear(), visitDateObj.getMonth(), visitDateObj.getDate() + 1);
        var endDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + (weeks * 7) - 1);
        var d = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
        // 不在範圍內 → '-'
        if (d < startDate || d > endDate) return 'none';
        // 在範圍內 → 按星期幾對應排程
        var jsDay = dateObj.getDay();
        var schIdx;
        if (jsDay === 0) schIdx = 1;      // 日 → index 1
        else if (jsDay === 6) schIdx = 0;  // 六 → index 0
        else schIdx = jsDay + 1;            // 一~五 → index 2~6
        return schedule[schIdx] || 'mid';
    }

    // ====== Calendar ======
    function renderCalendar() {
        var wrap = document.getElementById('calWrap');
        var titleEl = document.getElementById('monthTitle');
        titleEl.textContent = currentYear + '年 ' + (currentMonth + 1) + '月';

        var firstDay = new Date(currentYear, currentMonth, 1);
        var lastDay = new Date(currentYear, currentMonth + 1, 0);
        var totalDays = lastDay.getDate();
        var startDow = firstDay.getDay();
        var startOffset = (startDow === 0) ? 6 : startDow - 1;
        var today = new Date();
        var todayStr = formatDate(today);

        var html = '<div class="cal-grid">';
        var weekdays = ['一','二','三','四','五','六','日'];
        var weekCls = ['','','','','','sat','sun'];
        for (var w = 0; w < 7; w++) {
            html += '<div class="cal-weekday ' + weekCls[w] + '">' + weekdays[w] + '</div>';
        }
        for (var e = 0; e < startOffset; e++) {
            html += '<div class="cal-cell empty"></div>';
        }
        for (var d = 1; d <= totalDays; d++) {
            var dateObj = new Date(currentYear, currentMonth, d);
            var dateStr = formatDate(dateObj);
            var isToday = dateStr === todayStr;
            var dow = dateObj.getDay();
            var isSat = dow === 6, isSun = dow === 0;
            var dayType = getDayType(dateObj);
            var opt = CYCLE_OPTS.find(function(o){ return o.key === dayType; }) || CYCLE_OPTS[1];
            var savedWeight = weightData[dateStr] ? weightData[dateStr].weight : '';

            var selStr = formatDate(selectedDate);
            var cellCls = 'cal-cell' + (isToday ? ' today' : '') + (isSat ? ' sat' : '') + (isSun ? ' sun' : '') + (dateStr === selStr ? ' selected' : '');
            html += '<div class="' + cellCls + '" data-date="' + dateStr + '" onclick="selectCalDate(\'' + dateStr + '\')">';
            html += '<div class="cal-date">' + d + '</div>';
            html += '<div class="cal-type ' + opt.cls + '">' + opt.short + '</div>';
            if (savedWeight) {
                html += '<div class="cal-weight-display">' + savedWeight + '</div>';
            }
            html += '</div>';
        }
        var totalCells = startOffset + totalDays;
        var trailing = (7 - (totalCells % 7)) % 7;
        for (var t = 0; t < trailing; t++) {
            html += '<div class="cal-cell empty"></div>';
        }
        html += '</div>';
        wrap.innerHTML = html;
        updateStats();
    }

    function selectCalDate(dateStr) {
        var p = dateStr.split('-');
        selectedDate = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
        renderTodayCard();
        renderCalendar();
        // Scroll top card into view
        document.getElementById('todayCard').scrollIntoView({behavior:'smooth', block:'start'});
    }

    function updateStats() {
        var monthPrefix = currentYear + '-' + String(currentMonth + 1).padStart(2, '0');
        var monthKeys = Object.keys(weightData).filter(function(k) {
            return k.startsWith(monthPrefix);
        }).sort();
        var count = monthKeys.length;
        var first = count > 0 ? weightData[monthKeys[0]].weight : null;
        var last = count > 0 ? weightData[monthKeys[monthKeys.length - 1]].weight : null;

        document.getElementById('statCount').textContent = count;
        document.getElementById('statStart').textContent = first ? first.toFixed(1) : '-';
        document.getElementById('statLatest').textContent = last ? last.toFixed(1) : '-';
        if (first && last) {
            var diff = last - first;
            var sign = diff > 0 ? '+' : '';
            document.getElementById('statDiff').textContent = sign + diff.toFixed(1);
            document.getElementById('statDiff').style.color = diff < 0 ? '#6B8F71' : diff > 0 ? '#A0626B' : '#8B8B8B';
        } else {
            document.getElementById('statDiff').textContent = '-';
            document.getElementById('statDiff').style.color = '';
        }
    }

    function changeMonth(delta) {
        currentMonth += delta;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        renderCalendar();
    }

    // ====== Weight Chart ======
    function renderChart() {
        var allKeys = Object.keys(weightData).sort();
        if (allKeys.length === 0) return;

        // 最近30筆
        var keys = allKeys.slice(-30);
        var labels = keys.map(function(k) {
            var p = k.split('-');
            return parseInt(p[1]) + '/' + parseInt(p[2]);
        });
        var values = keys.map(function(k){ return weightData[k].weight; });

        var canvas = document.getElementById('weightChart');
        if (!canvas) return;

        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '體重 (kg)',
                    data: values,
                    borderColor: '#7B8FA1',
                    backgroundColor: 'rgba(123,143,161,0.1)',
                    borderWidth: 2.5,
                    pointRadius: 4,
                    pointBackgroundColor: '#7B8FA1',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) { return ctx.parsed.y + ' kg'; }
                        }
                    }
                },
                scales: {
                    x: { ticks: { font: { size: 10 }, color: '#8B8B8B', maxRotation: 45 }, grid: { display: false } },
                    y: { ticks: { font: { size: 10 }, color: '#8B8B8B', callback: function(v){ return v + 'kg'; } }, grid: { color: 'rgba(0,0,0,0.05)' } }
                }
            }
        });
    }

    // ====== Helpers ======
    function formatDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
</script>
