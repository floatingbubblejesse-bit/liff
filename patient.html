<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的飲食紀錄</title>
  <!-- iOS WKWebView history patch — must be before LIFF SDK -->
  <script>
  (function() {
    // Suppress ALL errors from history.replaceState/pushState on iOS WKWebView.
    // LIFF SDK calls these to clean auth params from URL, and iOS WKWebView
    // throws "The string did not match the expected pattern." for certain URLs.
    var _origReplace = history.replaceState.bind(history);
    var _origPush    = history.pushState.bind(history);
    history.replaceState = function(s, t, u) { try { _origReplace(s, t, u); } catch(e) { console.warn('[iOS patch] replaceState suppressed:', e && e.message); } };
    history.pushState    = function(s, t, u) { try { _origPush(s, t, u);    } catch(e) { console.warn('[iOS patch] pushState suppressed:', e && e.message); } };
  })();
  </script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #3DAE8F;
      --primary-dark: #2E8B6E;
      --primary-light: #E8F7F3;
      --warning: #F5A623;
      --danger: #E05252;
      --success: #4CAF50;
      --text: #2D3748;
      --text-muted: #718096;
      --border: #E2E8F0;
      --bg: #F7FDFC;
      --card: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 32px; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--primary-light); z-index: 999; gap: 16px; }
    .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--text-muted); font-size: 14px; }
    header { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); padding: 20px 16px 24px; color: white; }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); object-fit: cover; background: rgba(255,255,255,0.3); }
    .avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .header-info h1 { font-size: 18px; font-weight: 600; }
    .header-info p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .protein-card { background: rgba(255,255,255,0.18); border-radius: 12px; padding: 14px; }
    .protein-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .protein-label { font-size: 13px; opacity: 0.9; }
    .protein-value { font-size: 13px; font-weight: 600; }
    .progress-bar-bg { background: rgba(255,255,255,0.3); border-radius: 99px; height: 8px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 99px; background: white; transition: width 0.8s ease; }
    .protein-status { margin-top: 8px; font-size: 12px; text-align: center; opacity: 0.95; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 16px; }
    .stat-card { background: var(--card); border-radius: 10px; padding: 10px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--primary-dark); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .section-title { padding: 16px 16px 8px; font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .chart-card { background: var(--card); border-radius: 14px; margin: 0 12px 16px; padding: 14px 12px 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .chart-card canvas { display: block; width: 100% !important; }
    .accordion-item { background: var(--card); border-radius: 12px; margin: 0 12px 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .accordion-header { display: flex; align-items: center; padding: 11px 14px; cursor: pointer; user-select: none; gap: 10px; -webkit-tap-highlight-color: transparent; }
    .accordion-header:active { background: #f8fffe; }
    .accordion-date { flex: 1; font-size: 13px; color: var(--text); font-weight: 500; }
    .accordion-protein { font-size: 12px; color: var(--primary-dark); font-weight: 600; margin-right: 6px; }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; flex-shrink: 0; }
    .status-pending  { background: #FEF3C7; color: #92400E; }
    .status-approved { background: #D1FAE5; color: #065F46; }
    .status-rejected { background: #FEE2E2; color: #991B1B; }
    .accordion-arrow { font-size: 11px; color: var(--text-muted); transition: transform 0.2s ease; flex-shrink: 0; }
    .accordion-item.open .accordion-arrow { transform: rotate(180deg); }
    .accordion-body { display: none; border-top: 1px solid var(--border); }
    .accordion-item.open .accordion-body { display: block; }
    .meal-image-wrap { width: 100%; height: 200px; overflow: hidden; background: #f0f4f8; position: relative; }
    .meal-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .meal-image-wrap .img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 48px; background: var(--primary-light); }
    .meal-body { padding: 12px 14px; }
    .foods-text { font-size: 14px; color: var(--text); line-height: 1.5; margin-bottom: 12px; }
    .macros-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
    .macro-item { text-align: center; padding: 6px 4px; background: var(--bg); border-radius: 8px; }
    .macro-value { font-size: 15px; font-weight: 700; color: var(--primary-dark); }
    .macro-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .ai-note { background: #F0FFF4; border-left: 3px solid var(--primary); border-radius: 0 8px 8px 0; padding: 8px 10px; font-size: 13px; color: #2D6A4F; line-height: 1.5; margin-bottom: 10px; }
    .ai-note-label { font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .nutrition-advice { background: #FFF8E1; border-left: 3px solid var(--warning); border-radius: 0 8px 8px 0; padding: 8px 10px; font-size: 13px; color: #7B5800; line-height: 1.5; }
    .nutrition-advice-label { font-size: 11px; font-weight: 700; color: var(--warning); margin-bottom: 4px; }
    .score-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .score-stars { color: var(--warning); font-size: 14px; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    #error-screen { display: none; padding: 32px 24px; text-align: center; }
    #error-screen .error-icon { font-size: 56px; margin-bottom: 16px; }
    #error-screen h2 { font-size: 18px; margin-bottom: 8px; }
    #error-screen p { color: var(--text-muted); font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    #main { display: none; }
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>載入中…</p></div>
<div id="error-screen"><div class="error-icon">🔒</div><h2>無法載入</h2><p id="error-msg">請在 LINE App 中開啟此頁面</p></div>
<div id="main">
  <header>
    <div class="header-top">
      <div id="avatar-wrap"><div class="avatar-placeholder">🧑</div></div>
      <div class="header-info"><h1 id="patient-name">載入中…</h1><p>我的飲食紀錄</p></div>
    </div>
    <div class="protein-card">
      <div class="protein-header"><span class="protein-label">今日蛋白質進度</span><span class="protein-value" id="protein-text">—</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="protein-bar" style="width:0%"></div></div>
      <div class="protein-status" id="protein-status">計算中…</div>
    </div>
  </header>
  <div class="stats-row" id="stats-row"></div>
  <div class="section-title">蛋白質趨勢</div>
  <div class="chart-card"><canvas id="protein-chart" height="160"></canvas></div>
  <div class="section-title">核准紀錄</div>
  <div id="records-list"></div>
</div>
<script>
const LIFF_ID     = '2009326025-d6EV7T42';
const API_URL     = 'https://huangcs.app.n8n.cloud/webhook/patient-history';
const IMAGE_PROXY = 'https://huangcs.app.n8n.cloud/webhook/meal-photo';

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-screen').style.display = 'block';
  document.getElementById('error-msg').textContent = msg || '請在 LINE App 中開啟此頁面';
}
function getTaipeiToday() { return new Date(Date.now()+8*3600000).toISOString().split('T')[0]; }
function isToday(d) {
  const t=getTaipeiToday(),s=String(d||''),y=t.split('-')[0],m=String(parseInt(t.split('-')[1])),dd=String(parseInt(t.split('-')[2]));
  return s.includes(t)||s.startsWith(y+'/'+m+'/'+dd);
}
function statusClass(s){return s==='已核准'?'status-approved':s==='已駁回'?'status-rejected':'status-pending';}
function statusLabel(s){return s==='已核准'?'✅ 已核准':s==='已駁回'?'⚠️ 已駁回':'待審核';}
function scoreToStars(score){const n=parseFloat(score);if(isNaN(n))return '';const f=Math.round(n);return '★'.repeat(Math.min(f,5))+'☆'.repeat(Math.max(0,5-f));}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(d){const m=String(d).match(/(\d+)\/(\d+)\/(\d+)\s*(.*)/);return m?`${m[2]}月${m[3]}日 ${m[4]}`:d;}
function toDateKey(d){const m=String(d).match(/(\d{4})\/(\d+)\/(\d+)/);return m?m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0'):'';
}
function formatDateKey(k){const p=k.split('-');return parseInt(p[1])+'/'+parseInt(p[2]);}

function renderProteinProgress(records,recommended,weight){
  const tr=records.filter(r=>isToday(r.date)),total=tr.reduce((s,r)=>s+(r.protein||0),0),excess=weight*2,rec=recommended||0;
  document.getElementById('protein-text').textContent=Math.round(total)+'g'+(rec?' / '+Math.round(rec)+'g':'');
  if(rec>0){
    document.getElementById('protein-bar').style.width=Math.min((total/excess)*100,100)+'%';
    document.getElementById('protein-status').textContent=total>=excess&&excess>0?'🚨 蛋白質過量喔！今日已攝取 '+Math.round(total)+'g，超過上限 '+Math.round(excess)+'g':total>=rec?'🎉 恭喜達標！今日蛋白質共 '+Math.round(total)+'g（目標 '+Math.round(rec)+'g）':'💪 距離目標還有 '+Math.round(rec-total)+'g，加油！';
  } else {
    document.getElementById('protein-bar').style.width='0%';
    document.getElementById('protein-status').textContent='今日攝取：'+Math.round(total)+'g';
  }
  const cal=tr.reduce((s,r)=>s+(r.calories||0),0);
  document.getElementById('stats-row').innerHTML=`<div class="stat-card"><div class="stat-value">${Math.round(cal)}</div><div class="stat-label">今日熱量 kcal</div></div><div class="stat-card"><div class="stat-value">${Math.round(total)}</div><div class="stat-label">今日蛋白質 g</div></div><div class="stat-card"><div class="stat-value">${tr.length}</div><div class="stat-label">今日餐數</div></div>`;
}

function renderChart(records,recommended){
  const approved=records.filter(r=>r.status==='已核准'),byDate={};
  approved.forEach(r=>{const k=toDateKey(r.date);if(k)byDate[k]=(byDate[k]||0)+(r.protein||0);});
  const keys=Object.keys(byDate).sort();
  if(!keys.length){document.querySelector('.chart-card').style.display='none';document.querySelector('.section-title').style.display='none';return;}
  const rec=recommended||0,ctx=document.getElementById('protein-chart').getContext('2d');
  const ds=[{label:'每日蛋白質 (g)',data:keys.map(k=>Math.round(byDate[k])),borderColor:'#3DAE8F',backgroundColor:'rgba(61,174,143,0.12)',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#3DAE8F',fill:true,tension:0.3}];
  if(rec>0)ds.push({label:'建議攝取量',data:keys.map(()=>rec),borderColor:'#F5A623',borderWidth:1.5,borderDash:[6,4],pointRadius:0,fill:false,tension:0});
  new Chart(ctx,{type:'line',data:{labels:keys.map(formatDateKey),datasets:ds},options:{responsive:true,maintainAspectRatio:true,interaction:{mode:'index',intersect:false},plugins:{legend:{display:rec>0,position:'bottom',labels:{font:{size:11},padding:10,boxWidth:14}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'g'}}},scales:{x:{ticks:{font:{size:11},color:'#718096'},grid:{display:false}},y:{ticks:{font:{size:11},color:'#718096',callback:v=>v+'g'},grid:{color:'rgba(0,0,0,0.05)'},beginAtZero:true}}}});
}

function renderRecords(records){
  const list=document.getElementById('records-list'),reviewed=records.filter(r=>r.status==='已核准');
  if(!reviewed.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p>尚無核准的紀錄</p></div>';return;}
  list.innerHTML=reviewed.map((r,i)=>{
    const img=r.imageId?`<img src="${IMAGE_PROXY}?id=${r.imageId}" onerror="this.parentNode.innerHTML='<div class=img-placeholder>\ud83c\udf71<\/div>'" loading="lazy">`: '<div class="img-placeholder">🍱</div>';
    const ai=r.aiNote?`<div class="ai-note"><div class="ai-note-label">🤖 AI 飲食建議</div>${escHtml(r.aiNote)}</div>`:''
    const st=r.nutritionScore?`<div class="score-row"><span class="score-stars">${scoreToStars(r.nutritionScore)}</span><span style="font-size:12px;color:#92400E">(${r.nutritionScore}分)</span></div>`:''
    const adv=r.nutritionistAdvice?`<div>${escHtml(r.nutritionistAdvice)}</div>`:'<div>\uff08\u7121\u5099\u8a3b\uff09</div>'
    const pr=r.protein?Math.round(r.protein)+'g':''
    return `<div class="accordion-item" id="acc-${i}"><div class="accordion-header" onclick="toggleAccordion(${i})"><div class="accordion-date">${formatDate(r.date)}</div>${pr?`<div class="accordion-protein">${pr}</div>`:''}<span class="status-badge ${statusClass(r.status)}">${statusLabel(r.status)}</span><span class="accordion-arrow">▼</span></div><div class="accordion-body"><div class="meal-image-wrap">${img}</div><div class="meal-body"><div class="foods-text">${escHtml(r.foods||'\uff08\u7121\u8cc7\u6599\uff09')}</div><div class="macros-grid"><div class="macro-item"><div class="macro-value">${Math.round(r.calories||0)}</div><div class="macro-label">熱量 kcal</div></div><div class="macro-item"><div class="macro-value">${Math.round(r.protein||0)}</div><div class="macro-label">蛋白質 g</div></div><div class="macro-item"><div class="macro-value">${Math.round(r.carbs||0)}</div><div class="macro-label">碳水 g</div></div><div class="macro-item"><div class="macro-value">${Math.round(r.fat||0)}</div><div class="macro-label">脂肪 g</div></div><div class="macro-item"><div class="macro-value">${Math.round(r.fiber||0)}</div><div class="macro-label">纖維 g</div></div></div>${ai}<div class="nutrition-advice"><div class="nutrition-advice-label">👩‍⚕️ 營養師建議</div>${st}${adv}</div></div></div></div>`
  }).join('');
}

function toggleAccordion(i){const el=document.getElementById('acc-'+i);if(el)el.classList.toggle('open');}

async function fetchRecords(userId) {
  const resp = await fetch(`${API_URL}?userId=${encodeURIComponent(userId)}`);
  const text = await resp.text();
  if (!resp.ok) throw new Error('API error ' + resp.status + ': ' + text.substring(0, 120));
  if (!text || text.trim() === '') throw new Error('API 回傳空回應（n8n workflow 可能未啟動）');
  try { return JSON.parse(text); }
  catch(e) { throw new Error('API JSON 解析失敗: ' + text.substring(0, 120)); }
}

async function init() {
  let _step = '啟動';
  try {
    _step = '讀取URL';
    const urlParams = new URLSearchParams(location.search);
    const urlUserId = urlParams.get('userId');
    if (urlParams.has('liff.state') && !sessionStorage.getItem('_liff_stripped')) {
      sessionStorage.setItem('_liff_stripped', '1');
      urlParams.delete('liff.state');
      try {
        window.location.replace((location.origin||'')+location.pathname+(urlParams.toString()?'?'+urlParams.toString():''));
        return;
      } catch(navErr) { console.warn('iOS redirect failed:', navErr&&navErr.message); }
    }
    let userId=null,displayName=null,pictureUrl=null;
    if (LIFF_ID && LIFF_ID !== 'YOUR_LIFF_ID_HERE') {
      try {
        _step = 'liff.init';
        await liff.init({ liffId: LIFF_ID });
        _step = '檢查登入';
        if (!liff.isLoggedIn()) { _step='liff.login'; liff.login(); return; }
        _step = 'getProfile';
        const profile = await liff.getProfile();
        userId=profile.userId; displayName=profile.displayName; pictureUrl=profile.pictureUrl;
        _step = '已取得用戶';
      } catch (liffErr) {
        const eMsg=(liffErr&&liffErr.message)?String(liffErr.message):String(liffErr);
        const eName=(liffErr&&liffErr.name)?liffErr.name:((liffErr&&liffErr.constructor&&liffErr.constructor.name)||'Error');
        const eCode=(liffErr&&liffErr.code)?String(liffErr.code):'';
        console.warn('LIFF failed at ['+_step+']:', eName, eCode, eMsg);
        if (!sessionStorage.getItem('_liff_retry')) { sessionStorage.setItem('_liff_retry','1'); location.reload(); return; }
        const isPat=eMsg.indexOf('did not match')!==-1||eMsg.indexOf('pattern')!==-1||eName==='SyntaxError';
        if(isPat){showError('iOS 相容性問題 ['+_step+']，請關閉此視窗後重新點選選單按鈕開啟');return;}
        showError('LIFF 初始化失敗 ['+_step+']，請重新開啟\n['+eName+(eCode?'/'+eCode:'')+']:'+eMsg);
        return;
      }
    }
    _step='確認userId';
    if(!userId&&urlUserId){userId=urlUserId;displayName='患者';}
    if(!userId){showError('請在 LINE App 中開啟此頁面，或確認 LIFF 設定是否正確');return;}
    _step='更新介面';
    if(pictureUrl)document.getElementById('avatar-wrap').innerHTML=`<img class="avatar" src="${pictureUrl}" alt="avatar">`;
    document.getElementById('patient-name').textContent=displayName||'您好';
    _step='載入紀錄';
    const data=await fetchRecords(userId);
    if(data.patient?.name)document.getElementById('patient-name').textContent=data.patient.name;
    _step='渲染介面';
    const recs=data.records||[],rec=data.patient?.recommendedProtein||0,wt=data.patient?.weight||0;
    renderProteinProgress(recs,rec,wt);
    renderChart(recs,rec);
    renderRecords(recs);
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='block';
    _step='完成';
  } catch(err) {
    console.error('Error at ['+_step+']:', err);
    showError('載入失敗 ['+_step+']：'+(err&&err.message?err.message:String(err)));
  }
}

init();
</script>
</body>
</html>
