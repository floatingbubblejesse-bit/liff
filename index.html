<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體組成</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: #F5F3EF; color: #4A4A4A; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #6B7F91, #7B8FA1); color: white; padding: 20px 16px 24px; }
        .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .header p { font-size: 13px; opacity: 0.85; }
        .header-top { display: flex; align-items: center; gap: 12px; }
        .header-avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); object-fit: cover; background: rgba(255,255,255,0.3); }
        .header-avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .header-info h2 { font-size: 18px; font-weight: 600; }
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; }
        .spinner { width: 44px; height: 44px; border: 4px solid #e0e0e0; border-top-color: #7B8FA1; border-radius: 50%; animation: spin 0.9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { margin: 32px 16px; padding: 20px; background: #FFF3F3; border: 1px solid #E8C4C4; border-radius: 12px; text-align: center; color: #A0626B; white-space: pre-line; }
        .content { padding: 12px 12px 32px; }
        .card { background: #FDFBF7; border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card-title { font-size: 13px; font-weight: 700; color: #6B6B6B; letter-spacing: 0.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
        .profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #7B8FA1, #6B7F91); display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; font-weight: 700; flex-shrink: 0; }
        .profile-info h2 { font-size: 17px; font-weight: 700; }
        .profile-info p { font-size: 12px; color: #8B8B8B; margin-top: 2px; }
        .badge { display: inline-block; background: #E8EDE6; color: #6B8F71; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-top: 4px; font-weight: 600; }
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .metric-item { background: #f8fafb; border-radius: 10px; padding: 10px 8px; text-align: center; }
        .metric-label { font-size: 10px; color: #8B8B8B; margin-bottom: 4px; }
        .metric-value { font-size: 18px; font-weight: 700; color: #4A4A4A; }
        .metric-unit { font-size: 10px; color: #B0B0B0; }
        .metric-diff { font-size: 11px; margin-top: 3px; }
        .diff-good { color: #6B8F71; }
        .diff-warn { color: #A0626B; }
        .diff-same { color: #8B8B8B; }
        .chart-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
        .tab-btn { padding: 5px 12px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: #f0f0f0; color: #555; transition: all 0.2s; }
        .tab-btn.active { background: #7B8FA1; color: white; }
        .chart-wrap { position: relative; height: 200px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #F0EDE6; padding: 8px 6px; text-align: center; font-weight: 700; color: #6B6B6B; white-space: nowrap; position: sticky; top: 0; }
        td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9f9; }
        .date-col { font-size: 11px; color: #8B8B8B; }
        .no-data { text-align: center; color: #aaa; padding: 32px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div id="headerAvatarWrap"><div class="header-avatar-placeholder">🧑</div></div>
            <div class="header-info"><h2 id="headerName">載入中...</h2></div>
        </div>
    </div>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p id="loading-msg" style="color:#8B8B8B;font-size:14px;">連接中...</p>
    </div>
    <div id="error" style="display:none"></div>
    <div id="content" style="display:none" class="content"></div>

    <script>
    var LIFF_ID = '2009326025-XAQhb1rA';
    var API_URL = 'https://script.google.com/macros/s/AKfycbwLo76QFAO1EYpCY8PvQIWj0U4eUWuRYDRRNBN_uppxvd0T-HtFRl71t4RIQyFx5j_I/exec';
    var MEALS_GAS = 'https://script.google.com/macros/s/AKfycbxV3Cc44ohL4i7-xk29hAxFSPaWktOFgWxmCRGsg0uvxaJHbRqiMXrJjBAyva3XwDNY/exec';
    // 預熱兩個 GAS（並行，不等結果）
    try { fetch(API_URL + '?preheat=1', {mode:'no-cors'}).catch(function(){}); } catch(e){}
    try { fetch(MEALS_GAS + '?preheat=1', {mode:'no-cors'}).catch(function(){}); } catch(e){}

    var METRICS = [
        ['體重', '體重', 'kg', true ],
        ['體脂率', '體脂率', '%', true ],
        ['肌肉量', '肌肉量', 'kg', false],
        ['水分比率', '水分', '%', false],
        ['內臟脂肪指數', '內臟脂肪','', true ],
        ['身體質量參數 (BMI)','BMI', '', true ],
        ['基礎代謝 (BMR)', 'BMR', 'kcal', false],
        ['腰圍', '腰圍', 'cm', true ],
        ['臀圍', '臀圍', 'cm', true ],
    ];

    var chartInstance = null;
    var allData = null;

    function setMsg(t) { var el = document.getElementById('loading-msg'); if (el) el.textContent = t; }

    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        var el = document.getElementById('error');
        el.innerHTML = '<div class="error-box">⚠️ ' + esc(msg) + '</div>';
        el.style.display = 'block';
    }

    function fetchData(paramName, paramValue) {
        setMsg('載入資料中...');
        var url = API_URL + '?' + paramName + '=' + encodeURIComponent(paramValue);
        fetch(url)
            .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
            .then(function(data) {
                if (data.error) { showError(data.error); }
                else if (!data.measurements || !data.customer) { showError('資料格式異常，請聯絡店家'); }
                else { allData = data; renderDashboard(data); }
            })
            .catch(function(err) { showError('資料載入失敗：' + (err.message || err) + ' 請重試或聯絡店家'); });
    }

    var params = new URLSearchParams(window.location.search);
    var urlId = params.get('id');
    if (urlId) {
        document.getElementById('headerName').textContent = urlId;
        fetchData('id', urlId);
    } else {
        setMsg('連接 LINE 中...');
        liff.init({ liffId: LIFF_ID })
            .then(function() {
                setMsg('取得帳號中...');
                if (!liff.isInClient()) { showError('請在 LINE 中開啟此連結：https://liff.line.me/' + LIFF_ID); return; }
                return liff.getProfile();
            })
            .then(function(profile) {
                if (!profile || !profile.userId) return;
                document.getElementById('headerName').textContent = profile.displayName || '';
                if (profile.pictureUrl) { document.getElementById('headerAvatarWrap').innerHTML = '<img class="header-avatar" src="' + profile.pictureUrl + '" alt="">'; }
                // 同步 LINE 名稱到客戶清單（背景執行）
                if (profile.displayName) {
                    fetch('https://script.google.com/macros/s/AKfycbxV3Cc44ohL4i7-xk29hAxFSPaWktOFgWxmCRGsg0uvxaJHbRqiMXrJjBAyva3XwDNY/exec?setLineName=' + encodeURIComponent(profile.userId) + '&dName=' + encodeURIComponent(profile.displayName)).catch(function(){});
                }
                fetchData('uid', profile.userId);
            })
            .catch(function(err) { showError('LIFF 初始化失敗：' + (err.message || err) + ' 請在 LINE 中開啟：https://liff.line.me/' + LIFF_ID); });
    }

    function renderDashboard(data) {
        var m = data.measurements;
        var cust = data.customer;
        var latest = m.length > 0 ? m[m.length - 1] : null;
        var prev = m.length > 1 ? m[m.length - 2] : null;
        var html = '';

        // 更新 header 名稱（如果 LIFF 沒取到 profile）
        if (cust.name) { document.getElementById('headerName').textContent = cust.name; }

        if (latest) {
            var latestDate = latest['測量日期/時間'] || '';
            html += '<div class="card"><div class="card-title">📋 最新測量';
            if (latestDate) html += ' <span style="font-weight:400;color:#aaa;font-size:11px;">' + latestDate + '</span>';
            html += '</div><div class="metrics-grid">';
            METRICS.forEach(function(meta) {
                var key = meta[0], label = meta[1], unit = meta[2], lowerGood = meta[3];
                var curr = parseFloat(latest[key]);
                if (isNaN(curr)) return;
                var diffHtml = '';
                if (prev) {
                    var pv = parseFloat(prev[key]);
                    if (!isNaN(pv)) {
                        var diff = curr - pv;
                        var good = (lowerGood && diff < 0) || (!lowerGood && diff > 0);
                        var cls = diff === 0 ? 'diff-same' : (good ? 'diff-good' : 'diff-warn');
                        var sign = diff > 0 ? '+' : '';
                        var arrow = diff === 0 ? '→' : (diff > 0 ? '↑' : '↓');
                        diffHtml = '<div class="metric-diff ' + cls + '">' + arrow + ' ' + sign + diff.toFixed(1) + unit + '</div>';
                    }
                }
                html += '<div class="metric-item">';
                html += '<div class="metric-label">' + esc(label) + '</div>';
                html += '<div class="metric-value">' + curr + '<span class="metric-unit">' + esc(unit) + '</span></div>';
                html += diffHtml + '</div>';
            });
            html += '</div></div>';
        }

        if (m.length > 1) {
            html += '<div class="card"><div class="card-title">📈 趨勢圖</div><div class="chart-tabs">';
            METRICS.forEach(function(meta, idx) {
                var hasData = m.some(function(row) { return !isNaN(parseFloat(row[meta[0]])); });
                if (!hasData) return;
                html += '<button class="tab-btn' + (idx === 0 ? ' active' : '') + '" onclick="switchChart(\'' + meta[0] + '\', this)">' + esc(meta[1]) + '</button>';
            });
            html += '</div><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>';
        }

        if (m.length > 0) {
            html += '<div class="card"><div class="card-title">📄 測量歷史</div>';
            html += '<div class="table-wrap"><table><tr><th>日期</th>';
            METRICS.forEach(function(meta) {
                if (m.some(function(r) { return !isNaN(parseFloat(r[meta[0]])); })) html += '<th>' + esc(meta[1]) + '</th>';
            });
            html += '</tr>';
            m.slice().reverse().forEach(function(row) {
                html += '<tr><td class="date-col">' + esc((row['測量日期/時間'] || '').substring(0, 10)) + '</td>';
                METRICS.forEach(function(meta) {
                    if (!m.some(function(r) { return !isNaN(parseFloat(r[meta[0]])); })) return;
                    var val = parseFloat(row[meta[0]]);
                    html += '<td>' + (isNaN(val) ? '-' : val) + '</td>';
                });
                html += '</tr>';
            });
            html += '</table></div></div>';
        } else {
            html += '<div class="card"><div class="no-data">尚無測量紀錄</div></div>';
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').innerHTML = html;
        document.getElementById('content').style.display = 'block';

        if (m.length > 1) {
            setTimeout(function() {
                for (var i = 0; i < METRICS.length; i++) {
                    if (m.some(function(row) { return !isNaN(parseFloat(row[METRICS[i][0]])); })) {
                        renderChart(METRICS[i][0]); break;
                    }
                }
            }, 100);
        }
    }

    function renderChart(metricKey) {
        var m = allData.measurements;
        var meta = METRICS.find(function(x) { return x[0] === metricKey; });
        var labels = [], values = [];
        m.forEach(function(row) {
            var val = parseFloat(row[metricKey]);
            if (!isNaN(val)) { labels.push((row['測量日期/時間'] || '').substring(0, 10)); values.push(val); }
        });
        var canvas = document.getElementById('trendChart');
        if (!canvas) return;
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: { labels: labels, datasets: [{ label: meta[1] + (meta[2] ? '(' + meta[2] + ')' : ''), data: values, borderColor: '#7B8FA1', backgroundColor: 'rgba(123,143,161,0.08)', tension: 0.3, pointBackgroundColor: '#7B8FA1', pointRadius: 5, fill: true }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 10 }, maxRotation: 45 } }, y: { ticks: { font: { size: 11 } } } } }
        });
    }

    function switchChart(metricKey, btn) {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderChart(metricKey);
    }

    function esc(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    </script>
</body>
</html>
