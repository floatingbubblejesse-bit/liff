<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>身體組成</title>
    <link rel="preconnect" href="https://static.line-scdn.net" crossorigin>
    <link rel="preconnect" href="https://huangcs.app.n8n.cloud" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <script>
    (function() {
        var _origReplace = history.replaceState.bind(history);
        var _origPush = history.pushState.bind(history);
        history.replaceState = function(s, t, u) {
            try { _origReplace(s, t, u); } catch(e) { console.warn('[iOS patch] replaceState suppressed:', e && e.message); }
        };
        history.pushState = function(s, t, u) {
            try { _origPush(s, t, u); } catch(e) { console.warn('[iOS patch] pushState suppressed:', e && e.message); }
        };
    })();
    </script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
    <style>
        :root {
            --primary: #7B8FA1;
            --primary-dark: #6B7F91;
            --primary-light: #EDE8E0;
            --warning: #C4A882;
            --danger: #A0626B;
            --success: #6B8F71;
            --text: #4A4A4A;
            --text-muted: #8B8B8B;
            --border: #E8E4DC;
            --bg: #F5F3EF;
            --card: #FDFBF7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 32px; }
        #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--primary-light); z-index: 999; gap: 16px; transition: opacity 0.3s ease; }
        #loading.fade-out { opacity: 0; pointer-events: none; }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { color: var(--text-muted); font-size: 14px; }
        header { background: linear-gradient(135deg, #6B7F91 0%, #7B8FA1 100%); padding: 20px 16px 24px; color: white; }
        .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); object-fit: cover; background: rgba(255,255,255,0.3); }
        .avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .header-info h1 { font-size: 18px; font-weight: 600; }
        .header-info p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        #error-screen { display: none; padding: 32px 24px; text-align: center; }
        #error-screen .error-icon { font-size: 56px; margin-bottom: 16px; }
        #error-screen h2 { font-size: 18px; margin-bottom: 8px; }
        #error-screen p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }
        #main { display: none; }
        .bc-section { padding: 0 12px 8px; }
        .bc-card { background: var(--card); border-radius: 14px; padding: 14px 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .bc-card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
        .bc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .bc-item { text-align: center; padding: 8px 4px; background: #F0EDE6; border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s; }
        .bc-item:active { background: #E4DFD5; }
        .bc-item.active { background: #7B8FA1; }
        .bc-item.active .bc-val { color: white; }
        .bc-item.active .bc-lbl { color: rgba(255,255,255,0.85); }
        .bc-val { font-size: 18px; font-weight: 700; color: #6B7F91; }
        .bc-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        /* tabs removed — grid items are clickable */
        .bc-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .bc-table th { background: #F0EDE6; color: var(--text-muted); font-size: 10px; font-weight: 600; padding: 6px 5px; white-space: nowrap; text-align: center; }
        .bc-table td { padding: 6px 5px; text-align: center; border-top: 1px solid var(--border); white-space: nowrap; }
        .bc-table tr:first-child td { font-weight: 600; color: var(--primary-dark); }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">正在連線…</p>
    </div>
    <div id="error-screen">
        <div class="error-icon">🔒</div>
        <h2>無法載入</h2>
        <p id="error-msg">請在 LINE App 中開啟此頁面</p>
    </div>
    <div id="main">
        <header>
            <div class="header-top">
                <div id="avatar-wrap"><div class="avatar-placeholder">🧑</div></div>
                <div class="header-info">
                    <h1 id="patient-name">載入中…</h1>
                </div>
            </div>
        </header>
        <div id="bc-section" class="bc-section" style="display:none">
            <div class="bc-card">
                <div class="bc-card-title">📋 最新身體組成</div>
                <div class="bc-grid" id="bc-grid"></div>
            </div>
            <div class="bc-card">
                <div class="bc-card-title" id="bc-chart-title">📈 趨勢圖</div>
                <div style="position:relative;height:200px"><canvas id="bc-chart"></canvas></div>
            </div>
            <div class="bc-card">
                <div class="bc-card-title">📄 測量歷史</div>
                <div style="overflow-x:auto" id="bc-history-table"></div>
            </div>
        </div>
        <!-- meal section removed — body composition only -->
    </div>

    <script>
    const LIFF_ID = '2009326025-XAQhb1rA';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwLo76QFAO1EYpCY8PvQIWj0U4eUWuRYDRRNBN_uppxvd0T-HtFRl71t4RIQyFx5j_I/exec';

    const BC_METRICS = [
        ['體重','體重','kg',true],['體脂率','體脂率','%',true],['肌肉量','肌肉量','kg',false],
        ['蛋白質','蛋白質','kg',false],
        ['水分比率','水分','%',false],['內臟脂肪指數','內臟脂肪','',true],
        ['身體質量參數 (BMI)','BMI','',true],['基礎代謝 (BMR)','基礎代謝','kcal',false],
        ['日耗熱量','日耗熱量','kcal',false],
        ['腰圍','腰圍','cm',true],['臀圍','臀圍','cm',true],
        ['腰臀比','腰臀比','',true],
    ];

    function getBcNormalRange(key, cust) {
        const h = parseFloat(cust && cust.height) || 0;
        const g = String(cust && cust.gender || '').trim();
        const isMale = (g === '男');
        const h2 = (h / 100) * (h / 100);
        switch (key) {
            case '體重': if (!h) return null; { const sw = h2 * (isMale ? 22 : 20); return [sw * 0.85, sw * 1.15]; }
            case '體脂率': return isMale ? [10, 20] : [18, 28];
            case '肌肉量': if (!h) return null; { const sm = h2 * (isMale ? 10.53 : 8.47); return [sm * 0.90, sm * 1.10]; }
            case '蛋白質': if (!h) return null; { const sp = h2 * (isMale ? 3.72 : 3.08); return [sp * 0.85, sp * 1.15]; }
            case '水分比率': return isMale ? [56, 69] : [50, 62];
            case '內臟脂肪指數': return [0.5, 5];
            case '身體質量參數 (BMI)': return [18.5, 24.9];
            case '腰圍': return isMale ? [null, 90] : [null, 80];
            case '腰臀比': return isMale ? [null, 0.9] : [null, 0.85];
            default: return null;
        }
    }

    let bcChartInstance = null;
    let bcData = null;

    function renderBcSection(data) {
        bcData = data;
        const m = data.measurements || [];
        const cust = data.customer || {};
        if (m.length === 0) return;
        // 計算日耗熱量 = BMR × 1.2，腰臀比 = 腰圍 / 臀圍
        m.forEach(row => {
            const bmr = parseFloat(row['基礎代謝 (BMR)']); if (!isNaN(bmr)) row['日耗熱量'] = Math.round(bmr * 1.2);
            const w = parseFloat(row['腰圍']), hip = parseFloat(row['臀圍']); if (!isNaN(w) && !isNaN(hip) && hip > 0) row['腰臀比'] = Math.round((w / hip) * 100) / 100;
        });
        document.getElementById('bc-section').style.display = 'block';
        const latest = m[m.length - 1];
        const prev = m.length > 1 ? m[m.length - 2] : null;
        let gridHtml = '';
        const availMetrics = [];
        BC_METRICS.forEach(meta => {
            let curr = parseFloat(latest[meta[0]]);
            let prevRow = prev;
            // 如果最新測量缺少此項，往前找最近有數據的那筆
            if (isNaN(curr)) {
                for (let fi = m.length - 2; fi >= 0; fi--) {
                    const fv = parseFloat(m[fi][meta[0]]);
                    if (!isNaN(fv)) { curr = fv; prevRow = (fi > 0) ? m[fi - 1] : null; break; }
                }
            }
            if (isNaN(curr)) return;
            availMetrics.push(meta);
            const rng = getBcNormalRange(meta[0], cust);
            let dot = '';
            if (rng) {
                const lo = rng[0], hi = rng[1];
                if (lo !== null && hi !== null) dot = (curr >= lo && curr <= hi) ? '<span style="color:#8B9D83;font-size:8px;margin-right:2px">●</span>' : '<span style="color:#A0626B;font-size:8px;margin-right:2px">●</span>';
                else if (hi !== null) dot = (curr <= hi) ? '<span style="color:#8B9D83;font-size:8px;margin-right:2px">●</span>' : '<span style="color:#A0626B;font-size:8px;margin-right:2px">●</span>';
            }
            let diffHtml = '';
            if (prevRow) {
                const pv = parseFloat(prevRow[meta[0]]);
                if (!isNaN(pv)) {
                    const diff = curr - pv;
                    const good = (meta[3] && diff < 0) || (!meta[3] && diff > 0);
                    const cls = diff === 0 ? 'color:#8B8B8B' : (good ? 'color:#8B9D83' : 'color:#A0626B');
                    diffHtml = `<div style="font-size:10px;${cls}">${diff > 0 ? '↑+' : (diff < 0 ? '↓' : '→')}${diff.toFixed(1)}</div>`;
                }
            }
            const keyIdx = availMetrics.length - 1;
            gridHtml += `<div class="bc-item" data-key-idx="${keyIdx}" onclick="switchBcFromGrid(this,${keyIdx})"><div class="bc-val">${curr}</div><div class="bc-lbl">${dot}${escHtml(meta[1])} ${escHtml(meta[2])}</div>${diffHtml}</div>`;
        });
        document.getElementById('bc-grid').innerHTML = gridHtml;
        // 儲存可用指標，供點擊使用
        window._bcAvailMetrics = availMetrics;
        // 預設選中第一格
        const firstItem = document.querySelector('.bc-item[data-key-idx]');
        if (firstItem) firstItem.classList.add('active');
        if (availMetrics.length > 0 && m.length >= 1) {
            document.getElementById('bc-chart-title').textContent = '📈 ' + availMetrics[0][1];
            const drawFirst = () => { if (typeof Chart === 'undefined') { setTimeout(drawFirst, 100); return; } renderBcChart(availMetrics[0][0]); };
            drawFirst();
        }
        // 測量歷史表格
        let tblHtml = '<table class="bc-table"><tr><th>日期</th>';
        const usedMetrics = BC_METRICS.filter(meta => m.some(r => !isNaN(parseFloat(r[meta[0]]))));
        usedMetrics.forEach(meta => { tblHtml += `<th>${escHtml(meta[1])}</th>`; });
        tblHtml += '</tr>';
        for (let hi = m.length - 1; hi >= 0; hi--) {
            const dt = (m[hi]['測量日期/時間'] || '').substring(0, 10);
            tblHtml += `<tr><td>${escHtml(dt)}</td>`;
            usedMetrics.forEach(meta => { const v = parseFloat(m[hi][meta[0]]); tblHtml += `<td>${isNaN(v) ? '-' : v}</td>`; });
            tblHtml += '</tr>';
        }
        tblHtml += '</table>';
        document.getElementById('bc-history-table').innerHTML = tblHtml;
    }

    function renderBcChart(key) {
        if (!bcData) return;
        const m = bcData.measurements || [];
        const cust = bcData.customer || {};
        const meta = BC_METRICS.find(x => x[0] === key);
        if (!meta) return;
        const labels = [], values = [];
        m.forEach(row => { const v = parseFloat(row[key]); if (!isNaN(v)) { labels.push((row['測量日期/時間'] || '').substring(0, 10)); values.push(v); } });
        if (labels.length === 0) return;
        // 單一數據點時補一個空白點，讓範圍線可以畫出來
        if (labels.length === 1) { labels.push(''); values.push(values[0]); }
        const canvas = document.getElementById('bc-chart');
        if (!canvas) return;
        if (bcChartInstance) bcChartInstance.destroy();
        const datasets = [{ label: meta[1], data: values, borderColor: '#7B8FA1', backgroundColor: 'rgba(123,143,161,0.07)', tension: 0.3, pointBackgroundColor: '#7B8FA1', pointRadius: 4, fill: true, order: 1 }];
        const range = getBcNormalRange(key, cust);
        let yMin, yMax;
        if (range) {
            const lo = range[0], hi = range[1];
            if (lo !== null && hi !== null) {
                datasets.push({ label: '正常上限', data: Array(labels.length).fill(hi), borderColor: 'rgba(107,143,113,0.8)', borderWidth: 1.5, borderDash: [4, 4], pointRadius: 0, fill: false, order: 2 });
                datasets.push({ label: '正常下限', data: Array(labels.length).fill(lo), borderColor: 'rgba(107,143,113,0.8)', borderWidth: 1.5, borderDash: [4, 4], pointRadius: 0, fill: '-1', backgroundColor: 'rgba(107,143,113,0.15)', order: 2 });
            } else if (hi !== null) {
                datasets.push({ label: '正常上限', data: Array(labels.length).fill(hi), borderColor: 'rgba(160,98,107,0.8)', borderWidth: 1.5, borderDash: [4, 4], pointRadius: 0, fill: false, order: 2 });
            } else if (lo !== null) {
                datasets.push({ label: '正常下限', data: Array(labels.length).fill(lo), borderColor: 'rgba(107,143,113,0.8)', borderWidth: 1.5, borderDash: [4, 4], pointRadius: 0, fill: false, order: 2 });
            }
            const dataMin = Math.min(...values), dataMax = Math.max(...values);
            let allMin = dataMin, allMax = dataMax;
            if (lo !== null) allMin = Math.min(allMin, lo);
            if (hi !== null) allMax = Math.max(allMax, hi);
            const pad = (allMax - allMin) * 0.15 || 1;
            yMin = allMin - pad; yMax = allMax + pad;
        }
        const scaleOpts = { x: { ticks: { font: { size: 10 }, maxRotation: 45 } }, y: { ticks: { font: { size: 10 } } } };
        if (yMin !== undefined) { scaleOpts.y.min = Math.floor(yMin * 10) / 10; scaleOpts.y.max = Math.ceil(yMax * 10) / 10; }
        bcChartInstance = new Chart(canvas.getContext('2d'), {
            type: 'line', data: { labels, datasets },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: scaleOpts }
        });
    }

    function switchBcFromGrid(el, idx) {
        document.querySelectorAll('.bc-item').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        const meta = window._bcAvailMetrics[idx];
        const key = meta[0];
        document.getElementById('bc-chart-title').textContent = '📈 ' + meta[1];
        renderBcChart(key);
    }

    // 預熱 GAS
    try { fetch(GAS_URL + '?preheat=1', {mode:'no-cors'}).catch(function(){}); } catch(e){}

    function escHtml(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main').style.display = 'none';
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-msg').textContent = msg || '請在 LINE App 中開啟此頁面';
    }

    async function init() {
        const loadingText = document.getElementById('loading-text');
        let _step = '啟動';
        try {
            _step = '讀取URL';
            const urlParams = new URLSearchParams(location.search);
            const liffState = urlParams.get('liff.state') || '';
            if (liffState) {
                var stateStr = liffState.charAt(0) === '?' ? liffState.substring(1) : liffState;
                var stateParams = new URLSearchParams(stateStr);
                stateParams.forEach(function(v, k) { if (!urlParams.has(k)) urlParams.set(k, v); });
            }
            const urlId = urlParams.get('id');
            const urlUserId = urlParams.get('userId');
            let userId = null, displayName = null, pictureUrl = null;

            if (urlId) {
                // 用 ?id= 直接查（個人化連結）
                document.getElementById('patient-name').textContent = urlId;
                document.getElementById('main').style.display = 'block';
                loadingText.textContent = '載入身體組成…';
                fetch(GAS_URL + '?id=' + encodeURIComponent(urlId))
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('loading').classList.add('fade-out');
                        setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 300);
                        if (data && data.customer && data.customer.name) document.getElementById('patient-name').textContent = data.customer.name;
                        if (data && data.measurements) renderBcSection(data);
                    })
                    .catch(e => showError('載入失敗：' + (e.message || e)));
                // 背景跑 LIFF init 更新頭像
                if (LIFF_ID && LIFF_ID !== 'YOUR_LIFF_ID_HERE') {
                    liff.init({ liffId: LIFF_ID }).then(() => {
                        if (!liff.isLoggedIn()) return;
                        return liff.getProfile();
                    }).then(profile => {
                        if (!profile) return;
                        if (profile.pictureUrl) document.getElementById('avatar-wrap').innerHTML = `<img class="avatar" src="${profile.pictureUrl}" alt="avatar">`;
                        if (profile.displayName) document.getElementById('patient-name').textContent = profile.displayName;
                    }).catch(() => {});
                }
                return;
            }

            if (LIFF_ID && LIFF_ID !== 'YOUR_LIFF_ID_HERE' && !urlUserId) {
                try {
                    loadingText.textContent = '正在連線 LINE…';
                    _step = 'liff.init';
                    await liff.init({ liffId: LIFF_ID });
                    _step = '檢查登入';
                    if (!liff.isLoggedIn()) { liff.login(); return; }
                    _step = 'getProfile';
                    const profile = await liff.getProfile();
                    userId = profile.userId; displayName = profile.displayName; pictureUrl = profile.pictureUrl;
                } catch (liffErr) {
                    const eMsg = (liffErr && liffErr.message) ? String(liffErr.message) : String(liffErr);
                    const eName = (liffErr && liffErr.name) ? liffErr.name : 'Error';
                    console.warn('LIFF failed [' + _step + ']:', eName, eMsg);
                    if (!sessionStorage.getItem('_liff_retry')) { sessionStorage.setItem('_liff_retry', '1'); location.reload(); return; }
                    showError('LIFF 初始化失敗 [' + _step + ']\n' + eName + ': ' + eMsg); return;
                }
            }
            if (!userId && urlUserId) { userId = urlUserId; displayName = '患者'; }
            if (!userId) { showError('請在 LINE App 中開啟此頁面'); return; }
            if (pictureUrl) { document.getElementById('avatar-wrap').innerHTML = `<img class="avatar" src="${pictureUrl}" alt="avatar">`; }
            document.getElementById('patient-name').textContent = displayName || '您好';
            // 同步 LINE 名稱
            if (userId && displayName && displayName !== '患者') {
                fetch(GAS_URL + '?setLineName=' + encodeURIComponent(userId) + '&dName=' + encodeURIComponent(displayName)).catch(function(){});
            }
            document.getElementById('main').style.display = 'block';
            loadingText.textContent = '載入身體組成…';

            fetch(GAS_URL + '?uid=' + encodeURIComponent(userId))
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading').classList.add('fade-out');
                    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 300);
                    if (data && data.customer && data.customer.name) document.getElementById('patient-name').textContent = data.customer.name;
                    if (data && data.measurements) renderBcSection(data);
                })
                .catch(e => showError('載入失敗：' + (e.message || e)));
        } catch (err) {
            console.error('Error [' + _step + ']:', err);
            showError('載入失敗 [' + _step + ']：' + (err.message || err));
        }
    }
    init();
    </script>
</body>
</html>
